// 사진을 자를 안전한 가로줄 찾기: 슬라이스 아래쪽 140px 안에서 '완전한 빈 줄'을, 없으면 '표 테두리 줄'을 찾는다.
// (글자 중간을 가로지르는 어색한 절단 방지)
function findPhotoCut(canvas, scale, wantCss) {
  try {
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const xs = []; for (let x = 8; x < W - 8; x += Math.max(8, Math.floor(W / 90))) xs.push(x);
    const rowStat = (cssY) => {
      const py = Math.min(canvas.height - 1, Math.round(cssY * scale));
      const d = ctx.getImageData(0, py, W, 1).data;
      let dark = 0, nonwhite = 0;
      xs.forEach(x => {
        const i = x * 4, lum = (d[i] + d[i+1] + d[i+2]) / 3;
        if (lum < 130) dark++;
        if (lum < 245) nonwhite++;
      });
      return { dark: dark / xs.length, nonwhite: nonwhite / xs.length };
    };
    const lo = Math.max(200, wantCss - 140);
    for (let yy = wantCss - 2; yy >= lo; yy -= 2) {            // 1순위: 빈 줄
      if (rowStat(yy).nonwhite === 0) return yy;
    }
    for (let yy = wantCss - 2; yy >= lo; yy -= 2) {            // 2순위: 표 테두리(연속 진한 선)
      if (rowStat(yy).dark >= 0.9) return yy + 1;
    }
  } catch (e) {}
  return wantCss;  // 못 찾으면 그대로
}

async function sharePhotoFiles(files, title) {

      a.href = url; a.download = f.name;

    +   'for(var q=0;q<M;q++){var h=tb.rows[q].getBoundingClientRect().height||24;hs.push(h);sum+=h;if(h<mn)mn=h;}'
    +   'var W=0,w=[];for(var q2=0;q2<M;q2++){var g=Math.max(1,Math.round(hs[q2]/mn));w.push(g);W+=g;}'
    +   'var N=Math.max(1,Math.ceil(W/CAP));'
    +   'var per=Math.max(MINP,Math.ceil(W/N));'  // 앞장 몫: 균등 올림 + 최소 25 — 잔여는 마지막 장
    +   'var bnd=[0];'
    +   'if(N>1){var cum=0,k=1,tk=per;'
    +     'for(var q3=0;q3<M&&k<N;q3++){cum+=w[q3];'
    +       'if(cum>=tk&&q3+1<M){bnd.push(q3+1);k++;tk=per*k;}'
    +     '}'
    +   '}'
    +   'bnd.push(M);'
    +   'for(var b=1;b<bnd.length-1;b++){'
    +     'var br=tb.rows[bnd[b]];br.style.pageBreakBefore="always";br.style.breakBefore="page";'
    +     'var pc=tb.rows[bnd[b]-1].cells;for(var c=0;c<pc.length;c++)pc[c].style.borderBottom="2px solid #333";'
    +   '}'
    +   'var np=bnd.length-1;'
    +   'if(np>1){'
    +     'var top0=Math.max(0,ts[0].getBoundingClientRect().top);'
    +     'var th=ts[0].tHead?ts[0].tHead.getBoundingClientRect().height:0;'
    +     'var avg=sum/M,lastPad=0;'
    +     'for(var p=0;p<np;p++){'
    +       'var st=bnd[p],en=bnd[p+1],cnt=en-st;if(cnt<=0)continue;'
    +       'var pad;'
    +       'if(p<np-1){'
    +         'var fx=(p===0?top0+th:th),bh=fx;'
    +         'for(var q4=st;q4<en;q4++)bh+=hs[q4];'
    +         'pad=Math.max(0,Math.min((P-bh)/cnt,LEAD*avg));lastPad=pad;'
    +       '}else{pad=lastPad;}'
    +       'if(pad>0.05)for(var q5=st;q5<en;q5++)tb.rows[q5].style.height=(Math.floor((hs[q5]+pad)*10)/10)+"px";'
    +     '}'
    +   '}'
    + '}else{'
    +   'var stt=document.querySelectorAll(".print-section-title");'  // 여러 표 문서: 제목이 표와 떨어져 홀로 넘어가지 않게만
    +   'for(var i2=0;i2<stt.length;i2++){stt[i2].style.breakAfter="avoid";stt[i2].style.pageBreakAfter="avoid";}'
    + '}'
    + 'window.focus();window.print();'
    + '}catch(e){console.error(e);try{window.print();}catch(_e){}}},150);};'
    + '<\/script>')}
</head>
<body>${bodyHtml}</body></html>`;
}

function doPrint(title, bodyHtml) {
  // '사진' 버튼으로 진입한 경우: 종이 인쇄 대신 같은 문서를 고화질 이미지로 캡처해 공유
  if (__photoMode) { __photoMode = false; sharePrintPhoto(title, bodyHtml); return; }
  const old = document.getElementById('printFrame');
  if (old) old.remove();

  const iframe = document.createElement('iframe');
  iframe.id = 'printFrame';
  iframe.setAttribute('aria-hidden', 'true');
  // 폭 0이면 엔진의 높이 측정이 무의미해진다(글자가 전부 꺾여 문서가 거대하게 측정됨).
  // 실제 A4 크기로 렌더링하되 visibility로 숨긴다.
  iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:210mm;height:297mm;border:0;visibility:hidden;pointer-events:none;';
  document.body.appendChild(iframe);

  const fullHtml = buildPrintDocument(title, bodyHtml);
  try { iframe.srcdoc = fullHtml; } 
  catch (e) { const doc = iframe.contentDocument || iframe.contentWindow.document; doc.open(); doc.write(fullHtml); doc.close(); }
}

// scope: 'all'(전체·기본) | 'main'(본 차수만) | 'other'(타 차수만)
//  본 차수 = 교회 공식 차수(churchSessionName). 멤버가 여러 차수에 참여하면 각 차수의 차편을 그 차수 집계에 반영.
function getTransportStats(scope) {
  scope = scope || 'all';
  const mainSession = churchSessionName();
  let countUp = { '본대버스': 0, '개인차': 0 };
  let countDown = { '본대버스': 0, '개인차': 0 };
  CHURCH_CARS.forEach(c => { countUp[c] = 0; countDown[c] = 0; });
  OTHER_TRANSPORTS.forEach(o => { countUp[o] = 0; countDown[o] = 0; });

  // 종류만 선택(세부 편 미정)도 집계: '본대'→본대버스 묶음, '개인차', '기타'
  function mapT(val) {
    if (!val) return null;
    if (val === '본대' || BUSES.includes(val)) return '본대버스';
    if (CHURCH_CARS.includes(val)) return val;
    if (PRIVATE_CAR_LIST.includes(val) || val === '개인차') return '개인차';
    if (val === '기타') return '기타';
    if (OTHER_TRANSPORTS.includes(val)) return val;
    return null;
  }
  // '기타'(세부 미정) 카테고리 키 확보
  if (countUp['기타'] === undefined) countUp['기타'] = 0;
  if (countDown['기타'] === undefined) countDown['기타'] = 0;

  boardableMembers().forEach(m => {
    // 이 멤버가 참여하는 차수들 중, scope에 해당하는 차수만 골라 각 차수의 차편을 집계
    const mySessions = (m.session || '').split(',').map(x => x.trim()).filter(Boolean);
    let targetSessions;
    if (scope === 'main') targetSessions = mySessions.filter(s => s === mainSession);
    else if (scope === 'other') targetSessions = mySessions.filter(s => s !== mainSession);
    else targetSessions = null;  // 전체: 대표 차수 하나만

    if (scope === 'all') {
      const rep = representativeSession(m);
      const st = (rep && m.sessionTrans && m.sessionTrans[rep]) || null;
      if (!st) return;
      let mUp = mapT(vehLabel(st.upVehicle, st.upKind));
      if (mUp && countUp[mUp] !== undefined) countUp[mUp]++;
      let mDn = mapT(vehLabel(st.downVehicle, st.downKind));
      if (mDn && countDown[mDn] !== undefined) countDown[mDn]++;
    } else {
      // 본/타 차수: 해당하는 각 차수의 차편을 개별 집계
      targetSessions.forEach(s => {
        const st = (m.sessionTrans && m.sessionTrans[s]) || null;
        if (!st) return;
        let mUp = mapT(vehLabel(st.upVehicle, st.upKind));
        if (mUp && countUp[mUp] !== undefined) countUp[mUp]++;
        let mDn = mapT(vehLabel(st.downVehicle, st.downKind));
        if (mDn && countDown[mDn] !== undefined) countDown[mDn]++;
      });
    }
  });

  const keys = ['본대버스', ...CHURCH_CARS, '개인차', '기타', ...OTHER_TRANSPORTS];
  // 등록된(데이터가 있는) 항목만 표시 — 0인 카테고리는 제외
  return {
    up: keys.map(k => [k, countUp[k]||0]).filter(x => x[1] > 0),
    down: keys.map(k => [k, countDown[k]||0]).filter(x => x[1] > 0)
  };
}

function rosterPrintRowsHtml(list, startNo, mode, opts) {
  startNo = startNo || 1;
  mode = mode || 'all'; // 'zone' | 'dept' | 'all'
  opts = opts || {};
  // 회별 인쇄에서는 '부서' 컬럼이 중복이라 '구역' 컬럼으로 대체
  const showZone = mode === 'dept'; // dept 모드일 때 부서 자리에 구역 표시
  // 화면 명단과 동일한 규칙으로 번호·상태를 인쇄에 반영:
  //  현장접수(미집계)="현장", 환불="환불", 불참="불참" → 순번에서 제외하고 라벨 표시,
  //  불참·환불 행은 흐리게+밑줄, 정상만 순번을 매김.
  let ctr = startNo - 1;  // 정상 인원에만 증가하는 번호 카운터
  let trs = list.map((m) => {
    let up = m.transUp || ''; let down = m.transDown || '';
    const extraUp = Object.keys(m.extraUp || {}).find(k => m.extraUp[k]);
    const extraDown = Object.keys(m.extraDown || {}).find(k => m.extraDown[k]);
    if (extraUp) up = `${m.extraUp[extraUp]} (${extraUp})`;
    if (extraDown) down = `${m.extraDown[extraDown]} (${extraDown})`;
    const transStr = allSessionsTransText(m, true);  // 모든 차수 교통편 줄바꿈 표시
    const col3 = showZone ? esc(m.zone) : esc(m.dept);
    // 번호란: 상태에 따라 라벨 또는 순번
    let noCell, rowStyle = '';
    if (isUncountedOnsite(m)) {
      noCell = '<span style="color:#0a8f86;font-weight:700;">현장</span>';  // 청록(인쇄 대비 진한 톤)
    } else if (m.status === 'refund') {
      noCell = '<span style="color:#c0392b;font-weight:700;">환불</span>';
      rowStyle = 'color:#999; text-decoration:line-through; text-decoration-color:#c0392b;';
    } else if (m.status === 'noshow') {
      noCell = '<span style="color:#c0392b;font-weight:700;">불참</span>';
      rowStyle = 'color:#999;';
    } else {
      ctr += 1; noCell = String(ctr);
    }
    // 비고란: 불참·환불 라벨을 앞에 (화면 noteWithStatus와 동일)
    let noteCell = esc(m.note || '');
    if (m.status === 'noshow') noteCell = '<span style="color:#c0392b;font-weight:700;">불참</span>' + (m.note ? ' · ' + esc(m.note) : '');
    else if (m.status === 'refund') noteCell = '<span style="color:#c0392b;font-weight:700;">환불</span>' + (m.note ? ' · ' + esc(m.note) : '');
    return `<tr${rowStyle ? ` style="${rowStyle}"` : ''}>
      <td>${noCell}</td><td class="print-name">${esc(m.name)}</td><td>${col3}</td>
      <td style="white-space:nowrap;font-size:10px;">${sessionPairsHtml(m)}</td><td class="tl trans-cell">${transStr}</td>
      <td>${esc(m.lodging||'')}</td><td class="tl note-cell">${noteCell}</td>
    </tr>`;
  }).join('');
  if (!trs) trs = `<tr><td colspan="7" style="padding:20px; color:#666;">등록된 인원이 없습니다.</td></tr>`;
  // 비율(합=100) — 차수는 '두 개씩 줄바꿈'이라 좁혀도 되고(9%), 비고를 조금 줄여
  // 교통편을 넓혔다(구역 31 · 회 35 · 전체 35%) — 교통편이 숙소 칸을 침범하지 않게.
  let cols;
  if (mode === 'zone')      cols = `<col style="width:5%"><col style="width:10%"><col style="width:9%"><col style="width:9%"><col style="width:31%"><col style="width:15%"><col style="width:21%">`;
  else if (mode === 'dept') cols = `<col style="width:5%"><col style="width:10%"><col style="width:8%"><col style="width:9%"><col style="width:35%"><col style="width:15%"><col style="width:18%">`;
  else                      cols = `<col style="width:5%"><col style="width:8%"><col style="width:9%"><col style="width:9%"><col style="width:35%"><col style="width:18%"><col style="width:16%">`;
  return `<table class="print-table" style="table-layout:fixed">
    <colgroup>${cols}</colgroup>
    <thead><tr>
      <th>번호</th><th>성명</th><th>${showZone ? '구역' : '부서(회)'}</th>
      <th>차수</th><th>교통편</th><th>숙소</th><th>비고</th>
    </tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

function execResetZone() {
  const zone = rosterFilter.zone;
  if (zone === ALL_ZONES) { toast('전체 보기에서는 구역을 선택해 주세요', true); return; }
  const count = membersByZone(zone).length;
  if (count === 0) { toast('해당 구역에 인원이 없습니다.'); return; }
  confirmModal(`${zone} 초기화`, `${zone}의 ${count}명을 모두 삭제합니다.`, () => {
    // 해당 구역 멤버 ID 모음
    const removedIds = new Set(DB.members.filter(m => m.zone === zone).map(m => m.id));
    // 삭제될 데이터 스냅샷 (되돌리기용) — 깊은 복사로 보관
    const snapshot = {
      members: DB.members.filter(m => m.zone === zone).map(m => JSON.parse(JSON.stringify(m))),
      evangelism: DB.evangelism.filter(e => removedIds.has(e.memberId) || e.zone === zone).map(e => JSON.parse(JSON.stringify(e))),
      feeSupport: DB.feeSupport.filter(f => removedIds.has(f.memberId) || f.zone === zone).map(f => JSON.parse(JSON.stringify(f))),
    };
    // 명단에서 삭제
    DB.members = DB.members.filter(m => m.zone !== zone);
    // 전도대상자/회비지원도 함께 정리 (memberId 또는 zone+name 매칭)
    DB.evangelism = DB.evangelism.filter(e => !removedIds.has(e.memberId) && e.zone !== zone);
    DB.feeSupport = DB.feeSupport.filter(f => !removedIds.has(f.memberId) && f.zone !== zone);
    logHistory('구역 초기화', zone + ' ' + count + '명');
    saveDB();
    render();
    // 되돌리기 토스트 — 클릭 시 스냅샷 복원
    toastUndo(`${zone} ${count}명을 삭제했어요`, () => {
      DB.members.push(...snapshot.members);
      DB.evangelism.push(...snapshot.evangelism);
      DB.feeSupport.push(...snapshot.feeSupport);
      logHistory('초기화 복구', zone + ' ' + count + '명');
      saveDB();
      render();
      toast(`${zone} ${count}명을 복구했어요`);
    });
  }, '초기화');
}

// ===== 미배차자 관리 (차편 미정 인원 배차) =====
// 가나다순 배차 옵션: 기타 교통편(OTHER_TRANSPORTS) + 개인차 차주(PRIVATE_CAR_LIST)
function unassignedVehicleOptions() {
  // 순서: 본대 버스(호차) → 교회차 → 기타(타교회·대중교통 등) → 개인차(가나다순)
  const buses = (BUSES || []).map(v => ({ name: v, kind: 'bus' }));
  const churchCars = (CHURCH_CARS || []).map(v => ({ name: v, kind: 'etc' }));
  const others = (OTHER_TRANSPORTS || []).map(v => ({ name: v, kind: 'etc' }));
  const drivers = (PRIVATE_CAR_LIST || []).slice().sort((a, b) => a.localeCompare(b, 'ko')).map(v => ({ name: v, kind: 'private' }));
  return [...buses, ...churchCars, ...others, ...drivers];
}
// 특정 차수·방향이 미배정인지.
//  - 교통수단 종류(kind)를 아예 안 정했거나
//  - 종류는 정했지만(개인차/기타) 세부 차편(vehicle)을 안 정한 경우 → 미배정
//  단, 버스(bus)는 호차 미정이어도 '본대 배정'에서 다루므로 미배정에서 제외(중복 방지)
function isDirUnassigned(m, sname, dir) {
  const st = (m.sessionTrans && m.sessionTrans[sname]) || null;
  if (!st) return true;
  const kind = dir === 'up' ? st.upKind : st.downKind;
  const vehicle = dir === 'up' ? st.upVehicle : st.downVehicle;
  if (!kind) return true;            // 종류 자체를 안 정함
  if (kind === 'bus') return false;  // 버스는 본대 배정에서 처리
  return !vehicle;                   // 개인차/기타인데 세부 차편 미선택 → 미배정
}
// 미배차 항목: 차수·방향별 {m, sname, dir, date}
function unassignedItems(sname, dir) {
  const items = [];
  boardableMembers().forEach(m => {
    if (!memberSessions(m).includes(sname)) return;
    if (isDirUnassigned(m, sname, dir)) {
      const st = (m.sessionTrans && m.sessionTrans[sname]) || {};
      const date = dir === 'up' ? (st.upDate || '') : (st.downDate || '');
      items.push({ m, sname, dir, date });
    }
  });
  return items;
}
// 출발 가능 시간 저장
function setDepartTime(memberId, sname, dir, val) {
  const m = DB.members.find(x => x.id === memberId);
  if (!m) return;
  if (!m.sessionTrans) m.sessionTrans = {};
  if (!m.sessionTrans[sname]) m.sessionTrans[sname] = {};
  m.sessionTrans[sname][dir === 'up' ? 'upDepartTime' : 'downDepartTime'] = val;
  saveVault();
}
// 배차: 선택한 차편으로 배정 (kind 자동 판정). 배정되면 목록에서 사라지고 해당 차편 명단에 들어감.
//  특수값 '__bus__' = 본대 버스로 지정(호차는 아직 미정) → 본대 배정 화면에서 호차를 정함
function assignUnassigned(memberId, sname, dir, vehicle) {
  const m = DB.members.find(x => x.id === memberId);
  if (!m || !vehicle) return;
  if (!m.sessionTrans) m.sessionTrans = {};
  if (!m.sessionTrans[sname]) m.sessionTrans[sname] = {};
  const st = m.sessionTrans[sname];
  let kind, veh;
  if (vehicle === '__bus__') { kind = 'bus'; veh = ''; }  // 본대 버스(호차 미정) → 본대 배정으로
  else { kind = kindOfVehicle(vehicle) || 'etc'; veh = vehicle; }
  if (dir === 'up') { st.upKind = kind; st.upVehicle = veh; }
  else { st.downKind = kind; st.downVehicle = veh; }
  recalcMemberRepTrans(m);
  const vLabel = (vehicle === '__bus__') ? '본대 버스' : vehicle;
  logHistory('차편 배정', m.name + '(' + m.zone + ') · ' + sname + ' ' + (dir === 'up' ? '상행' : '하행') + ' ' + vLabel);
}

// 미배정 본문 HTML만 생성 (인라인/시트 공용)
function unassignedBodyHtml(inline, onlySession) {
  // 드롭다운: 본대 버스(호차 미정) + 각 호차 → 교회차 → 기타 → 개인차(가나다순).
  //  호차가 정해졌으면 특정 호차를, 아직이면 '본대 버스'를 선택 (호차는 나중에 본대 배정에서 지정)
  const optHtml = () => {
    const buses = (BUSES || []);
    const churchCars = (CHURCH_CARS || []);
    const others = (OTHER_TRANSPORTS || []);
    const drivers = (PRIVATE_CAR_LIST || []).slice().sort((a, b) => a.localeCompare(b, 'ko'));
    const grp = (label, arr) => arr.length ? `<optgroup label="${esc(label)}">${arr.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('')}</optgroup>` : '';
    // 본대 버스 그룹: 맨 위에 '본대 버스(호차 미정)' + 각 호차
    const busGrp = `<optgroup label="본대 버스"><option value="__bus__">본대 버스 (호차 미정)</option>${buses.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('')}</optgroup>`;
    return `<option value="">─ 배차 ─</option>`
      + busGrp
      + grp('교회차', churchCars)
      + grp('기타', others)
      + grp('개인차', drivers);
  };
  const sessions = getSessionDefs().map(d => d.name).filter(n => !onlySession || n === onlySession);  // 차수 상세 보기
  const gridCols = '28px 52px 58px 52px 56px 92px';  // 번호·구역·성명·부서·출발·교통편
  const backFn = inline ? 'gotoUnassigned' : 'openUnassignedSheet';

  // 한 방향(상/하행) 명단: 날짜별 그룹
  const buildSide = (sname, dir, label) => {
    const items = unassignedItems(sname, dir);
    if (!items.length) {
      return `<div style="flex:1; min-width:0;">
        <div style="font-weight:700; color:var(--gold-soft); margin-bottom:4px; text-align:center; font-size:12px;">${label}</div>
        <div style="padding:12px; text-align:center; color:var(--ink-mute); font-size:11px;">없음</div>
      </div>`;
    }
    const byDate = {};
    items.forEach(it => { const k = it.date || '___'; (byDate[k] = byDate[k] || []).push(it); });
    const dateKeys = Object.keys(byDate).sort((a,b)=>{ if(a==='___')return 1; if(b==='___')return -1; return a.localeCompare(b); });
    let blocks = '';
    dateKeys.forEach(dk => {
      const list = byDate[dk].slice().sort((x,y)=>memberSortCmp(x.m, y.m));
      const dateLabel = dk==='___' ? '날짜 미정' : fmtMDw(dk);
      let rows = '';
      list.forEach((it, i) => {
        const m = it.m;
        const st = (m.sessionTrans && m.sessionTrans[sname]) || {};
        const depart = (dir==='up' ? st.upDepartTime : st.downDepartTime) || '';
        rows += `<div class="roster-row" style="grid-template-columns:${gridCols};">
          <div class="no">${i+1}</div>
          <div style="font-size:12px; white-space:nowrap;">${esc(m.zone)}</div>
          <div class="nm" style="cursor:pointer;color:var(--gold-soft);font-size:13px;" onclick="openMemberById('${esc(m.id)}', {fn:'${backFn}'})">${esc(m.name)}</div>
          <div style="font-size:12px;">${esc(m.dept)}</div>
          <div><input type="text" class="ua-depart" data-id="${esc(m.id)}" data-s="${esc(sname)}" data-dir="${dir}" value="${esc(depart)}" placeholder="시간" style="width:100%; font-size:11px; padding:4px;"/></div>
          <div><select class="ua-assign sel-compact" data-id="${esc(m.id)}" data-s="${esc(sname)}" data-dir="${dir}" style="width:100%; font-size:11px;">${optHtml()}</select></div>
        </div>`;
      });
      blocks += `<div style="margin-top:6px;">
        <div style="font-size:10px; font-weight:700; color:var(--ink-soft); background:var(--bg-2); padding:3px 6px; border-radius:5px;">${esc(dateLabel)} · ${list.length}명</div>
        <div class="roster-table" style="min-width:378px; width:max-content; margin-top:3px;">
          <div class="roster-row head" style="grid-template-columns:${gridCols};"><div class="no">번호</div><div>구역</div><div>성명</div><div>부서</div><div>출발</div><div>교통편</div></div>
          ${rows}
        </div>
      </div>`;
    });
    return `<div style="flex:1; min-width:0;">
      <div style="font-weight:700; color:var(--gold-soft); margin-bottom:4px; text-align:center; font-size:12px;">${label} (${items.length})</div>
      <div>${blocks}</div>
    </div>`;
  };

  let body = `<div style="font-size:12px; color:var(--ink-mute); margin-bottom:10px;">아직 차편이 정해지지 않은 인원입니다. 출발 가능 시간을 적고 교통편을 선택해 배차하세요. 배차하면 해당 차편 명단으로 이동합니다.</div>`;
  sessions.forEach(sname => {
    const upN = unassignedItems(sname, 'up').length;
    const downN = unassignedItems(sname, 'down').length;
    if (upN === 0 && downN === 0) return;  // 미배차 없는 차수는 생략
    body += `<div style="margin-bottom:16px;">
      <div style="font-size:13px; font-weight:800; color:var(--gold); border-bottom:1px solid var(--line); padding-bottom:4px; margin-bottom:8px;">${esc(sname)}</div>
      <div style="overflow-x:auto;"><div style="display:flex; gap:10px; align-items:flex-start; width:max-content; min-width:100%;">
        ${buildSide(sname,'up','상행')}
        ${buildSide(sname,'down','하행')}
      </div></div>
    </div>`;
  });
  if (sessions.every(sn => unassignedItems(sn,'up').length===0 && unassignedItems(sn,'down').length===0)) {
    body += `<div style="text-align:center; padding:20px; color:var(--ink-mute); font-size:13px;">모든 인원이 배차되었습니다.</div>`;
  }
  return body;
}
// 미배정 이벤트 바인딩. onUpdate: 배차 후 갱신 방법
function bindUnassigned(root, onUpdate) {
  (root || document).querySelectorAll('.ua-depart').forEach(inp => {
    inp.addEventListener('change', () => { if(guardViewOnly()){return;} setDepartTime(inp.dataset.id, inp.dataset.s, inp.dataset.dir, inp.value); });
  });
  (root || document).querySelectorAll('.ua-assign').forEach(sel => {
    sel.onchange = () => { if(guardViewOnly()){return;} if(sel.value){ assignUnassigned(sel.dataset.id, sel.dataset.s, sel.dataset.dir, sel.value); onUpdate(); } };
  });
}

function openUnassignedSheet(isReopen) {
  const body = tbdNoticeHtml() + unassignedBodyHtml(false);
  openSheet('미배정자 배차', body, null, {
    hideSave:true, replaceTop:!!isReopen, reopener:()=>openUnassignedSheet(true),
    afterPaint:()=>{ bindUnassigned(document, ()=>openUnassignedSheet(true)); }
  });
}

// 본대 외 차편의 '차수별' 전체보기·사진·인쇄 버튼 묶음 (각 차수 블록 헤더용)
function transSessionActions(sname) {
  const sj = esc(sname).replace(/'/g, "\\'");
  return `<span style="margin-left:auto; display:flex; gap:6px; flex-shrink:0;">` +
    `<button class="card-action" style="font-size:11px;padding:3px 8px;" onclick="openTransportFull('${sj}')">전체보기</button>` +
    `<button class="card-action" style="font-size:11px;padding:3px 8px;" onclick="photoRun('execPrintTransport','${sj}')">사진</button>` +
    `<button class="card-action" style="font-size:11px;padding:3px 8px;" onclick="execPrintTransport('${sj}')">인쇄</button></span>`;
}
// onlySession: 특정 차수만 담기 (차수별 전체보기 버튼 경로). 비우면 기존처럼 전체.
function openTransportFull(onlySession) {
  // '본대 버스' 통합 칩에서 호차 상세를 보는 중이면 그 호차로 동작
  const type = (transportTab.type === '__mainbus__' && transportTab.session) ? transportTab.session : transportTab.type;
  let body = '';
  if (BUSES.includes(type)) {
    // 본대 버스: 본 교회 차수 탑승자만
    const u = boardableMembers().filter(m => m.transUp === type).sort(memberSortCmp);
    const d = boardableMembers().filter(m => m.transDown === type).sort(memberSortCmp);
    const churchN = churchSessionName();
    if (churchN) body += `<div style="font-size:12px; color:var(--ink-mute); margin-bottom:6px;">본 교회 차수(${esc(churchN)}) 탑승자</div>`;
    if (u.length===0 && d.length===0) body += `<div class="empty-state">해당 차편 등록자가 없습니다.</div>`;
    else body += buildSplitTable(null, u, d, false, null, type);
    body += busExtraEditor(type);
  } else if (type === '개인차') {
    const drv2 = privateDriversWithGroups();
    let anyPc = false;
    drv2.forEach(({driver, groups}) => {
      groups.forEach(g => {
        if (onlySession && g.session !== onlySession) return;  // 차수별 보기
        anyPc = true;
        body += `<div style="font-weight:700; margin:10px 0 6px; color:var(--gold-soft);">🚗 ${esc(driver)} · ${esc(g.session)}</div>`;
        body += buildSplitTable(null, g.uList, g.dList, false, driver, '개인차', g);
      });
    });
    if (!anyPc) body += `<div class="empty-state">${onlySession ? '이 차수에 개인차로 가는 사람이 없습니다.' : '개인차로 가는 사람이 없습니다.'}</div>`;
  } else {
    const canExtra = supportsExtras(type);
    let groups = sessionGroupsWithExtras(type);
    if (onlySession) groups = groups.filter(g => g.session === onlySession);  // 차수별 보기
    if (groups.length === 0) {
      if (canExtra && getSessionDefs().length) {
        body += `<div class="empty-state">해당 차편 등록자가 없습니다.<br/><span style="font-size:12px">아래에서 미등록 인원을 바로 추가할 수 있습니다.</span></div>`;
        getSessionDefs().filter(d => !onlySession || d.name === onlySession).forEach(def => {
          body += `<div style="font-weight:700; margin:10px 0 6px; color:var(--gold-soft);">${esc(type)} · ${esc(def.name)}</div>`;
          body += busExtraEditor(busExtraKey(type, def.name), type, def.name);
        });
      } else {
        body += `<div class="empty-state">해당 차편 등록자가 없습니다.</div>`;
      }
    } else {
      groups.forEach(g => {
        body += `<div style="font-weight:700; margin:10px 0 6px; color:var(--gold-soft);">${esc(type)} · ${esc(g.session)}</div>`;
        body += buildSplitTable(null, g.uList, g.dList, false, null, type, g);
        if (canExtra) body += busExtraEditor(busExtraKey(type, g.session), type, g.session);
      });
    }
  }
  const __pj = onlySession ? esc(onlySession).replace(/'/g, "\\'") : '';
  const printBar = `<div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:10px;"><button class="card-action" onclick="photoRun('execPrintTransport'${__pj ? `,'${__pj}'` : ''})">사진</button><button class="card-action" onclick="execPrintTransport(${__pj ? `'${__pj}'` : ''})">인쇄</button></div>`;
  openSheet(`${esc(type)} 탑승 명단${onlySession ? ' · ' + esc(onlySession) : ' 전체'}`, printBar + body, null, { hideSave:true });
  // 탑승 확인 체크박스 — 클릭 시 멤버에 저장 (상행=boardUp, 하행=boardDown)
  setTimeout(() => {
    document.querySelectorAll('#sheetBody .board-check').forEach(cb => {
      cb.addEventListener('change', () => setBoardCheck(cb.dataset.id, cb.dataset.dir, cb.checked, cb.dataset.ses || ''));
    });
    // 추가 탑승자 입력/삭제/탑승확인 (전체보기)
    const readBE = (bus) => {
      const q = (cls) => document.querySelector(`#sheetBody .${cls}[data-bus="${bus}"]`);
      const c=q('be-in-church'), n=q('be-in-name'), d=q('be-in-dept'), up=q('be-in-up'), dn=q('be-in-down');
      return { church:c?c.value:'', name:n?n.value:'', dept:d?d.value:'', up:up?up.checked:true, down:dn?dn.checked:true };
    };
    document.querySelectorAll('#sheetBody .bus-extra-add').forEach(btn => {
      btn.onclick = () => { if (guardViewOnly()) return; const o=readBE(btn.dataset.bus); if(o.name.trim()){ addBusExtra(btn.dataset.bus,o); openTransportFull(onlySession); } else toast('성명을 입력해 주세요', true); };
    });
    document.querySelectorAll('#sheetBody .be-in-name').forEach(inp => {
      inp.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); if(guardViewOnly())return; const o=readBE(inp.dataset.bus); if(o.name.trim()){ addBusExtra(inp.dataset.bus,o); openTransportFull(onlySession); } } });
    });
    document.querySelectorAll('#sheetBody .bus-extra-delrow').forEach(el => {
      el.onclick = () => { if (guardViewOnly()) return; removeBusExtraDir(el.dataset.bus, parseInt(el.dataset.idx,10), el.dataset.dir); openTransportFull(onlySession); };
    });
    document.querySelectorAll('#sheetBody .bus-extra-board').forEach(cb => {
      cb.addEventListener('change', () => { if (guardViewOnly()) { openTransportFull(onlySession); return; } setBusExtraField(cb.dataset.bus, parseInt(cb.dataset.idx,10), cb.dataset.field, cb.checked); });
    });
  }, 50);
}

function execPrintTransport(onlySession) {
  // '본대 버스' 통합 칩에서 호차 상세를 보는 중이면 그 호차로 동작
  const type = (transportTab.type === '__mainbus__' && transportTab.session) ? transportTab.session : transportTab.type;
  const titleText = `${getYearPrefix()} 하계수양회 - ${esc(type)} 탑승 명단${onlySession ? ' · ' + esc(onlySession) : ''}`;
  let body = `<div class="print-title">${titleText}</div>`;
  let maxCount = 0;  // 한 표(상/하행 중 많은 쪽)의 최대 인원 — 45명 이하면 압축 인쇄로 한 장에

  if (BUSES.includes(type)) {
    const u = boardableMembers().filter(m => m.transUp === type).sort(memberSortCmp);
    const d = boardableMembers().filter(m => m.transDown === type).sort(memberSortCmp);
    const churchN = churchSessionName();
    if (churchN) body += `<div style="font-size:12px; color:#555; margin-bottom:6px;">본 교회 차수(${esc(churchN)}) 탑승자</div>`;
    body += buildSplitTable(null, u, d, true, null, type);
    maxCount = Math.max(u.length + busExtraCount(type,'up'), d.length + busExtraCount(type,'down'));
  } else if (type === '개인차') {
    const drv2 = privateDriversWithGroups();
    let anyPc = false;
    drv2.forEach(({driver, groups}) => {
      groups.forEach(g => {
        if (onlySession && g.session !== onlySession) return;  // 차수별 인쇄
        anyPc = true;
        body += buildSplitTable(`🚗 ${esc(driver)} · ${esc(g.session)}`, g.uList, g.dList, true, driver, '개인차', g);
      });
    });
    if (!anyPc) body += `<div style="text-align:center; padding:20px; color:#666">${onlySession ? '이 차수에 개인차로 가는 사람이 없습니다.' : '개인차로 가는 사람이 없습니다.'}</div>`;
  } else {
    const canExtra = supportsExtras(type);
    let groups = sessionGroupsWithExtras(type);
    if (onlySession) groups = groups.filter(g => g.session === onlySession);  // 차수별 인쇄
    if (groups.length === 0) body += `<div style="text-align:center; padding:20px; color:#666">${onlySession ? '이 차수에 등록자가 없습니다.' : '해당 차편 등록자가 없습니다.'}</div>`;
    else groups.forEach(g => {
      body += buildSplitTable(`${esc(type)} · ${esc(g.session)}`, g.uList, g.dList, true, null, type, g);
      const exU = canExtra ? busExtraCount(busExtraKey(type, g.session), 'up') : 0;
      const exD = canExtra ? busExtraCount(busExtraKey(type, g.session), 'down') : 0;
      maxCount = Math.max(maxCount, g.uList.length + exU, g.dList.length + exD);
    });
  }
  // 버스·타교회(기타) 인쇄에서 최대 45명까지는 A4 한 장에 들어가도록 압축
  const compact = (BUSES.includes(type) || (type !== '개인차' && !BUSES.includes(type))) && maxCount > 0 && maxCount <= 45;
  if (compact) body = `<div class="compact-print">${body}</div>`;
  doPrint(titleText, body);
}

function execPrintSession(session) {
  // 명단 성격이므로 registeredMembers 기반(환불·불참·현장접수 포함해 표시), 영유아만 제외.
  const list = registeredMembers().filter(m => !isInfantDept(m.dept) && (m.session||"").split(",").map(x=>x.trim()).includes(session)).sort(memberSortCmp);
  const titleText = `${getYearPrefix()} 하계수양회 - ${session} 명단`;
  let ctr = 0;  // 정상 인원만 순번
  let trs = list.map((m) => {
    // 이 차수의 교통편만 표시 (환불·불참은 번호 칸에 표시 — 비고 열 없음)
    const t = sessionTransText(m, session);
    const transStr = (!t.up && !t.down) ? '' : esc(`상:${t.up||'-'} / 하:${t.down||'-'}`);
    let noCell, rowStyle = '';
    if (isUncountedOnsite(m)) { noCell = '<span style="color:#0a8f86;font-weight:700;">현장</span>'; }
    else if (m.status === 'refund') { noCell = '<span style="color:#c0392b;font-weight:700;">환불</span>'; rowStyle = 'color:#999; text-decoration:line-through; text-decoration-color:#c0392b;'; }
    else if (m.status === 'noshow') { noCell = '<span style="color:#c0392b;font-weight:700;">불참</span>'; rowStyle = 'color:#999;'; }
    else { ctr += 1; noCell = String(ctr); }
    return `<tr${rowStyle ? ` style="${rowStyle}"` : ''}>
      <td>${noCell}</td><td>${esc(m.zone)}</td><td class="print-name">${esc(m.name)}</td>
      <td>${esc(m.dept)}</td><td class="tl trans-cell">${transStr}</td>
    </tr>`;
  }).join('');
  if(!trs) trs = `<tr><td colspan="5" style="padding:20px;color:#666">인원이 없습니다.</td></tr>`;
  const body = `<div class="print-title">${titleText}</div>
    <table class="print-table" style="table-layout:fixed">
      <colgroup>
        <col style="width:7%"><col style="width:13%"><col style="width:17%">
        <col style="width:17%"><col style="width:46%">
      </colgroup>
      <thead><tr>
        <th>번호</th><th>구역</th><th>성명</th><th>회(부서)</th><th>교통편</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
  doPrint(titleText, body);
}

function execPrintDept(dept) {
  const list = registeredMembers().filter(m => m.dept === dept).sort(memberSortCmp);
  const titleText = `${getYearPrefix()} 하계수양회 - ${dept} 명단`;
  const body = `<div class="print-title">${titleText}</div>
    ${rosterPrintRowsHtml(list, 1, 'dept')}`;
  doPrint(titleText, body);
}

function execPrintEvangelism() {
  const titleText = `${getYearPrefix()} 하계수양회 - 전도대상자 명단`;
  let trs = sortMembers(evangelismVisible()).map((e, i) => `<tr>

// ── 시트(바텀시트) 화면 스택 ──────────────────────────────
// 명단창·편집창 등 "시트로 뜨는 화면"을 스택으로 관리한다.
// 화면을 하나 열 때마다 history.pushState를 한 번 한다 → 뒤로가기 1번 = 화면 1개 닫기.
// sheetStack의 각 항목: { render: 다시 그리는 함수(없으면 단순 시트), save, hideSave, title }
let sheetStack = [];
let sheetHandlers = { save: null, cancel: null, reopen: null }; // 하위호환(기존 코드가 참조)

// 실제로 시트 DOM에 내용을 표시 (스택 top 기준)
function paintSheetTop() {
  const top = sheetStack[sheetStack.length - 1];
  if (!top) return;
  $('#sheetTitle').textContent = top.title || '';
  const sbEl = $('#sheetBody');
  // 시트마다 sheet-body 레이아웃을 기본값(block)으로 초기화 — 특정 시트가 flex 등으로 바꿔도 다음 시트에 남지 않게
  sbEl.style.display = '';
  sbEl.style.flexDirection = '';
  sbEl.innerHTML = top.bodyHTML || '';
  sbEl.scrollTop = 0;
  $('#sheetSave').style.display = top.hideSave ? 'none' : '';
  $('#sheetSave').textContent = top.saveLabel || '저장';
  sheetHandlers.save = top.save || null;
  if (top.afterPaint) { try { top.afterPaint(); } catch(e){} }
}

// 시트 열기: 스택에 쌓고 history push (한 화면 = history 한 칸)
function openSheet(title, bodyHTML, onSave, opts={}) {
  const entry = { title, bodyHTML, save: onSave, hideSave: !!opts.hideSave, saveLabel: opts.saveLabel, afterPaint: opts.afterPaint || null, reopener: opts.reopener || null };

  if (opts.replaceTop && sheetStack.length) {
    // 현재 화면을 history 추가 없이 교체 (복귀 시 갱신용)
    sheetStack[sheetStack.length - 1] = entry;
  } else {
    sheetStack.push(entry);
    history.pushState({ sheetDepth: sheetStack.length }, '', '#sheet' + sheetStack.length);
  }

  $('#sheetBackdrop').classList.add('show');
  document.body.classList.add('sheet-open');
  paintSheetTop();
  requestAnimationFrame(() => $('#sheet').classList.add('show'));
}

// 시트 닫기(버튼/저장/백드롭): 직접 DOM을 건드리지 않고 history.back()만 부른다.
// → 실제 닫기는 popstate 핸들러(popSheetOnce)가 단독으로 수행한다(중복 방지).
// skipHistory=true는 특수한 경우(외부에서 강제 정리)로, 스택을 직접 비운다.
function closeSheet(skipHistory=false) {
  if (!sheetStack.length) {
    $('#sheet').classList.remove('show');
    setTimeout(() => $('#sheetBackdrop').classList.remove('show'), 280);
    document.body.classList.remove('sheet-open');
    return;
  }
  if (skipHistory) {
    // history를 건드리지 않고 한 단계만 정리 (보통은 쓰지 않음)
    popSheetOnce();
    return;
  }
  history.back();  // popstate → popSheetOnce 가 실제 닫기 수행
}

// 시트 한 단계 닫기 실행부 (popstate에서만 호출)
function popSheetOnce() {
  if (!sheetStack.length) return;
  sheetStack.pop();
  if (sheetStack.length > 0) {
    const below = sheetStack[sheetStack.length - 1];
    if (below && typeof below.reopener === 'function') below.reopener(); // 데이터 갱신하며 복귀
    else paintSheetTop();
  } else {
    $('#sheet').classList.remove('show');
    setTimeout(() => $('#sheetBackdrop').classList.remove('show'), 280);
    document.body.classList.remove('sheet-open');
    sheetHandlers = { save: null, cancel: null, reopen: null };
  }
}

// 뒤로가기 통합 처리: ① 시트가 떠 있으면 한 단계 닫기 ② 숙소 탭 칩이 쌓여 있으면 전체 칩으로 복귀 ③ 그 외엔 가로채지 않음(앱 종료)
window.__getSheetDepth = function(){ return sheetStack.length; };
function handleAppBack() {
  if (sheetStack.length > 0) { popSheetOnce(); return; }
  if (__lgChipPushed) {
    __lgChipPushed = false;
    if (currentTab === 'lodging' && lodgingTab.name !== '__all__') { lodgingTab.name = '__all__'; render(); }
    return;
  }
  if (__trChipPushed) {
    __trChipPushed = false;
    if (currentTab === 'transport' && transportTab.session) { transportTab.session = ''; render(); }
    return;
  }
}
window.addEventListener('popstate', handleAppBack);

$('#sheetCancel').onclick = () => closeSheet();
$('#sheetBackdrop').onclick = () => closeSheet();
$('#sheetSave').onclick = () => { if (sheetHandlers.save) { if (sheetHandlers.save() !== false) closeSheet(); } else closeSheet(); };

          if (extraDown) down = `${m.extraDown[extraDown]} (${extraDown})`;
          const transStr = allSessionsTransText(m, true);  // 모든 차수 교통편 줄바꿈 표시
          return `<div class="roster-row" style="grid-template-columns: 28px 50px 50px 52px 250px minmax(64px,max-content) minmax(80px,1fr);"><div class="no">${numberCell(m, __ctr)}</div><div class="nm" style="cursor:pointer;color:var(--gold-soft)" onclick="openMemberById('${esc(m.id)}', {fn:'openZoneSheet', arg:'${esc(zone)}'})">${esc(m.name)}${zone===OTHER_CHURCH_ZONE?`<div style="font-size:10px;color:var(--ink-mute);font-weight:400;line-height:1.2">${esc(m.zone)}</div>`:''}</div><div>${esc(m.dept)}</div><div>${sessionCell(m)}</div><div style="font-size:11px;white-space:nowrap;line-height:1.3;">${transStr}</div><div style="white-space:nowrap;">${esc(m.lodging)}</div><div style="white-space:nowrap;">${esc(m.note)}</div></div>`;
        }).join(''); })()}
        ${list.length===0 ? `<div style="padding:20px;text-align:center;color:var(--ink-mute)">인원이 없습니다.</div>`:''}
      </div>
    </div>
  `;
  openSheet(`${zone} 명단`, html, null, {hideSave:true, replaceTop:!!isReopen, reopener:()=>openZoneSheet(zone, true)});
}

function openDeptSheet(dept, isReopen) {

          if (extraUp) up = `${m.extraUp[extraUp]} (${extraUp})`;
          if (extraDown) down = `${m.extraDown[extraDown]} (${extraDown})`;
          const transStr = allSessionsTransText(m, true);  // 모든 차수 교통편 줄바꿈 표시
          return `<div class="roster-row" style="grid-template-columns: 28px 68px 52px 40px 250px minmax(64px,max-content) minmax(80px,1fr);"><div class="no">${numberCell(m, __ctr)}</div><div>${esc(m.zone)}</div><div class="nm" style="cursor:pointer;color:var(--gold-soft)" onclick="openMemberById('${esc(m.id)}', {fn:'openDeptSheet', arg:'${esc(dept)}'})">${esc(m.name)}</div><div style="white-space:nowrap;">${sessionCell(m)}</div><div style="font-size:11px;white-space:nowrap;line-height:1.3;">${transStr}</div><div style="white-space:nowrap;">${esc(m.lodging)}</div><div style="white-space:nowrap;">${esc(m.note)}</div></div>`;

  openSheet(`${dept} 명단`, html, null, {hideSave:true, replaceTop:!!isReopen, reopener:()=>openDeptSheet(dept, true)});

// ===== 본대(호차) 배정 =====
// 본 교회 차수의 상행이 버스인 사람 = 본대 탑승 대상. 호차는 그 차수 상행 차편(upVehicle)에 저장.
function busAssignMembers(dir) {
  const ch = churchSessionName();
  if (!ch) return [];
  const kindKey = dir === 'down' ? 'downKind' : 'upKind';
  return boardableMembers().filter(m => {
    if (!memberSessions(m).includes(ch)) return false;
    const st = (m.sessionTrans && m.sessionTrans[ch]) || null;
    return st && st[kindKey] === 'bus';
  }).sort(memberSortCmp);
}
// 특정 멤버의 본 차수 상행/하행 호차를 변경 (배정 화면 / 인원폼 공통 경로)
//  silent=true면 이력을 남기지 않음(구역 일괄 배정에서 한 건만 남기기 위함)
function setMemberBus(memberId, busName, dir, silent) {
  const ch = churchSessionName();
  const m = DB.members.find(x => x.id === memberId);
  if (!m || !ch) return;
  if (!m.sessionTrans) m.sessionTrans = {};
  if (!m.sessionTrans[ch]) m.sessionTrans[ch] = {};
  const st = m.sessionTrans[ch];
  const def = sessionDefByName(ch);
  if (dir === 'down') {
    st.downKind = 'bus';
    st.downVehicle = busName || '';
    if (!st.downDate && def && def.downDate) st.downDate = def.downDate;
  } else {
    st.upKind = 'bus';
    st.upVehicle = busName || '';
    if (!st.upDate && def && def.upDate) st.upDate = def.upDate;
  }
  recalcMemberRepTrans(m);
  if (!silent) {
    const busLabel = busName || '(호차 해제)';
    logHistory('호차 배정', m.name + '(' + m.zone + ') · ' + (dir === 'down' ? '하행' : '상행') + ' ' + busLabel);
  }
  saveVault();
}
// 구역 일괄: 그 구역의 본대 대상(해당 방향) 전원에게 호차 배정
function setZoneBus(zone, busName, dir) {
  const targets = busAssignMembers(dir).filter(m => m.zone === zone);
  targets.forEach(m => setMemberBus(m.id, busName, dir, true));  // 개별 이력 억제
  if (targets.length) logHistory('호차 일괄배정', zone + ' ' + (dir === 'down' ? '하행' : '상행') + ' ' + (busName || '해제') + ' ' + targets.length + '명');
}

// 본대 배정 본문 HTML만 생성 (인라인/시트 공용). inline=true면 멤버 클릭 back 함수가 인라인 렌더용
// 본대 배정: 구역 접힘 상태 ('방향|구역' → 열림). 기본은 '미배정이 남은 구역만 펼침'.
const __baZoneOpen = new Map();
function toggleBaZone(key, open, inline) {
  __baZoneOpen.set(key, !!open);
  if (inline) render(); else openBusAssignSheet(true);
}
function busAssignBodyHtml(inline) {
  const ch = churchSessionName();
  const buses = BUSES.slice();
  const upList = busAssignMembers('up');
  const downList = busAssignMembers('down');
  const backFn = inline ? 'gotoBusAssign' : 'openBusAssignSheet';

  const busOpts = (cur) => ['', ...buses].map(b =>
    `<option value="${esc(b)}" ${cur===b?'selected':''}>${esc(b||'─ 미배정 ─')}</option>`).join('');
  const gridCols = '26px 50px 56px 64px 78px';  // 번호·구역·성명·부서·호차

  // 한 방향(상/하행) 명단: 구역별 그룹 + 구역 일괄 + 개별 호차
  const buildSide = (list, dir, label) => {
    if (!list.length) {
      return `<div style="flex:0 1 auto; min-width:150px;">
        <div style="font-weight:700; color:var(--gold-soft); margin-bottom:4px; text-align:center; font-size:12px;">${label} (0)</div>
        <div style="padding:12px; text-align:center; color:var(--ink-mute); font-size:11px;">없음</div>
      </div>`;
    }
    const zoneOrder = [];
    list.forEach(m => { if (!zoneOrder.includes(m.zone)) zoneOrder.push(m.zone); });
    zoneOrder.sort((a,b) => zoneRank(a) - zoneRank(b));
    let blocks = '';
    let no = 0;
    zoneOrder.forEach(zone => {
      const zoneMembers = list.filter(m => m.zone === zone);
      // 이 구역 전원이 같은 호차면 그 호차를, 아니면(섞임/없음) 미배정을 드롭다운에 표시
      const zoneVehicles = zoneMembers.map(m => { const st=(m.sessionTrans&&m.sessionTrans[ch])||{}; return (dir==='down'?st.downVehicle:st.upVehicle)||''; });
      const uniformBus = (zoneVehicles.length && zoneVehicles.every(v => v && v === zoneVehicles[0])) ? zoneVehicles[0] : '';
      const assignedN = zoneVehicles.filter(v => v).length;
      const unN = zoneMembers.length - assignedN;
      const zkey = dir + '|' + zone;
      const open = __baZoneOpen.has(zkey) ? __baZoneOpen.get(zkey) : unN > 0;  // 기본: 미배정 남은 구역만 펼침
      const zj = esc(zkey).replace(/'/g, "\\'");
      blocks += `<div class="clickable" onclick="toggleBaZone('${zj}', ${open ? 0 : 1}, ${inline ? 1 : 0})" style="display:flex; align-items:center; gap:6px; margin:8px 0 3px; padding:6px 7px; background:var(--bg-2); border-radius:7px; cursor:pointer;">
        <span style="font-weight:800; color:var(--gold-soft); font-size:12px;">${esc(zone)}</span>
        <span style="font-size:11px; color:${unN ? 'var(--rose)' : 'var(--ink-soft)'};">배정 ${assignedN}/${zoneMembers.length}${unN ? ' · 미배정 ' + unN : ''}</span>
        <select class="zone-bus-select sel-compact" data-zone="${esc(zone)}" data-dir="${dir}" onclick="event.stopPropagation()" style="width:88px; font-size:11px; margin-left:auto;"><option value="" ${uniformBus===''?'selected':''}>미배정</option>${buses.map(b=>`<option value="${esc(b)}" ${uniformBus===b?'selected':''}>${esc(b)}</option>`).join('')}</select>
        <span style="font-size:11px; color:var(--ink-mute);">${open ? '▲' : '▼'}</span>
      </div>`;
      if (open) {
      blocks += `<div class="roster-table" style="min-width:274px; width:max-content;">
        <div class="roster-row head" style="grid-template-columns:${gridCols};"><div class="no">번호</div><div>구역</div><div>성명</div><div>부서</div><div>호차</div></div>`;
      zoneMembers.forEach(m => {
        no++;
        const st = (m.sessionTrans && m.sessionTrans[ch]) || {};
        const cur = (dir === 'down' ? st.downVehicle : st.upVehicle) || '';
        blocks += `<div class="roster-row" style="grid-template-columns:${gridCols};">
          <div class="no">${no}</div>
          <div style="white-space:nowrap; font-size:12px;">${esc(m.zone)}</div>
          <div class="nm" style="cursor:pointer;color:var(--gold-soft);font-size:13px;" onclick="openMemberById('${esc(m.id)}', {fn:'${backFn}'})">${esc(m.name)}</div>
          <div style="font-size:12px;">${esc(m.dept)}</div>
          <div><select class="member-bus-select sel-compact" data-id="${esc(m.id)}" data-dir="${dir}" style="width:100%; font-size:11px;">${busOpts(cur)}</select></div>
        </div>`;
      });
      blocks += `</div>`;
      } else { no += zoneMembers.length; }
    });
    return `<div style="flex:0 1 auto; min-width:150px;">
      <div style="font-weight:700; color:var(--gold-soft); margin-bottom:4px; text-align:center; font-size:12px;">${label} (${list.length})</div>
      ${blocks}
    </div>`;
  };

  // 호차별 인원 요약 (상/하행 각각)
  const summaryOf = (list, dir) => {
    if (!ch || !list.length) return '';
    const counts = {}; buses.forEach(b => counts[b] = 0); let un = 0;
    list.forEach(m => { const st=(m.sessionTrans&&m.sessionTrans[ch])||{}; const v=dir==='down'?st.downVehicle:st.upVehicle; if(v&&counts[v]!==undefined)counts[v]++; else un++; });
    const parts = buses.map(b => `${esc(b)} ${counts[b]}`).join(' · ');
    return `${parts}${un?` · <span style="color:var(--rose);">미배정 ${un}</span>`:''}`;
  };

  if (!ch) {
    return `<div style="padding:20px;text-align:center;color:var(--ink-mute)">본 교회 차수가 설정되지 않았습니다.</div>`;
  } else if (!upList.length && !downList.length) {
    return `<div style="padding:20px;text-align:center;color:var(--ink-mute)">본대(버스) 탑승 대상이 없습니다.<br/><span style="font-size:11px;">인원 편집에서 본 교회 차수의 상행 또는 하행을 '버스'로 선택하면 여기에 나타납니다.</span></div>`;
  }
  const upSum = summaryOf(upList, 'up');
  const downSum = summaryOf(downList, 'down');
  return `<div style="font-size:12px; color:var(--ink-mute); margin-bottom:8px;">본 교회 차수(${esc(ch)})에 버스로 가는 인원입니다. 상행·하행 각각 호차를 배정하세요. 구역 제목을 누르면 명단이 접히고 펼쳐집니다(미배정이 남은 구역은 자동 펼침).</div>
    <div style="display:flex; gap:8px; margin-bottom:10px; font-size:11px;">
      <div style="flex:1; padding:6px 8px; background:var(--bg-2); border-radius:7px;"><b style="color:var(--gold-soft)">상행</b> ${upSum||'-'}</div>
      <div style="flex:1; padding:6px 8px; background:var(--bg-2); border-radius:7px;"><b style="color:var(--gold-soft)">하행</b> ${downSum||'-'}</div>
    </div>
    <div style="overflow-x:auto;"><div style="display:flex; gap:10px; align-items:flex-start; width:max-content; min-width:100%;">
      ${buildSide(upList, 'up', '상행')}
      ${buildSide(downList, 'down', '하행')}
    </div></div>`;
}
// 본대 배정 select 이벤트 바인딩. onUpdate: 갱신 방법(시트 재열기 또는 인라인 render)
function bindBusAssign(root, onUpdate) {
  (root || document).querySelectorAll('.member-bus-select').forEach(sel => {
    sel.onchange = () => { setMemberBus(sel.dataset.id, sel.value, sel.dataset.dir); onUpdate(); };
  });
  (root || document).querySelectorAll('.zone-bus-select').forEach(sel => {
    // 호차 선택 → 구역 전원 그 호차로 / '미배정'(빈값) 선택 → 구역 전원 호차 해제
    sel.onchange = () => { setZoneBus(sel.dataset.zone, sel.value, sel.dataset.dir); onUpdate(); };
  });
}

function openBusAssignSheet(isReopen) {
  const body = busAssignBodyHtml(false);
  openSheet('본대 배정', body, null, {
    hideSave:true, replaceTop:!!isReopen, reopener:()=>openBusAssignSheet(true),
    afterPaint:()=>{ bindBusAssign(document, ()=>openBusAssignSheet(true)); }
  });
}
// 차편 탭의 본대 배정/미배정 인라인 화면으로 전환 (멤버 상세에서 돌아올 때 등)
function gotoBusAssign() { transportTab.type = '__busassign__'; setTab('transport'); }
function gotoUnassigned() { transportTab.type = '__unassigned__'; setTab('transport'); }
// 특정 차편(호차/교회차/개인차/타교회) 탭으로 복귀 — 명단에서 성명 클릭 후 돌아올 때
function gotoTransportType(type) { if(type) transportTab.type = type; setTab('transport'); }

// 참석 상태: status = '' 정상 / 'noshow' 불참 / 'refund' 환불
function isNoShow(m){ return m && m.status === 'noshow'; }
function isRefund(m){ return m && m.status === 'refund'; }
function isOnsite(m){ return m && m.regType === 'onsite'; }
// 현장 접수자가 '등록'되었는지 (등록해도 regType은 onsite로 유지 — 현장 접수 이력 보존)
function isOnsiteRegistered(m){ return m && m.regType === 'onsite' && m.registered === true; }
// 명단 대상: 모두 포함 (현장접수자도 '오는 것 전제'로 명단에 넣음. 불참·환불은 표기하며 남김)
//  단, 현장접수자가 '불참'이면 명단에서도 제외 (접수현황 현장접수 명단에만 남김)
function isReg(m){ return !(m.regType === 'onsite' && m.status === 'noshow'); }
function registeredMembers(){ return DB.members.filter(isReg); }
// 집계(인원수·회비합계) 대상: 환불 제외 + 현장접수자는 '등록'된 경우만 포함 (미등록 현장접수는 집계 제외)
function isCounted(m){ return isReg(m) && m.status !== 'refund' && (m.regType !== 'onsite' || m.registered === true); }
function countedMembers(){ return DB.members.filter(isCounted); }
// 차편 명단용: 등록자 중 불참·환불 제외 (현장접수는 차편 포함 — 오는 것 전제로 준비)
function boardableMembers(){ return DB.members.filter(isBoardable); }
// 차편·숙소·전도 명단 대상: 불참·환불 제외 (현장접수는 포함)
function isBoardable(m){ return isReg(m) && m.status !== 'noshow' && m.status !== 'refund'; }
// 명단 차수란 표시: 불참→'불참', 환불→'환불', 정상→실제 차수
// 차수 칸 표기: 두 개씩 한 줄, 초과는 줄바꿈 (화면·사진·인쇄 공통)
function sessionPairsHtml(m) {
  const ss = memberSessions(m);
  if (!ss.length) return esc(m.session || '');
  const out = [];
  for (let i = 0; i < ss.length; i += 2) out.push(esc(ss.slice(i, i + 2).join(', ')));
  return out.join('<br/>');
}
function sessionCell(m){
  if (m.status === 'noshow') return '<span style="color:var(--rose);font-weight:700">불참</span>';
  if (m.status === 'refund') return '<span style="color:var(--rose);font-weight:700">환불</span>';
  return sessionPairsHtml(m);
}
// 불참·환불자 행에 밑줄(취소선 느낌) 스타일
function statusRowStyle(m){
  return (m.status === 'noshow' || m.status === 'refund') ? 'text-decoration:underline; text-decoration-color:var(--rose); text-underline-offset:3px;' : '';
}
// 비고란에 불참/환불 라벨을 앞에 붙임 (현장 표기는 번호란에서 처리)
function noteWithStatus(m){
  let label = '';
  if (m.status === 'noshow') label = '<span style="color:var(--rose);font-weight:700">불참</span>';
  else if (m.status === 'refund') label = '<span style="color:var(--rose);font-weight:700">환불</span>';
  const note = m.note || '';
  if (!label) return esc(note);
  return label + (note ? ' · ' + esc(note) : '');
}
// "영유아" 부서: 회별 카드와 차편에는 포함하되, 그 외 모든 인원 집계(총원/차수별/구역별/접수현황)에서는 제외한다.
function isInfantDept(dept) { return (dept || '').indexOf('영유아') >= 0; }
// 집계용 등록 인원: 영유아 제외 (회별·차편은 registeredMembers를 그대로 쓰므로 영향 없음)
function countableMembers(){ return countedMembers().filter(m => !isInfantDept(m.dept)); }
// 미등록 현장접수자인지 (명단엔 나오되 수에서 빼는 대상)
function isUncountedOnsite(m){ return m && m.regType === 'onsite' && m.registered !== true; }
// 명단 배열에서 '집계 대상 수'만 세기 (미등록 현장접수자 제외) — 숙소·차편 등의 'N명' 표기용
function countList(list){ return (list || []).filter(m => !isUncountedOnsite(m)).length; }
// 명단 번호란: 집계에서 빠지는 사람(현장 미등록·환불)은 순번 대신 상태 라벨, 나머지는 순번.
//  번호가 매겨진 사람 = 그 명단의 집계 인원. 순번은 카운터 객체로 누적 관리.
//  사용법: 렌더 전에 const ctr={n:0}; 각 행에서 numberCell(m, ctr)
function numberCell(m, ctr){
  if (isUncountedOnsite(m)) return '<span style="color:var(--accent-teal);font-weight:700;font-size:11px">현장</span>';
  if (m.status === 'refund') return '<span style="color:var(--rose);font-weight:700;font-size:11px">환불</span>';
  ctr.n += 1;
  return String(ctr.n);
}
// 전도/회비 항목(멤버 아님)용 번호란 — 연결 멤버의 상태로 판정
function numberCellItem(item, ctr){
  const m = linkedMember(item);
  return numberCell(m || {}, ctr);
}
function membersByZone(zone) {
  // '타교회' 구역을 누르면 실제 교회명으로 저장된 모든 타교회 인원을 모아서 보여준다.
  if (zone === OTHER_CHURCH_ZONE) {
    return registeredMembers().filter(m => isOtherChurchZone(m.zone)).sort(memberSortCmp);
  }
  return registeredMembers().filter(m => m.zone === zone).sort(memberSortCmp);
}
// 구역 카드/칩의 인원수 집계용 — 환불 제외, 영유아 제외 (명단과 달리 카운트는 집계 기준)
function zoneCount(zone) {
  const inZone = (zone === OTHER_CHURCH_ZONE)
    ? countedMembers().filter(m => isOtherChurchZone(m.zone))
    : countedMembers().filter(m => m.zone === zone);
  return inZone.filter(m => !isInfantDept(m.dept)).length;
}

// ===== 통합 명단 정렬 =====
// 우선순위: 1)구역순(ZONES 배열 순서) 2)회(부서)순(DEPTS 배열 순서) 3)이름 가나다순
// 배열에 없는 값은 맨 뒤로.
function zoneRank(z) { const i = ZONES.indexOf(z); return i === -1 ? 9999 : i; }
function deptRank(d) { const i = DEPTS.indexOf(d); return i === -1 ? 9999 : i; }
function memberSortCmp(a, b) {
  const zr = zoneRank(a.zone) - zoneRank(b.zone);
  if (zr !== 0) return zr;
  // 같은 순위(둘 다 목록에 없음)면 문자열로 보조 비교
  if (zoneRank(a.zone) === 9999) { const zc = (a.zone||'').localeCompare(b.zone||'','ko'); if (zc !== 0) return zc; }
  const dr = deptRank(a.dept) - deptRank(b.dept);
  if (dr !== 0) return dr;
  if (deptRank(a.dept) === 9999) { const dc = (a.dept||'').localeCompare(b.dept||'','ko'); if (dc !== 0) return dc; }
  return (a.name||'').localeCompare(b.name||'','ko');
}
// 명단 배열을 표준 순서로 정렬해 반환 (원본 불변)
function sortMembers(list) { return list.slice().sort(memberSortCmp); }
// 전도/회비 항목에 연결된 멤버 찾기 (memberId 우선, 없으면 이름+구역)
function linkedMember(item){
  if (!item) return null;
  if (item.memberId) { const m = DB.members.find(x => x.id === item.memberId); if (m) return m; }
  if (item.name) { const m = DB.members.find(x => x.name === item.name && x.zone === item.zone && x.name !== ''); if (m) return m; }
  return null;
}
// 전도대상자 화면 명단: 연결 멤버가 불참·환불이면 제외 (자료·체크는 보존)
function evangelismVisible(){
  return DB.evangelism.filter(e => { const m = linkedMember(e); return !m || (m.status !== 'noshow' && m.status !== 'refund'); });
}
// 회비지원 화면 명단: 환불 제외. 일반 불참은 회비 유지하되, 현장접수 불참자는 제외(오지 않아 접수 자체가 없음)
function feeSupportVisible(){
  return DB.feeSupport.filter(f => {
    const m = linkedMember(f);
    if (!m) return true;
    if (m.status === 'refund') return false;
    if (m.regType === 'onsite' && m.status === 'noshow') return false;  // 현장접수 불참 → 회비 제외
    return true;
  });
}
// 집계(수·금액)용: 화면 명단에는 나오지만 미등록 현장접수자는 수에서 제외
//  (현장접수자는 '오는 것 전제'로 명단엔 넣되, 등록 전까지 집계에서 빼는 원칙)
function evangelismCounted(){
  return evangelismVisible().filter(e => { const m = linkedMember(e); return !(m && m.regType === 'onsite' && m.registered !== true); });
}
function feeSupportCounted(){
  return feeSupportVisible().filter(f => { const m = linkedMember(f); return !(m && m.regType === 'onsite' && m.registered !== true); });
}
// 구역별 전도대상자 수 (집계 기준: 미등록 현장접수·불참·환불 제외). 연결 멤버가 있으면 멤버의 구역을, 없으면 항목의 zone을 사용
function evangelismCountByZone(zone){
  return evangelismCounted().filter(e => { const m = linkedMember(e); const z = (m && m.zone) || e.zone || ''; return z === zone; }).length;
}
// 회(부서)별 전도대상자 수
function evangelismCountByDept(dept){
  return evangelismCounted().filter(e => { const m = linkedMember(e); const d = (m && m.dept) || e.dept || ''; return d === dept; }).length;
}
// 개인차 차주 우선 + 표준 정렬
function sortMembersDriverFirst(list, driver) {
  const drv = String(driver||'').trim();
  return list.slice().sort((a,b) => {
    if (drv) {
      const aD = (a.name||'').trim() === drv, bD = (b.name||'').trim() === drv;
      if (aD && !bD) return -1;
      if (!aD && bD) return 1;
    }
    return memberSortCmp(a,b);
  });
}
function totalRegistered() { return countableMembers().length; }  // 영유아 제외
function sessionCounts() {
  const r = Object.fromEntries(SESSIONS.map(s => [s, 0]));
  countableMembers().forEach(m => {  // 영유아 제외
    (m.session||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(s => {
      if (r.hasOwnProperty(s)) r[s]++;
    });
  });
  return r;
}
// 차수 미정 인원 수 (차수별 타일과 같은 기준: countableMembers, 영유아 제외)
function tbdCount() {
  return countableMembers().filter(m => memberSessions(m).includes(SESSION_TBD)).length;
}
// 차수 미정 안내 배너 (미배정 화면 상단) — 차수가 있어야 배차가 가능하므로 상기시킨다
function tbdNoticeHtml() {
  const n = SESSIONS.includes(SESSION_TBD) ? 0 : tbdCount();
  if (!n) return '';
  return `<div style="padding:9px 12px; border:1px dashed var(--rose); border-radius:9px; color:var(--rose); font-size:12.5px; margin:4px 0 10px;">⚠ 차수 미정 <b>${n}명</b> — 차수가 정해져야 차편을 배정할 수 있어요. (홈 → 차수별 인원 → <b>미정</b>)</div>`;
}
function deptCounts() {
  const r = Object.fromEntries(DEPTS.map(d => [d, 0]));
  countedMembers().forEach(m => { if (r.hasOwnProperty(m.dept)) r[m.dept]++; }); return r;
}
// 멤버 1인의 회비: 개별 지정(feeOverride)이 유효한 숫자면 그 값, 아니면 부서 단가.
//  feeOverride가 null/undefined/빈값이면 부서 단가를 그대로 사용(기존 데이터 호환).
function memberFee(m) {
  if (!m) return 0;
  const ov = m.feeOverride;
  if (ov !== null && ov !== undefined && ov !== '' && !isNaN(ov)) return Number(ov);
  return DB.fees[m.dept] || 0;
}
function feeTotalByDept() {
  const totals = Object.fromEntries(DEPTS.map(d => [d, 0]));
  countedMembers().forEach(m => { if (totals.hasOwnProperty(m.dept)) totals[m.dept] += memberFee(m); }); return totals;
}
function feeTotalByZone(zone) {
  // 회비 합계 — 환불자 제외 (집계 기준)
  const inZone = (zone === OTHER_CHURCH_ZONE)
    ? countedMembers().filter(m => isOtherChurchZone(m.zone))
    : countedMembers().filter(m => m.zone === zone);
  return inZone.reduce((s, m) => s + memberFee(m), 0);
}

function refreshMemberSearch() {
  const box = document.getElementById('memberSearchResult');
  if (box) box.innerHTML = memberSearchResultHtml(memberSearchQuery);
  const clr = document.getElementById('memberSearchClear');
  if (clr) clr.style.display = memberSearchQuery ? 'block' : 'none';
}
// 검색창 이벤트 바인딩 (render 후 호출)
// 검색 닫기 (검색어 비우고 결과 제거)
function closeMemberSearch() {
  memberSearchQuery = '';
  const input = document.getElementById('memberSearchInput');
  if (input) input.value = '';
  refreshMemberSearch();
}
let _memberSearchOutsideBound = false;
function bindMemberSearch() {
  const input = document.getElementById('memberSearchInput');
  if (!input) return;
  input.value = memberSearchQuery;
  input.oninput = () => { memberSearchQuery = input.value; refreshMemberSearch(); };
  const clr = document.getElementById('memberSearchClear');
  if (clr) clr.onclick = () => { memberSearchQuery = ''; input.value = ''; refreshMemberSearch(); input.focus(); };
  refreshMemberSearch();
  // 검색 영역 밖을 누르면 검색 닫기 (문서 전체에 한 번만 바인딩)
  if (!_memberSearchOutsideBound) {
    _memberSearchOutsideBound = true;
    document.addEventListener('pointerdown', (e) => {
      if (!memberSearchQuery) return;
      const box = document.getElementById('memberSearchInput');
      const res = document.getElementById('memberSearchResult');
      const clrBtn = document.getElementById('memberSearchClear');
      if (box && (box.contains(e.target) || (res && res.contains(e.target)) || (clrBtn && clrBtn.contains(e.target)))) return;
      closeMemberSearch();
    }, true);
  }
}

  const lodgings = getLodgings();
  const __le = (DB.settings && DB.settings.lodgingExtras) || {};
  const lodgingKeys = Array.from(new Set([ ...Object.keys(lodgings), ...Object.keys(__le).filter(k => (__le[k] || []).length) ])).sort();
  
  let html = `

        ${lExs.map((p, i) => `<div class="roster-row" style="grid-template-columns: 28px 45px 60px 60px 1fr;"><div class="no">${lList.length + i + 1}</div><div style="color:var(--indigo-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.church || '미등록')}</div><div class="nm" style="cursor:pointer;color:var(--gold-soft)" onclick="openLodgingExtraForm('${esc(lk).replace(/'/g,"\\'")}',${i})">${esc(p.name)}</div><div>${esc(p.dept || '')}</div><div style="white-space:nowrap;">${esc(p.note || '')}</div></div>`).join('')}

// 특정 숙소 1개만 전체 보기 (인쇄 없음)
// 숙소 명단 표 (공용) — 이름을 누르면 숙소 빠른 편집. extrasLk를 주면 그 숙소의 미등록 인원도 표시.
function lodgingRosterHtml(list, extrasLk) {
  const exs = extrasLk ? lodgingExtrasOf(extrasLk) : [];
  if (!list.length && !exs.length) return `<div style="text-align:center; padding:15px; font-size:12px; color:var(--ink-mute);">인원이 없습니다.</div>`;
  const exLkJs = extrasLk ? esc(extrasLk).replace(/'/g, "\\'") : '';
  return `<div style="overflow-x:auto;"><div class="roster-table" style="margin-bottom:0; min-width:400px;">
    <div class="roster-row head" style="grid-template-columns: 28px 45px 60px 60px 1fr;"><div class="no">번호</div><div>구역</div><div>성명</div><div>회(부서)</div><div>비고</div></div>
    ${list.map((m, i) => `<div class="roster-row" style="grid-template-columns: 28px 45px 60px 60px 1fr;"><div class="no">${i+1}</div><div>${esc(m.zone)}</div><div class="nm" style="cursor:pointer;color:var(--gold-soft);text-decoration:underline;text-decoration-style:dotted;" onclick="openLodgingQuickEdit('${esc(m.id)}')">${esc(m.name)}</div><div>${esc(m.dept)}</div><div style="white-space:nowrap;">${esc(m.note)}</div></div>`).join('')}
    ${exs.map((p, i) => `<div class="roster-row" style="grid-template-columns: 28px 45px 60px 60px 1fr;"><div class="no">${list.length + i + 1}</div><div style="color:var(--indigo-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.church || '미등록')}</div><div class="nm" style="cursor:pointer;color:var(--gold-soft);text-decoration:underline;text-decoration-style:dotted;" onclick="openLodgingExtraForm('${exLkJs}',${i})">${esc(p.name)}</div><div>${esc(p.dept || '')}</div><div style="white-space:nowrap;">${esc(p.note || '')}</div></div>`).join('')}
  </div></div>`;
}
// 숙소 집계 타일 (홈·숙소 탭 공용). mode='popup'(홈: 팝업 열기) | 'chip'(숙소 탭: 칩 전환)
function lodgingTilesHtml(mode) {
  const lodgings = getLodgings();
  const names = lodgingNamesAll();
  const unN = lodgingUnassigned().length;
  let out = names.map(n => {
    const cnt = (lodgings[n] || []).length + lodgingExtrasOf(n).length, cap = lodgingCapOf(n), over = cap && cnt > cap;
    const js = esc(n).replace(/'/g, "\\'");
    const oc = mode === 'chip' ? `setLodgingChip('${js}')` : `openSingleLodging('${js}')`;
    return `<div class="clickable" style="background:var(--bg-2);${over ? 'border:1px solid var(--rose);' : ''}border-radius:10px;padding:10px 8px;text-align:center" onclick="${oc}">
      <div style="font-size:11px;color:${over ? 'var(--rose)' : 'var(--ink-mute)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(n)}</div>
      <div style="font-size:16px;font-weight:700;margin-top:2px;${over ? 'color:var(--rose);' : ''}">${cnt}<span style="font-size:11px;font-weight:500;color:${over ? 'var(--rose)' : 'var(--ink-mute)'}">/${cap || '–'}</span></div>
    </div>`;
  }).join('');
  const unOc = mode === 'chip' ? `setLodgingChip('__un__')` : `openLodgingUnassignedSheet()`;
  if (unN) out += `<div class="clickable" style="background:rgba(232,113,133,.08);border:1px dashed var(--rose);border-radius:10px;padding:10px 8px;text-align:center" onclick="${unOc}">
      <div style="font-size:11px;color:var(--rose)">숙소 미배정</div>
      <div style="font-size:16px;font-weight:700;margin-top:2px;color:var(--rose)">${unN}</div>
    </div>`;
  if (!out) out = `<div style="grid-column:1/-1; text-align:center; padding:12px; font-size:12px; color:var(--ink-mute);">숙소가 아직 없습니다. 숙소 탭 → <b>숙소 관리</b>에서 추가하세요.</div>`;
  return out;
}
// 숙소 미배정 팝업 (홈 숙소 현황 타일용) — 다른 숙소 칸과 같은 방식: 팝업으로 뜨고 뒤로가기로 닫힘.
// 이름을 누르면 숙소·비고 편집이 열리고, 저장하고 돌아오면 목록이 갱신된다(배정된 사람은 빠짐).
function openLodgingUnassignedSheet(isReopen) {
  const list = lodgingUnassigned().slice().sort(memberSortCmp);
  let html = `<div class="notice" style="margin-bottom:8px;">본 차수 참여자 중 숙소가 아직 없는 인원입니다. 이름을 누르면 숙소를 정하고 비고도 적을 수 있어요.</div>`;
  html += lodgingRosterHtml(list);
  openSheet('숙소 미배정 (' + list.length + '명)', html, null, { hideSave: true, replaceTop: !!isReopen, reopener: () => openLodgingUnassignedSheet(true) });
}
// 개별 숙소 팝업 — 상단: 인원 추가 · 사진 · 인쇄. 이름을 누르면 숙소 편집.
function openSingleLodging(lk, isReopen) {
  const list = (getLodgings()[lk] || []).slice().sort(memberSortCmp);
  const exs = lodgingExtrasOf(lk);
  const total = list.length + exs.length;
  const cap = lodgingCapOf(lk);
  const lkJs = esc(lk).replace(/'/g, "\\'");
  let html = `<div style="display:flex; gap:8px; margin-bottom:10px;">
      <button class="btn btn-secondary" style="flex:1; padding:9px;" onclick="openLodgingAssign('${lkJs}')">+ 인원 추가</button>
      <button class="btn btn-secondary" style="flex:1; padding:9px;" onclick="photoRun('execPrintLodgingOne','${lkJs}')">사진</button>
      <button class="btn btn-secondary" style="flex:1; padding:9px;" onclick="execPrintLodgingOne('${lkJs}')">인쇄</button>
    </div>`;
  if (cap && total > cap) html += `<div style="padding:8px 12px; border:1px dashed var(--rose); border-radius:9px; color:var(--rose); font-size:12px; margin-bottom:8px;">⚠ 정원(${cap}명)을 ${total - cap}명 초과했어요.</div>`;
  html += `<div class="notice" style="margin-bottom:8px;">이름을 누르면 그 사람의 숙소와 비고를 바꿀 수 있어요. <b>미등록</b> 인원은 누르면 수정하거나 뺄 수 있어요.</div>`;
  html += lodgingRosterHtml(list, lk);
  openSheet(esc(lk) + ' (' + total + (cap ? '/' + cap : '') + '명)', html, null, { hideSave: true, replaceTop: !!isReopen, reopener: () => openSingleLodging(lk, true) });
}
// 숙소 인원 추가: 숙소 미배정(본 차수) 인원을 눌러서 바로 배정
// 인원 추가 시트의 검색어 — 배정할 때마다 목록이 새로고침되어도 검색어는 유지한다
let __lgAssignQ = '';
function bindLodgingAssignSearch() {
  const inp = document.getElementById('lgAsSearch');
  if (!inp) return;
  const apply = () => {
    const q = (inp.value || '').trim().toLowerCase().replace(/\s+/g, '');
    __lgAssignQ = inp.value || '';
    let shown = 0;
    document.querySelectorAll('.lg-as-row').forEach(r => {
      const hit = !q || (r.dataset.q || '').indexOf(q) >= 0;
      r.style.display = hit ? '' : 'none';
      if (hit) shown++;
    });
    const emp = document.getElementById('lgAsEmpty');
    if (emp) emp.style.display = shown ? 'none' : '';
  };
  inp.oninput = apply;
  apply();  // 새로고침(배정 직후)에도 이전 검색어 즉시 적용
}
function openLodgingAssign(lk, isReopen) {
  if (guardViewOnly()) return;
  if (!isReopen) __lgAssignQ = '';  // 새로 열 때는 검색 초기화
  const list = lodgingUnassigned().slice().sort(memberSortCmp);

function assignLodgingTo(mid, lk) {
  if (guardViewOnly()) return;

  const willBe = (getLodgings()[lk] || []).length + lodgingExtrasOf(lk).length + 1;

  syncEvangelismLodging(m);
  logHistory('숙소 변경', m.name + '(' + m.zone + ') · ' + lk);
  saveDB(); render();
  if (cap && willBe > cap) toast(m.name + ' 배정 — ⚠ 정원(' + cap + '명) 초과', true);
  else toast(m.name + ' → ' + lk);
  openLodgingAssign(lk, true);  // 목록 새로고침 (닫으면 스택을 따라 숙소 팝업/탭으로 복귀)
}
// 숙소 관리: 이름·정원 일괄 편집 (이름 변경 시 배정 인원도 따라감, 행 삭제 시 배정 해제)
function openLodgingManage(isReopen) {
  if (guardViewOnly()) return;
  ensureLodgingDefs();
  const defs = getLodgingDefs();
  const row = (d, i) => `<div class="lm-row" data-i="${i}" style="display:flex; gap:5px; margin-bottom:6px; align-items:center;">
      <input class="lm-name" value="${esc(d.name)}" placeholder="숙소 이름" style="flex:1; font-size:13px; padding:8px;"/>
      <input class="lm-cap" type="number" inputmode="numeric" min="0" value="${d.cap || ''}" placeholder="정원" style="width:64px; font-size:13px; padding:8px;"/>
      <button type="button" class="lm-del" style="padding:8px 10px; border:1px dashed var(--rose); border-radius:8px; background:transparent; color:var(--rose); cursor:pointer;">삭제</button>
    </div>`;
  const html = `
    <div class="notice">숙소 이름과 정원을 관리합니다. 이름을 바꾸면 배정된 인원의 숙소도 함께 바뀌고, 행을 삭제하면 그 숙소의 배정이 비워집니다. 정원을 비우면 '정원 미설정'입니다.</div>
    <div id="lmList">${defs.map(row).join('')}</div>
    <button type="button" id="lmAdd" class="btn btn-secondary btn-block" style="margin-top:4px;">+ 숙소 추가</button>`;
  openSheet('숙소 관리', html, () => {
    const olds = getLodgingDefs();
    const rows = Array.from(document.querySelectorAll('#lmList .lm-row'));
    const newDefs = []; const renames = [];
    for (const r of rows) {
      const name = r.querySelector('.lm-name').value.trim();
      const cap = parseInt(r.querySelector('.lm-cap').value, 10) || 0;
      if (!name) continue;
      if (newDefs.some(d => d.name === name)) { toast('숙소 이름이 겹쳐요: ' + name, true); return false; }
      const oi = parseInt(r.dataset.i, 10);
      if (oi >= 0 && olds[oi] && olds[oi].name !== name) renames.push([olds[oi].name, name]);
      newDefs.push({ name: name, cap: cap });
    }
    const seen = new Set(rows.map(r => parseInt(r.dataset.i, 10)).filter(i => i >= 0));
    const removed = olds.filter((d, i) => !seen.has(i)).map(d => d.name);
    renames.forEach(([o, n]) => {
      (DB.members || []).forEach(m => { if ((m.lodging || '').trim() === o) { m.lodging = n; syncEvangelismLodging(m); } });
      if (DB.settings.lodgingExtras && (DB.settings.lodgingExtras[o] || []).length) {  // 미등록 인원도 새 이름으로 이동
        DB.settings.lodgingExtras[n] = (DB.settings.lodgingExtras[n] || []).concat(DB.settings.lodgingExtras[o]);
        DB.settings.lodgingExtras[o] = [];  // 키 삭제 대신 툼스톤(동기화 부활 방지)
      }
    });
    removed.forEach(o => {
      (DB.members || []).forEach(m => { if ((m.lodging || '').trim() === o) { m.lodging = ''; syncEvangelismLodging(m); } });
      if (DB.settings.lodgingExtras && DB.settings.lodgingExtras[o]) DB.settings.lodgingExtras[o] = [];  // 미등록 인원도 정리(툼스톤)
    });
    newDefs.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    DB.settings.lodgings = newDefs;
    bumpLodgingRev();
    bumpLodgingExtrasRev();  // 이름 변경·삭제로 미등록도 함께 움직였을 수 있음
    if (renames.length) logHistory('숙소 이름 변경', renames.map(([o, n]) => o + '→' + n).join(', '));
    removed.forEach(o => logHistory('숙소 삭제', o));
    saveDB(); render();
    toast('숙소 목록을 저장했어요');
    return true;
  }, { saveLabel: '저장', replaceTop: !!isReopen, reopener: () => openLodgingManage(true), afterPaint: bindLodgingManage });
}
function bindLodgingManage() {
  const list = document.getElementById('lmList'); if (!list) return;
  const bindDel = (btn) => { btn.onclick = () => btn.closest('.lm-row').remove(); };
  list.querySelectorAll('.lm-del').forEach(bindDel);
  const add = document.getElementById('lmAdd');
  if (add) add.onclick = () => {

    div.className = 'lm-row'; div.dataset.i = '-1';
    div.style.cssText = 'display:flex; gap:5px; margin-bottom:6px; align-items:center;';

    list.appendChild(div); bindDel(div.querySelector('.lm-del'));
    const inp = div.querySelector('.lm-name'); if (inp) inp.focus();
  };
}

function buildMemberListHTML() {
  const z = rosterFilter.zone;
  const isAll = z === ALL_ZONES;
  if (!isAll && !ZONES.includes(z)) { rosterFilter.zone = ALL_ZONES; return buildMemberListHTML(); }
  const q = rosterFilter.q.toLowerCase().trim();
  const matches = (m) => !q || (m.name||'').toLowerCase().includes(q) || (m.dept||'').toLowerCase().includes(q);

  if (isAll) {
    const totalList = registeredMembers().filter(matches);
    if (totalList.length === 0) return `<div class="empty-state">${q ? '검색 결과 없음' : '등록된 인원이 없습니다.<br/><span style="font-size:12px;display:inline-block;margin-top:6px">우측 하단 + 버튼으로 새 인원을 추가하세요</span>'}</div>`;
    let html = '';
    ZONES.forEach(zn => {
      const zList = totalList.filter(m => m.zone === zn).sort(memberSortCmp);
      if (zList.length === 0) return;
      html += `<div style="margin:14px 4px 6px;font-size:12px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:6px"><span style="color:var(--gold-soft)">${esc(zn)}</span><span style="color:var(--ink-mute);font-weight:500">${zList.length}명</span></div>`;
      html += zList.map((m, i) => memberItemHTML(m, i+1)).join('');
    });
    const orphan = totalList.filter(m => !ZONES.includes(m.zone)).sort(memberSortCmp);
    if (orphan.length > 0) {
      html += `<div style="margin:14px 4px 6px;font-size:12px;font-weight:700;color:var(--rose)">미분류 (${orphan.length}명)</div>`;
      html += orphan.map((m, i) => memberItemHTML(m, i+1)).join('');
    }
    return html;
  } else {
    const list = membersByZone(z).filter(matches);
    if (list.length === 0) return `<div class="empty-state">${q ? '검색 결과 없음' : '해당 구역 인원이 없습니다.'}</div>`;
    return list.map((m, i) => memberItemHTML(m, i+1)).join('');
  }
}

function memberItemHTML(m, no) {
  const chips = [];
  if (m.session) chips.push(`<span class="chip">${esc(m.session)}</span>`);
  if (m.transUp) chips.push(`<span class="chip gold">↑${esc(m.transUp)}</span>`);
  if (m.transDown) chips.push(`<span class="chip indigo">↓${esc(m.transDown)}</span>`);
  for (const [k, v] of Object.entries(m.extraUp || {})) if(v) chips.push(`<span class="chip green">${k}</span>`);
  for (const [k, v] of Object.entries(m.extraDown || {})) if(v) chips.push(`<span class="chip green">${k}</span>`);
  
  return `
    <div class="member-item" data-id="${esc(m.id)}">
      <div class="no">${no}</div>
      <div class="info">
        <div class="name">${esc(m.name||'이름 미입력')}<span style="color:var(--ink-mute);font-weight:500;font-size:12px;margin-left:8px">${esc(m.dept||'')}</span></div>
        <div class="meta">${chips.join('')}</div>

}

// 현재 열린 인원 폼의 모든 개인차 select(.up-veh/.down-veh 중 개인차 종류인 것)를 새 목록으로 갱신
// selectName이 주어지면 그 차주를 선택 상태로 둠
function refreshAllPrivateSelects(selectName) {
  const opts = ['', ...vehiclesByKind('private')];
  document.querySelectorAll('#mSessionList .sess-block').forEach(block => {
    ['up','down'].forEach(dir => {
      const sel = block.querySelector('.' + dir + '-veh');
      if (!sel) return;
      // 이 select가 개인차 종류일 때만 (해당 방향 kind 라디오가 private이고 체크됨)
      const nm = block.dataset.name;
      const kindChecked = block.querySelector('input[name="' + dir + 'kind-' + nm + '"][value="private"]:checked');
      if (!kindChecked) return;
      const cur = sel.value;
      const keep = (selectName !== undefined && sel === document.activeElement) ? selectName : cur;
      const finalVal = (selectName !== undefined && PRIVATE_CAR_LIST.includes(selectName) && cur === '') ? selectName : keep;
      sel.innerHTML = opts.map(o => `<option value="${esc(o)}" ${o===finalVal?'selected':''}>${esc(o||'─ 선택 ─')}</option>`).join('');
      // 삭제 등으로 현재 값이 사라졌으면 빈칸으로
      if (!PRIVATE_CAR_LIST.includes(sel.value) && sel.value !== '') sel.value = '';
    });
  });
}

          });
          if (typeof updateTransportOptions === 'function') updateTransportOptions();
          logHistory('개인차 차주 삭제', nm + (users.length ? ' (' + users.length + '명 사용중)' : ''));
          saveDB();
          closeSheet(true);
          refreshAllPrivateSelects();  // 인원 폼의 select도 갱신
          toast('차주를 삭제했어요: ' + nm);
        };
        if (users.length) {
          confirmModal('차주 삭제', users.length + '명이 "' + nm + '" 차주를 쓰고 있어요. 삭제하면 그 인원의 개인차 선택이 비워집니다. 계속할까요?', doDelete, '삭제');
        } else {
          doDelete();
        }
      };
    });
  }, 50);
}

// 숙소만 간단히 편집 (홈 숙소 카드의 화면 성명 클릭용). 저장 후 홈 갱신.
// 차수 문자열 비교로 '본 차수 해제/복귀'를 감지 — 원칙: 특정 차수만 못 오면 상태 대신 그 차수를
// 해제한다(한 차수라도 참석하면 참석자). 본 차수 해제는 사실상 '본 차수 불참'이므로 이력에 명시한다.
function churchAbsenceDiff(oldStr, newStr) {
  const ch = churchSessionName();
  if (!ch) return '';
  const a = String(oldStr || '').split(',').map(x => x.trim());
  const b = String(newStr || '').split(',').map(x => x.trim());
  if (a.includes(ch) && !b.includes(ch)) return '본 차수 불참(차수 해제)';
  if (!a.includes(ch) && b.includes(ch)) return '본 차수 참석 복귀';
  return '';
}
// 인원 편집창의 숙소 칸 표시: 본 차수가 설정돼 있으면 그 차수를 체크했을 때만 보임 (숙소는 본 차수 전용)
function updateLodgingVisibility() {
  const fld = document.getElementById('mLodgingField');
  if (!fld) return;
  const church = churchSessionName();
  if (!church) { fld.style.display = ''; return; }
  const chk = document.querySelector('#mSessionList .sess-block[data-name="' + church.replace(/"/g, '\\"') + '"] .sess-check');
  fld.style.display = (chk && chk.checked) ? '' : 'none';
  // 본 차수 해제 = 본 차수 불참 표식 (헤더 오른쪽에 붉게 — 저장 시 숙소가 비워짐을 미리 알림)
  const blk = document.querySelector('#mSessionList .sess-block[data-name="' + church.replace(/"/g, '\\"') + '"]');
  if (blk) {
    let hint = blk.querySelector('.church-off-hint');
    if (!hint) {
      const head = blk.querySelector('.sess-head');
      if (head) {
        hint = document.createElement('span');
        hint.className = 'church-off-hint';
        hint.style.cssText = 'font-size:11px;color:var(--rose);font-weight:700;margin-left:6px;white-space:nowrap;';
        hint.textContent = '해제 = 본 차수 불참 · 숙소 비움';
        head.appendChild(hint);
      }
    }
    if (hint) hint.style.display = (chk && chk.checked) ? 'none' : '';
  }
}
// 인원 편집창 숙소 드롭다운 옆 '+ 추가 / 삭제' 버튼
function bindLodgingFieldButtons() {
  const addB = document.getElementById('mLodgingAdd'), delB = document.getElementById('mLodgingDel'), sel = document.getElementById('mLodging');

      name = (name || '').trim();
      if (!name) return;
      if (getLodgingDefs().some(d => d.name === name)) { sel.innerHTML = lodgingOptionsHtml(name); toast('이미 있는 숙소예요 — 선택해 두었어요'); return; }
      addLodgingDef(name, 0);
      sel.innerHTML = lodgingOptionsHtml(name);
      toast("숙소 '" + name + "' 추가");
    });
  };
  if (delB) delB.onclick = () => {

    const name = sel.value;
    if (!name) { toast('삭제할 숙소를 먼저 선택하세요', true); return; }
    const n = lodgingAssignedCount(name);

      removeLodgingDef(name);
      sel.innerHTML = lodgingOptionsHtml('');
      toast("숙소 '" + name + "' 삭제");
      render();
    }, '삭제');
  };
}

function openLodgingQuickEdit(memberId) {
  if (guardViewOnly()) return;

  if (!m) { toast('인원을 찾지 못했어요.', true); return; }
  const html = `

    <div class="field"><label>비고</label><input id="qNote" value="${esc(m.note||'')}" placeholder="예: 임산부, 1층 배정 (선택)"/></div>
    <div style="font-size:12px;color:var(--ink-mute);margin-top:4px;">숙소와 비고를 빠르게 바꿉니다. 새 숙소가 필요하면 숙소 탭의 <b>숙소 관리</b>에서, 다른 정보는 명단에서 성명을 눌러 수정하세요.</div>
  `;
  openSheet('숙소·비고 편집 · ' + m.name, html, function () {
    const v = ($('#qLodging').value || '').trim();
    const nt = ($('#qNote') ? ($('#qNote').value || '') : (m.note || '')).trim();
    const prevL = (m.lodging || '').trim();
    const prevN = (m.note || '').trim();
    const cap = v ? lodgingCapOf(v) : 0;
    const willOver = v && cap && ((getLodgings()[v] || []).filter(x => x.id !== m.id).length + lodgingExtrasOf(v).length + 1) > cap;
    m.lodging = v;
    m.note = nt;  // 비고는 멤버 비고(m.note)만 수정 — 전도대상자 비고(e.note)는 전도용 메모라 독립 유지
    syncEvangelismLodging(m);  // 연결된 전도대상자의 숙소도 함께 갱신 (숙소를 비우면 전도 숙소도 비워짐)
    saveDB(); render();
    if (v !== prevL) logHistory('숙소 변경', m.name + ' · ' + (v || '(비움)'));
    if (nt !== prevN) logHistory('비고 변경', m.name + ' · ' + (nt || '(비움)'));
    if (willOver) toast("'" + v + "' 정원(" + cap + "명)을 초과했어요", true);
    return true;  // closeSheet가 이어서 처리(스택 복귀)
  }, { saveLabel: '저장' });
}

function openMemberFromRef(memberId, name, zone, backFn) {

function openMemberById(id, back) {

  // 라디오 옵션 만들기 — 본대 + 기타 시점

      <div class="field" id="mZoneEtcField" style="display:${isOtherChurchZone(m.zone)?'block':'none'}"><label>교회 이름</label><input id="mZoneEtc" value="${esc((isOtherChurchZone(m.zone) && m.zone!==OTHER_CHURCH_ZONE)?m.zone:'')}" placeholder="예: 서울00교회"/></div>

        }).join('')}
        ${SESSIONS.includes(SESSION_TBD) ? '' : (() => {

          <div class="sess-block" data-name="${SESSION_TBD}" style="border:1px dashed var(--gold-soft); border-radius:10px; margin-bottom:8px; overflow:hidden;">
            <label class="sess-head" style="display:flex; align-items:center; gap:8px; padding:10px; cursor:pointer; background:${tbdChecked?'rgba(212,175,90,.10)':'transparent'};">

              <div style="font-size:12px; color:var(--ink-mute); line-height:1.5;">차수가 정해지면 이 체크를 풀고 실제 차수를 선택하세요. 그때 그 차수의 차편·날짜를 입력할 수 있습니다. 미정 인원은 홈 <b>차수별 인원</b>의 <b>⚠ 미정</b> 칸과 <b>입력 점검</b>에 모여 표시됩니다.</div>
            </div>
