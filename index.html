  e.target.value = '';
};


/* ===== 엑셀 내보내기 — 템플릿 ZIP을 직접 패치 (스타일·공식 100% 보존) =====
   원리: xlsx는 ZIP. 각 sheet은 xl/worksheets/sheetN.xml에 들어 있고
   셀은 <c r="B4" s="7"/> 형태. 값을 넣을 때 inlineStr 형식으로 셀 노드만 교체.
   styles.xml, sharedStrings.xml, theme 등은 손대지 않음 → 모든 디자인 그대로. */

// 기타 칸 값 → 차편 종류 분류 ('개인차' | '타교회' | '대중교통')
function classifyExtra(val) {
  const v = String(val || '').trim();
  if (!v) return '';
  if (v === '대중교통' || v.includes('대중교통')) return '대중교통';
  if (v === '타교회' || v.includes('타교회')) return '타교회';
  if (v.includes('교회차')) return '교회차';   // '교회차'/'교회차1'/'교회차2'
  return '개인차'; // 그 외(차주 이름 등)는 개인차
}
// '교회차' 단독 → '교회차1'로 정규화
function normChurchCar(val){
  const v = String(val||'').trim();
  if (v === '교회차') return '교회차1';
  return v;
}
// 엑셀 H/I 셀 표기: 교회차는 '교회차1/2', 대중교통/타교회는 그대로, 개인차는 이름만
function extraCellText(timeKey, val) {
  const kind = classifyExtra(val);
  if (kind === '교회차') return normChurchCar(val);
  if (kind === '개인차') {
    const name = String(val||'').trim();
    return (name && name !== '개인차') ? name : '개인차';  // 이름만
  }
  return kind; // '대중교통' | '타교회'
}
// 파일 저장: 환경별 최적 방법을 순서대로 시도
// 1) showSaveFilePicker(데스크톱 크롬: 폴더 직접 지정)
// 2) navigator.share 파일 공유(모바일/태블릿/PWA에서 가장 안정적 — 빈 파일 문제 회피)
// 3) <a download> 폴백
async function saveFileSmart(blob, fname, mime) {
  const file = new File([blob], fname, { type: mime });
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');

  // 모바일(특히 갤럭시 크롬)에서는 showSaveFilePicker가 폴더 창은 뜨지만
  // 실제 쓰기가 비어버리는 문제가 있어 → 공유를 먼저 시도한다.
  // 공유는 사용자가 "내 파일/드라이브에 저장"을 직접 골라 데이터가 온전히 전달된다.
  if (isMobile) {
    try {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: fname, text: fname });
        toast('공유 화면에서 저장 위치를 선택하세요');
        return true;
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return true; // 사용자가 공유 취소
      // 공유 불가/실패 → 다운로드로
    }
    return downloadViaAnchor(blob, fname);
  }

  // 데스크톱: File System Access API (폴더 직접 지정)
  if (typeof window.showSaveFilePicker === 'function') {
    try {
      const ext = fname.slice(fname.lastIndexOf('.'));
      const handle = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{ description: '파일', accept: { [mime]: [ext] } }],
      });
      const w = await handle.createWritable();
      await w.write(blob); await w.close();   // blob을 직접 write
      toast('파일이 저장됐어요');
      return true;
    } catch (err) {
      if (err && err.name === 'AbortError') return true;
      // 실패 시 다운로드로
    }
  }
  return downloadViaAnchor(blob, fname);
}

// 다운로드 폴백 (지연 revoke)
function downloadViaAnchor(blob, fname) {
  try {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; a.rel = 'noopener';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () { try { document.body.removeChild(a); } catch (e) {} URL.revokeObjectURL(url); }, 60000);
    toast('다운로드 폴더에 저장됐어요');
    return true;
  } catch (err) {
    toast('저장에 실패했어요. 다시 시도해 주세요.', true);
    return false;
  }
}

async function exportToExcel() {
  const title = DB.meta.title || '하계수양회';

  // 엑셀 서식 한도 (앱은 무제한이지만 내보내기는 템플릿 칸 수만큼만 포함)
  const XLSX_LIMITS = { zones: 20, buses: 10, churchCars: 5, privateCars: 30 };
  {
    const over = [];
    if (ZONES.length > XLSX_LIMITS.zones) over.push(`구역 ${ZONES.length}개 중 앞 ${XLSX_LIMITS.zones}개`);
    if (BUSES.length > XLSX_LIMITS.buses) over.push(`버스 ${BUSES.length}대 중 앞 ${XLSX_LIMITS.buses}대`);
    if (CHURCH_CARS.length > XLSX_LIMITS.churchCars) over.push(`교회차 ${CHURCH_CARS.length}대 중 앞 ${XLSX_LIMITS.churchCars}대`);
    if (over.length) {
      toast('엑셀에는 ' + over.join(', ') + '만 포함됩니다.', true);
    }
  }

  // 1) 템플릿 fetch
  // JSZip 확보 (SheetJS와 무관하게 독립 CDN으로 로드됨)
  const JSZip = (typeof window !== 'undefined' && window.JSZip)
    || (typeof XLSX !== 'undefined' && XLSX && XLSX.JSZip) || null;
  if (!JSZip) {
    toast('엑셀 모듈을 아직 불러오지 못했어요. 인터넷 연결을 확인하고 잠시 후 다시 눌러주세요.', true);
    return;
  }
  let zip;
  try {
    const res = await fetch('template.xlsx', { cache: 'reload' });
    if (!res.ok) throw new Error('template fetch failed: ' + res.status);
    const buf = await res.arrayBuffer();
    zip = await JSZip.loadAsync(buf);
  } catch (e) {
    console.error(e);
    toast('서식 파일(template.xlsx)을 불러올 수 없어요. 인터넷 연결을 확인하고 새로고침 후 다시 시도해주세요.', true);
    return;
  }

  // 2) 시트 이름 → sheet 파일 번호 매핑 추출 (workbook.xml + workbook.xml.rels)
  const wbXml = await zip.file('xl/workbook.xml').async('string');
  const relsXml = await zip.file('xl/_rels/workbook.xml.rels').async('string');
  // rId → 파일경로
  // rels 파싱 — 속성 순서에 무관하게 Id/Target 추출, 경로 정규화(절대/상대 모두 처리)
  const relMap = {};
  [...relsXml.matchAll(/<Relationship\b[^>]*\/?>/g)].forEach(tag => {
    const idm = tag[0].match(/Id="([^"]+)"/);
    const tgm = tag[0].match(/Target="([^"]+)"/);
    if (!idm || !tgm) return;
    let t = tgm[1];
    if (t.startsWith('/')) t = t.slice(1);              // '/xl/worksheets/..' → 'xl/worksheets/..'
    else if (!t.startsWith('xl/')) t = 'xl/' + t;        // 'worksheets/..'      → 'xl/worksheets/..'
    relMap[idm[1]] = t;
  });
  // 시트 이름 → 파일 경로 (name/r:id 속성 순서 무관)
  const nameToFile = {};
  [...wbXml.matchAll(/<sheet\b[^>]*\/?>/g)].forEach(tag => {
    const nm = tag[0].match(/name="([^"]+)"/);
    const rid = tag[0].match(/r:id="([^"]+)"/);
    if (nm && rid && relMap[rid[1]]) nameToFile[nm[1]] = relMap[rid[1]];
  });

  // 3) 셀 패치 함수 — XML 안의 <c r="X#" .../> 셀 노드를 새 값으로 교체
  function escapeXml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  // 셀 주소(A1) → {col:'A', colNum:1, row:4}
  function parseAddr(addr){
    const m = addr.match(/^([A-Z]+)(\d+)$/);
    if (!m) return null;
    let colNum = 0; for (const ch of m[1]) colNum = colNum*26 + (ch.charCodeAt(0)-64);
    return { col: m[1], colNum, row: parseInt(m[2],10) };
  }
  function makeCell(addr, value, styleId){
    const sAttr = styleId ? ` s="${styleId}"` : '';
    if (value === '' || value === null || value === undefined) return `<c r="${addr}"${sAttr}/>`;
    if (typeof value === 'number' && isFinite(value)) return `<c r="${addr}"${sAttr} t="n"><v>${value}</v></c>`;
    return `<c r="${addr}"${sAttr} t="inlineStr"><is><t xml:space="preserve">${escapeXml(value)}</t></is></c>`;
  }

  function patchSheet(xml, edits) {
    // edits: { 'B4': '값', 'C4': '값' }
    for (const [addr, value] of Object.entries(edits)) {
      const re = new RegExp(`<c r="${addr}"([^/>]*?)(/>|>[\\s\\S]*?</c>)`, 'g');
      let replaced = false;
      xml = xml.replace(re, (match, attrs) => {
        replaced = true;
        const cleanAttrs = attrs.replace(/\s*t="[^"]*"/g, '');
        if (value === '' || value === null || value === undefined) {
          return `<c r="${addr}"${cleanAttrs}/>`;
        }
        if (typeof value === 'number' && isFinite(value)) {
          return `<c r="${addr}"${cleanAttrs} t="n"><v>${value}</v></c>`;
        }
        return `<c r="${addr}"${cleanAttrs} t="inlineStr"><is><t xml:space="preserve">${escapeXml(value)}</t></is></c>`;
      });
      // 셀이 XML에 없으면(빈 셀로 생략된 경우) 해당 행에 열 순서대로 삽입
      if (!replaced) {
        if (value === '' || value === null || value === undefined) continue; // 빈 값이면 삽입 불필요
        const pa = parseAddr(addr);
        if (!pa) continue;
        // 해당 행 태그 찾기
        const rowRe = new RegExp(`(<row r="${pa.row}"[^>]*>)([\\s\\S]*?)(</row>)`);
        const rm = xml.match(rowRe);
        if (!rm) continue; // 행 자체가 없으면 스킵 (드문 경우)
        const rowOpen = rm[1], rowInner = rm[2], rowClose = rm[3];
        // rowInner의 셀들을 스캔: 삽입 위치 + 인접 스타일 + A열(상행 NO) 스타일 수집
        const cellRe = /<c r="([A-Z]+)(\d+)"([^>]*?)(?:\/>|>[\s\S]*?<\/c>)/g;
        let insertPos = rowInner.length; // 기본: 끝
        let prevStyle = '', nextStyle = '', colAStyle = '';
        let cm;
        while ((cm = cellRe.exec(rowInner)) !== null) {
          let cn = 0; for (const ch of cm[1]) cn = cn*26 + (ch.charCodeAt(0)-64);
          const sm = cm[3] && cm[3].match(/\bs="(\d+)"/);
          const sId = sm ? sm[1] : '';
          if (cn === 1 && sId) colAStyle = sId;               // A열 = 상행 NO 스타일
          if (cn < pa.colNum) { if (sId) prevStyle = sId; }
          if (cn > pa.colNum && insertPos === rowInner.length) { insertPos = cm.index; if (sId) nextStyle = sId; }
        }
        // 삽입 셀이 '하행 NO 칸'(값이 숫자이고, NO 컬럼)일 때는 상행 NO(A열) 스타일을 우선 사용.
        // 그 외(데이터 칸)는 인접 데이터 스타일(오른쪽→왼쪽) 사용.
        const isNumberNo = (typeof value === 'number' && isFinite(value));
        const useStyle = isNumberNo ? (colAStyle || nextStyle || prevStyle || '')
                                    : (nextStyle || prevStyle || colAStyle || '');
        const newInner = rowInner.slice(0, insertPos) + makeCell(addr, value, useStyle) + rowInner.slice(insertPos);
        xml = xml.replace(rowRe, rowOpen + newInner.replace(/\$/g,'$$$$') + rowClose);
      }
    }
    return xml;
  }

  async function patchSheetFile(name, edits) {
    const path = nameToFile[name];
    const f = path && zip.file(path);
    if (!f) { console.warn('Sheet missing:', name, path); return; }
    let xml = await f.async('string');
    xml = patchSheet(xml, edits);
    zip.file(path, xml);
  }

  // 4) 구역 시트 — 앱 구역(ZONES)을 순서대로 '구역1'..'구역N' 시트에 채움 (4~43행)
  //    시트 탭 이름/라벨은 6-3에서 앱 구역명으로 교체됨
  for (let zi = 0; zi < ZONES.length && zi < 20; zi++) {
    const z = ZONES[zi];
    const sheetName = '구역' + (zi + 1);
    if (!nameToFile[sheetName]) continue;
    const ms = membersByZone(z);
    const edits = {};
    // A1 제목을 해당 구역명으로 (시트 탭 이름과 일치시킴)
    edits['A1'] = `${getYearPrefix()} 하계수양회  ─  ${z}`;
    for (let i = 0; i < 70; i++) {
      const m = ms[i];
      const row = 4 + i;
      edits[`A${row}`] = i + 1;
      edits[`B${row}`] = m ? z : '';
      edits[`C${row}`] = m ? (m.dept||'') : '';
      edits[`D${row}`] = m ? (m.name||'') : '';
      edits[`E${row}`] = m ? (m.session||'') : '';
      // 교통편은 대표 차수(본차수 우선, 없으면 빠른 차수) 한 차수만 표기
      const tc = excelTransCells(m);
      edits[`F${row}`] = tc.F;
      edits[`G${row}`] = tc.G;
      edits[`H${row}`] = tc.H;
      edits[`I${row}`] = tc.I;
      edits[`J${row}`] = tc.J;
      edits[`K${row}`] = tc.K;
      edits[`L${row}`] = m ? (m.leaderName||'') : '';
      edits[`M${row}`] = m ? (m.leaderRel||'') : '';
      edits[`N${row}`] = m ? (m.note||'') : '';
    }
    await patchSheetFile(sheetName, edits);
  }

  // 5) 전도현황 — 전도대상자 데이터를 직접 기입 (3행부터). 구원시인/침례여부 포함.
  //    전도현황 컬럼: A=NO B=구역 C=성명 D=회(부서) E=인도자 F=관계 G=구원시인 H=침례여부 I=비고
  {
    const edits = {};
    const evSorted = sortMembers(DB.evangelism);
    for (let i = 0; i < 200; i++) {
      const e = evSorted[i];
      const row = 3 + i;
      edits[`A${row}`] = e ? i + 1 : '';
      edits[`B${row}`] = e ? (e.zone||'') : '';
      edits[`C${row}`] = e ? (e.name||'') : '';
      edits[`D${row}`] = e ? (e.dept||'') : '';
      edits[`E${row}`] = e ? (e.leader||'') : '';
      edits[`F${row}`] = e ? (e.relation||'') : '';
      edits[`G${row}`] = e ? (e.salvation ? '○' : '') : '';
      edits[`H${row}`] = e ? (e.baptism ? '○' : '') : '';
      edits[`I${row}`] = e ? (e.note||'') : '';
    }
    await patchSheetFile('전도현황', edits);
  }

  // 6) 회비지원 — 3행부터, E열은 VLOOKUP 공식이라 건드리지 않음
  {
    const edits = {};
    const fsSorted = sortMembers(DB.feeSupport);
    for (let i = 0; i < 150; i++) {
      const fs = fsSorted[i];
      const row = 3 + i;
      edits[`A${row}`] = i + 1;
      edits[`B${row}`] = fs ? (fs.zone||'') : '';
      edits[`C${row}`] = fs ? (fs.dept||'') : '';  // C가 채워지면 E열 VLOOKUP이 자동 계산
      edits[`D${row}`] = fs ? (fs.name||'') : '';
      edits[`F${row}`] = fs ? (fs.note||'') : '';
    }
    // 사용자가 설정한 회비 단가를 J/K 룩업 테이블에 반영
    const lookupDepts = ['은장회','봉사회','어머니회','청년회','대학부','중고등부','초등부','유치부','미취학'];
    lookupDepts.forEach((dept, i) => {
      const row = 3 + i;
      if (DB.fees && DB.fees[dept] !== undefined) edits[`K${row}`] = DB.fees[dept];
    });
    await patchSheetFile('회비지원', edits);
  }

  // 6-1) 통계 시트 — 교통편 통계의 '본 차수' 기준값 기록 (B31 = '적용 차수' 셀)
  {
    const sess = (DB.meta && DB.meta.session) ? String(DB.meta.session).trim() : '';
    await patchSheetFile('통계', { 'B31': sess });
  }

  // 6-2) 차편별 명단 시트 채우기 (앱이 직접 제어 — 통합 시트 미사용)
  {
    function firstExtraUp(m){ const k=Object.keys(m.extraUp||{}).find(x=>m.extraUp[x]); return k?String(m.extraUp[k]).trim():''; }
    function firstExtraDown(m){ const k=Object.keys(m.extraDown||{}).find(x=>m.extraDown[x]); return k?String(m.extraDown[k]).trim():''; }
    // 상/하행 차편 종류: 본대(호차/교회차) 직접지정 우선, 없으면 기타값을 분류
    function upKind(m){ if(m.transUp) return m.transUp; const v=firstExtraUp(m); return v?classifyExtra(v):''; }
    function downKind(m){ if(m.transDown) return m.transDown; const v=firstExtraDown(m); return v?classifyExtra(v):''; }
    // 교회차 여부 (본대 직접지정 '교회차1/2' 또는 기타 분류 '교회차' 모두 포함)
    function isChurchUp(m){ const k=upKind(m); return CHURCH_CARS.includes(k) || k==='교회차'; }
    function isChurchDown(m){ const k=downKind(m); return CHURCH_CARS.includes(k) || k==='교회차'; }
    // 교회차 정확 차종 반환 ('교회차1'|'교회차2'|''). 기타값은 normChurchCar로 정규화('교회차'→'교회차1')
    function churchCarUp(m){
      if(m.transUp && CHURCH_CARS.includes(m.transUp)) return m.transUp;
      const v=firstExtraUp(m); if(v && classifyExtra(v)==='교회차') return normChurchCar(v);
      return '';
    }
    function churchCarDown(m){
      if(m.transDown && CHURCH_CARS.includes(m.transDown)) return m.transDown;
      const v=firstExtraDown(m); if(v && classifyExtra(v)==='교회차') return normChurchCar(v);
      return '';
    }
    const regs = registeredMembers().slice().sort(memberSortCmp);
    const Z=m=>m.zone||'', D=m=>m.dept||'', NM=m=>m.name||'', NT=m=>m.note||'';

    // (A) 호차 시트: 상행 A~F(NO,구역,회,성명,확인,비고), 하행 H~M
    for (const bus of BUSES) {
      if (!nameToFile[bus]) continue;
      const up=regs.filter(m=>upKind(m)===bus), dn=regs.filter(m=>downKind(m)===bus);
      const ed={};
      // 선탑자: 상행 라벨 A2:B2 "선탑자:" 다음 C2, 하행 라벨 H2:I2 다음 J2
      const busInfo = (DB.settings && DB.settings.transportInfo && DB.settings.transportInfo[bus]) || {};
      ed['C2'] = busInfo.upLeader || '';
      ed['J2'] = busInfo.downLeader || '';
      // 호차 시트 데이터행은 4~48 (45명). 잔존 번호를 데이터/빈값으로 덮어씀.
      for(let i=0;i<45;i++){ const r=4+i;
        const u=up[i]; ed[`A${r}`]=i+1; ed[`B${r}`]=u?Z(u):''; ed[`C${r}`]=u?D(u):''; ed[`D${r}`]=u?NM(u):''; ed[`F${r}`]=u?NT(u):'';
        const d=dn[i]; ed[`H${r}`]=i+1; ed[`I${r}`]=d?Z(d):''; ed[`J${r}`]=d?D(d):''; ed[`K${r}`]=d?NM(d):''; ed[`M${r}`]=d?NT(d):'';
      }
      await patchSheetFile(bus, ed);
    }

    // (B) 교회차 시트: 교회차1 블록(4~43), 교회차2 블록(48~87). 각 상행 A~E / 하행 G~K
    if (nameToFile['교회차']) {
      const ed={};
      function fillChurch(baseRow, carName){
        const up=regs.filter(m=>churchCarUp(m)===carName), dn=regs.filter(m=>churchCarDown(m)===carName);
        for(let i=0;i<40;i++){ const r=baseRow+i;
          const u=up[i]; ed[`A${r}`]=i+1; ed[`B${r}`]=u?Z(u):''; ed[`C${r}`]=u?D(u):''; ed[`D${r}`]=u?NM(u):''; ed[`E${r}`]=u?NT(u):'';
          const d=dn[i]; ed[`G${r}`]=i+1; ed[`H${r}`]=d?Z(d):''; ed[`I${r}`]=d?D(d):''; ed[`J${r}`]=d?NM(d):''; ed[`K${r}`]=d?NT(d):'';
        }
      }
      // 교회차1~5 (블록당 44행, 데이터 시작행 = 4 + (N-1)*44)
      for (let k = 1; k <= 5; k++) {
        fillChurch(4 + (k - 1) * 44, '교회차' + k);
      }
      await patchSheetFile('교회차', ed);
    }

    // (C) 타교회_대중교통: 타교회 블록(4~43, 상A~E/하G~K) + 대중교통 블록(48~87)
    if (nameToFile['타교회_대중교통']) {
      const ed={};
      function fillBlock(baseRow, upList, dnList){
        for(let i=0;i<40;i++){ const r=baseRow+i;
          const u=upList[i]; ed[`A${r}`]=i+1; ed[`B${r}`]=u?Z(u):''; ed[`C${r}`]=u?D(u):''; ed[`D${r}`]=u?NM(u):''; ed[`E${r}`]=u?NT(u):'';
          const d=dnList[i]; ed[`G${r}`]=i+1; ed[`H${r}`]=d?Z(d):''; ed[`I${r}`]=d?D(d):''; ed[`J${r}`]=d?NM(d):''; ed[`K${r}`]=d?NT(d):'';
        }
      }
      // 타교회: 4~43
      fillBlock(4,  regs.filter(m=>upKind(m)==='타교회'),  regs.filter(m=>downKind(m)==='타교회'));
      // 대중교통: 48~87
      fillBlock(48, regs.filter(m=>upKind(m)==='대중교통'), regs.filter(m=>downKind(m)==='대중교통'));
      await patchSheetFile('타교회_대중교통', ed);
    }

    // (D) 개인차 시트: 차주별 블록(개인차1~20). 블록당 10행(제목 base, 헤더 base+2, 데이터 base+3~base+9 = 7명).
    //   차주 식별: 어떤 멤버의 성명 == 다른 멤버 기타칸의 개인차 이름  → 그 멤버가 차주.
    if (nameToFile['개인차']) {
      // 1) 개인차 탑승자 수집 (상/하 각각), 차주이름 추출
      function driverNameOf(val){ const k=classifyExtra(val); if(k!=='개인차') return ''; const v=String(val||'').trim(); return (v && v!=='개인차')?v:''; }
      // 멤버별 상행 차주명 / 하행 차주명
      const upDriverName  = m => (upKind(m)==='개인차') ? driverNameOf(firstExtraUp(m)) : '';
      const downDriverName= m => (downKind(m)==='개인차') ? driverNameOf(firstExtraDown(m)) : '';
      // 2) 차주 목록 만들기 (등장 순서 유지). 차주는 '이름'으로 식별.
      const driverOrder=[]; const seen=new Set();
      function addDriver(name){ if(name && !seen.has(name)){ seen.add(name); driverOrder.push(name); } }
      regs.forEach(m=>{ addDriver(upDriverName(m)); addDriver(downDriverName(m)); });
      // 3) 차주명 → 차주 멤버(성명 일치) 찾기 (차주 본인도 명단에 포함시키기 위해)
      const memberByName={}; regs.forEach(m=>{ if(m.name) memberByName[m.name.trim()] = memberByName[m.name.trim()]||m; });
      // 4) 블록별로 채우기 (최대 20블록)
      const ed={};
      driverOrder.slice(0,30).forEach((drv, bi)=>{
        const base=1+bi*10;          // 제목행
        ed[`A${base}`]= `개인차${bi+1} (차주: ${drv})`;
        // 상행 탑승자: 이 차주의 차를 상행으로 탄 사람들 + 차주 본인(상행이면)
        const upMembers = regs.filter(m=>upDriverName(m)===drv);
        const downMembers = regs.filter(m=>downDriverName(m)===drv);
        // 차주 본인 포함: 차주가 멤버이고, 그가 상/하행에 자기 차로 안 잡혀있으면 추가
        const ownerM = memberByName[drv];
        // 차주 본인을 맨 앞에. 단, 차주가 그 방향에 자기 차로 잡혀있지 않더라도
        // 차주는 자기 차를 운전하므로, 그 방향에 '탑승자가 있으면' 차주도 포함.
        let upList=upMembers.filter(m=>m!==ownerM);
        let downList=downMembers.filter(m=>m!==ownerM);
        if(ownerM){
          if(upList.length || upDriverName(ownerM)===drv) upList.unshift(ownerM);
          if(downList.length || downDriverName(ownerM)===drv) downList.unshift(ownerM);
        }
        for(let i=0;i<7;i++){ const r=base+3+i;
          const u=upList[i]; ed[`A${r}`]=u?i+1:''; ed[`B${r}`]=u?Z(u):''; ed[`C${r}`]=u?D(u):''; ed[`D${r}`]=u?NM(u):''; ed[`E${r}`]=u?NT(u):'';
          const d=downList[i]; ed[`G${r}`]=d?i+1:''; ed[`H${r}`]=d?Z(d):''; ed[`I${r}`]=d?D(d):''; ed[`J${r}`]=d?NM(d):''; ed[`K${r}`]=d?NT(d):'';
        }
      });
      await patchSheetFile('개인차', ed);
    }
  }

  // 6-3) 구역 시트 탭 이름을 앱 구역명으로 변경 + 안 쓰는 시트 숨김 + 통계 라벨/수식 갱신
  {
    const ZONE_N = 20, BUS_N = 10;
    const useN = Math.min(ZONES.length, ZONE_N);
    // (1) 구역 시트 탭 이름 매핑: '구역1'->ZONES[0], ... 안 쓰는 구역시트는 숨김
    //     호차: BUSES에 없는 N호차 숨김
    const useBuses = new Set(BUSES);
    const renameMap = {};   // 구역k -> 앱구역명
    for (let i = 0; i < useN; i++) renameMap['구역' + (i + 1)] = ZONES[i];
    const hideSheets = [];
    for (let i = useN; i < ZONE_N; i++) hideSheets.push('구역' + (i + 1));
    for (let i = 1; i <= BUS_N; i++) { const b = i + '호차'; if (!useBuses.has(b)) hideSheets.push(b); }
    hideSheets.push('전도대상자');  // 전도현황으로 통합했으므로 숨김 (수식 참조 안전을 위해 삭제 대신 숨김)

    // workbook.xml: 탭 이름 변경 + 숨김
    let wbx = await zip.file('xl/workbook.xml').async('string');
    const hideSet = new Set(hideSheets);
    wbx = wbx.replace(/<sheet\b[^>]*\/?>/g, (tag) => {
      const nm = tag.match(/name="([^"]+)"/);
      if (!nm) return tag;
      let t = tag;
      const orig = nm[1];
      if (renameMap[orig] != null) {
        const newName = String(renameMap[orig]).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        t = t.replace(/name="[^"]+"/, 'name="' + newName + '"');
      }
      if (hideSet.has(orig)) {
        if (/state="[^"]*"/.test(t)) t = t.replace(/state="[^"]*"/, 'state="hidden"');
        else t = t.replace(/(<sheet\b)/, '$1 state="hidden"');
      }
      return t;
    });
    zip.file('xl/workbook.xml', wbx);

    // (2) 통계 시트: 수식의 구역k! 참조 → 앱구역명! 로 치환 + 구역 라벨(A열) 교체 + 안 쓰는 구역 행 숨김
    if (nameToFile['통계']) {
      const stPath = nameToFile['통계'];
      const f = zip.file(stPath);
      if (f) {
        let xml = await f.async('string');
        // openpyxl이 한글을 XML 숫자 엔티티(&#...;)로 저장하므로, 치환 시 평문+엔티티 양쪽 모두 처리
        const toEntities = (str) => Array.from(str).map(ch => {
          const code = ch.codePointAt(0);
          return code > 127 ? ('&#' + code + ';') : ch;
        }).join('');
        // 2-1) 수식/라벨 내 '구역k' → 앱구역명. 긴 번호부터(구역20→구역2 오치환 방지)
        for (let i = ZONE_N; i >= 1; i--) {
          const sheetRef = '구역' + i;
          const appName = renameMap[sheetRef];
          if (appName == null) continue; // 안 쓰는 구역은 그대로 (행 숨김)
          const appPlain = appName.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const appEnt = toEntities(appName);
          const refPlain = sheetRef, refEnt = toEntities(sheetRef);
          // 수식 시트참조 ('구역k!' → '앱이름!') : 평문/엔티티 양쪽
          xml = xml.split(refPlain + '!').join(appPlain + '!');
          xml = xml.split(refEnt + '!').join(appEnt + '!');
          // 라벨 ('>구역k<' → '>앱이름<') : 평문/엔티티 양쪽
          xml = xml.split('>' + refPlain + '<').join('>' + appPlain + '<');
          xml = xml.split('>' + refEnt + '<').join('>' + appEnt + '<');
        }
        // 2-3) 안 쓰는 구역 행 숨김 (행4~ 가 구역1~20). useN+1 ~ 20 → 행 (4+useN) ~ (4+19)
        const hideRowSet = new Set();
        for (let i = useN; i < ZONE_N; i++) hideRowSet.add(String(4 + i));
        if (hideRowSet.size) {
          xml = xml.replace(/<row\b[^>]*>/g, (tag) => {
            const rm = tag.match(/\br="(\d+)"/);
            if (!rm || !hideRowSet.has(rm[1])) return tag;
            if (/\bhidden="[^"]*"/.test(tag)) return tag.replace(/\bhidden="[^"]*"/, 'hidden="1"');
            return tag.replace(/(<row\b)/, '$1 hidden="1"');
          });
        }
        zip.file(stPath, xml);
      }
    }
  }

  // 6-9) calcChain.xml 제거 — 시트/수식을 동적으로 바꿨으므로 계산 체인 캐시가 어긋나
  //      "통합 문서 내용에 문제가 있습니다" 경고를 유발. 삭제하면 엑셀이 자동 재생성함.
  try {
    if (zip.file('xl/calcChain.xml')) {
      zip.remove('xl/calcChain.xml');
      // [Content_Types].xml 에서 calcChain 오버라이드 항목도 제거
      const ctPath = '[Content_Types].xml';
      const ctFile = zip.file(ctPath);
      if (ctFile) {
        let ct = await ctFile.async('string');
        ct = ct.replace(/<Override[^>]*calcChain[^>]*\/>/g, '');
        zip.file(ctPath, ct);
      }
      // workbook.xml.rels 에서 calcChain 관계도 제거
      const wrPath = 'xl/_rels/workbook.xml.rels';
      const wrFile = zip.file(wrPath);
      if (wrFile) {
        let wr = await wrFile.async('string');
        wr = wr.replace(/<Relationship[^>]*calcChain[^>]*\/>/g, '');
        zip.file(wrPath, wr);
      }
    }
  } catch (e) { console.warn('calcChain 제거 중 오류(무시 가능):', e); }

  // 7) 생성된 ZIP을 Blob으로 저장
  const out = await zip.generateAsync({ type: 'arraybuffer', compression: 'DEFLATE' });
  // 안전장치: 생성 결과가 비었으면 저장하지 않고 알림 (빈 파일 방지)
  if (!out || out.byteLength < 1000) {
    toast('엑셀 생성에 실패했어요. 잠시 후 다시 시도해 주세요.', true);
    return;
  }
  const fname = `${title.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`;
  const blob = new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  await saveFileSmart(blob, fname, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
}

function bindViewHandlers() {
  $$('[data-action="goto-transport"]').forEach(b => b.onclick = () => setTab('transport'));
  $$('[data-action="open-bus-assign"]').forEach(b => b.onclick = () => openBusAssignSheet());
  $$('[data-action="goto-evangelism"]').forEach(b => b.onclick = renderEvangelismSheet);
  $$('[data-action="goto-lodging"]').forEach(b => b.onclick = renderLodgingSheet);
  $$('[data-action="goto-fee-sheet"]').forEach(b => b.onclick = renderFeeSupportSheet);
  $$('#zoneScroll .zone-pill').forEach(p => p.onclick = () => {
    rosterFilter.zone = p.dataset.zone;
    const sc = document.getElementById('zoneScroll');
    const sl = sc ? sc.scrollLeft : 0;
    render();
    const sc2 = document.getElementById('zoneScroll');
    if (sc2) sc2.scrollLeft = sl;  // 가로 스크롤 위치 복원 (선택 칩이 맨 왼쪽으로 튀지 않게)
  });
  
  const search = $('#rosterSearch');
  if (search) {
    search.oninput = () => {
      rosterFilter.q = search.value;
      const ml = $('#memberList');
      if (ml) {
        ml.innerHTML = buildMemberListHTML();
        $$('#memberList .member-item').forEach(item => item.onclick = () => { const m = DB.members.find(x => x.id === item.dataset.id); if (m) openMemberSheet(m, false); });
      }
    };
  }
  $$('.member-item[data-id]').forEach(item => item.onclick = () => { const m = DB.members.find(x => x.id === item.dataset.id); if (m) openMemberSheet(m, false); });
  const addBtn = $('#btnAddMember');
  if (addBtn) addBtn.onclick = () => {
    const startZone = (rosterFilter.zone === ALL_ZONES) ? '' : rosterFilter.zone;
    openMemberSheet(emptyMember(startZone), true);
  };
  $$('#ttTabs .tt-pill').forEach(b => b.onclick = () => {
    transportTab.type = b.dataset.t;
    const tt = document.getElementById('ttTabs');
    const sl = tt ? tt.scrollLeft : 0;
    render();
    const tt2 = document.getElementById('ttTabs');
    if (tt2) tt2.scrollLeft = sl;  // 가로 스크롤 위치 복원
  });
  // 차편 날짜·시각 입력 저장 (change 시 transportInfo에 기록)
  function saveTransInfoField(el) {
    if (guardViewOnly()) { render(); return; }
    const key = el.dataset.key, dir = el.dataset.dir;
    if (!key) return;
    DB.settings = DB.settings || {};
    DB.settings.transportInfo = DB.settings.transportInfo || {};
    const info = DB.settings.transportInfo[key] || {};
    if (el.classList.contains('ti-time')) info[dir==='up'?'upTime':'downTime'] = el.value || '';
    else if (el.classList.contains('ti-date')) info[dir==='up'?'upDate':'downDate'] = el.value || '';
    else if (el.classList.contains('ti-leader')) info[dir==='up'?'upLeader':'downLeader'] = el.value || '';
    DB.settings.transportInfo[key] = info;
    saveDB();
  }
  $$('.trans-info-box .ti-time, .trans-info-box .ti-date, .trans-info-box .ti-leader').forEach(el => {
    el.addEventListener('change', () => saveTransInfoField(el));
  });
  // 차편 탭 명단의 탑승 확인 체크박스
  $$('#view .board-check').forEach(cb => {
    cb.addEventListener('change', () => setBoardCheck(cb.dataset.id, cb.dataset.dir, cb.checked));
  });
  $$('[data-action="base-settings"]').forEach(b => b.onclick = openBaseSettingsSheet);
  $$('[data-action="edit-meta"]').forEach(b => b.onclick = (e) => { e.stopPropagation(); openMetaEditSheet(); });
  { const nb = document.getElementById('evNameBtn'); if (nb) nb.onclick = toggleEventDropdown; }
  { const rb = document.getElementById('evRenameBtn'); if (rb) rb.onclick = openEventRename; }
  $$('[data-action="export"]').forEach(b => b.onclick = exportToExcel);
  $$('[data-action="manual"]').forEach(b => b.onclick = openManualSheet);
  
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('sw.js', { scope: './' });
      console.log('SW registered, scope:', reg.scope);
      // 새 버전이 발견되면 다음 진입 시 사용. 사용자에게 알리지는 않음 (Stale-While-Revalidate)
      reg.addEventListener('updatefound', () => console.log('SW update found'));
      // 강제 갱신 체크 (앱이 깨어날 때마다)
      if (reg.update) reg.update().catch(()=>{});
    } catch (err) {
      console.error('SW register failed:', err);
    }
  });
  // 페이지 가시성이 돌아오면(앱 다시 열림) SW 업데이트 체크
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      navigator.serviceWorker.getRegistration().then(r => r && r.update && r.update().catch(()=>{}));
    }
  });
}
render();

document.addEventListener('focusout', function(){ setTimeout(function(){ if(sync.renderPending && !isEditingFocused() && !isSheetOpen()){ sync.renderPending=false; render(); } }, 200); });
