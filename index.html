$('#fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    importFromWorkbook(wb);
    toast('가져오기 완료');
    render();
  } catch (err) { console.error(err); toast('가져오기 실패: ' + err.message, true); }
  e.target.value = '';
};

$('#jsonInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported && imported.members) {
        DB = Object.assign(freshDB(), imported);
        saveDB(); render(); toast('데이터 복원이 완료되었습니다.');
      } else throw new Error('Invalid format');
    } catch(err) { toast('잘못된 백업 파일입니다.', true); }
  };
  reader.readAsText(file);
  e.target.value = '';
};

function importFromWorkbook(wb) {
  const newMembers = [];
  ZONES.forEach(z => {
    const ws = wb.Sheets[z];
    if (!ws) return;
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: '' });
    for (let i = 3; i < rows.length; i++) {
      const r = rows[i];
      const name = (r[3] || '').toString().trim();
      if (!name) continue;
      
      const extraUp = {}; const extraDown = {};
      if (r[7]) extraUp[EXTRA_UPS[0] || '금저'] = r[7].toString().trim();
      if (r[8]) extraDown[EXTRA_DOWNS[0] || '토저'] = r[8].toString().trim();

      newMembers.push({
        id: uid(), zone: z, dept: (r[2]||'').toString().trim(), name, session: (r[4]||'').toString().trim(),
        transUp: (r[5]||'').toString().trim(), transDown: (r[6]||'').toString().trim(),
        privateUp: (r[9]||'').toString().trim(), privateDown: (r[10]||'').toString().trim(),
        leaderName: (r[11]||'').toString().trim(), leaderRel: (r[12]||'').toString().trim(), note: (r[13]||'').toString().trim(),
        extraUp, extraDown
      });
    }
  });

  const newEv = [];
  const evWs = wb.Sheets['전도대상자'];
  if (evWs) {
    const rows = XLSX.utils.sheet_to_json(evWs, { header: 1, blankrows: false, defval: '' });
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      const name = (r[3]||'').toString().trim();
      if (!name) continue;
      newEv.push({
        id: uid(), memberId: '', zone: (r[1]||'').toString().trim(), dept: (r[2]||'').toString().trim(), name,
        relation: (r[4]||'').toString().trim(), leader: (r[5]||'').toString().trim(), lodging: (r[6]||'').toString().trim(),
        salvation: '', baptism: '', note: (r[8]||'').toString().trim(),
      });
    }
  }

  const newFS = [];
  const fsWs = wb.Sheets['회비지원'];
  if (fsWs) {
    const rows = XLSX.utils.sheet_to_json(fsWs, { header: 1, blankrows: false, defval: '' });
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      const name = (r[3]||'').toString().trim();
      if (!name) continue;
      newFS.push({
        id: uid(), memberId: '', zone: (r[1]||'').toString().trim(), dept: (r[2]||'').toString().trim(), name,
        amount: parseInt((r[4]||0).toString().replace(/[^0-9-]/g,''), 10) || 0, note: (r[5]||'').toString().trim(),
      });
    }
  }

  if (newMembers.length > 0) DB.members = newMembers;
  if (newEv.length > 0) DB.evangelism = newEv;
  if (newFS.length > 0) DB.feeSupport = newFS;
  syncEvFsLinks();
  saveDB();
}

/* ===== 엑셀 내보내기 — 템플릿 ZIP을 직접 패치 (스타일·공식 100% 보존) =====
   원리: xlsx는 ZIP. 각 sheet은 xl/worksheets/sheetN.xml에 들어 있고
   셀은 <c r="B4" s="7"/> 형태. 값을 넣을 때 inlineStr 형식으로 셀 노드만 교체.
   styles.xml, sharedStrings.xml, theme 등은 손대지 않음 → 모든 디자인 그대로. */

async function exportToExcel() {
  const title = DB.meta.title || '하계수양회';

  // 1) 템플릿 fetch
  let zip;
  try {
    const res = await fetch('template.xlsx');
    if (!res.ok) throw new Error('template fetch failed: ' + res.status);
    const buf = await res.arrayBuffer();
    // JSZip은 SheetJS 번들에 포함돼 있어요 (XLSX.JSZip로 사용 가능)
    const JSZip = (typeof window !== 'undefined' && window.JSZip) || (XLSX && XLSX.JSZip);
    if (!JSZip) { toast('JSZip을 사용할 수 없어요', true); return; }
    zip = await JSZip.loadAsync(buf);
  } catch (e) {
    console.error(e);
    toast('서식 파일(template.xlsx)을 불러올 수 없어요. 페이지 새로고침 후 다시 시도해주세요.', true);
    return;
  }

  // 2) 시트 이름 → sheet 파일 번호 매핑 추출 (workbook.xml + workbook.xml.rels)
  const wbXml = await zip.file('xl/workbook.xml').async('string');
  const relsXml = await zip.file('xl/_rels/workbook.xml.rels').async('string');
  // rId → 파일경로
  const relMap = {};
  [...relsXml.matchAll(/<Relationship[^>]+Id="(rId\d+)"[^>]+Target="([^"]+)"/g)].forEach(m => relMap[m[1]] = m[2]);
  // 시트 이름 → 파일 경로
  const nameToFile = {};
  [...wbXml.matchAll(/<sheet[^>]+name="([^"]+)"[^>]+r:id="(rId\d+)"/g)].forEach(m => {
    nameToFile[m[1]] = 'xl/' + relMap[m[2]];
  });

  // 3) 셀 패치 함수 — XML 안의 <c r="X#" .../> 셀 노드를 새 값으로 교체
  function escapeXml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function patchSheet(xml, edits) {
    // edits: { 'B4': '값', 'C4': '값' }
    for (const [addr, value] of Object.entries(edits)) {
      const re = new RegExp(`<c r="${addr}"([^/>]*?)(/>|>[\\s\\S]*?</c>)`, 'g');
      xml = xml.replace(re, (match, attrs) => {
        // attrs 안의 t="..."를 제거하고, 우리 형식으로 새로 설정
        const cleanAttrs = attrs.replace(/\s*t="[^"]*"/g, '');
        if (value === '' || value === null || value === undefined) {
          return `<c r="${addr}"${cleanAttrs}/>`;
        }
        if (typeof value === 'number' && isFinite(value)) {
          return `<c r="${addr}"${cleanAttrs} t="n"><v>${value}</v></c>`;
        }
        return `<c r="${addr}"${cleanAttrs} t="inlineStr"><is><t xml:space="preserve">${escapeXml(value)}</t></is></c>`;
      });
    }
    return xml;
  }

  async function patchSheetFile(name, edits) {
    const path = nameToFile[name];
    if (!path) { console.warn('Sheet missing:', name); return; }
    let xml = await zip.file(path).async('string');
    xml = patchSheet(xml, edits);
    zip.file(path, xml);
  }

  // 4) 구역 시트 (8개) — 4행~43행에 데이터
  for (const z of ZONES) {
    const ms = membersByZone(z);
    const edits = {};
    for (let i = 0; i < 40; i++) {
      const m = ms[i];
      const row = 4 + i;
      edits[`A${row}`] = i + 1;
      edits[`B${row}`] = m ? z : '';
      edits[`C${row}`] = m ? (m.dept||'') : '';
      edits[`D${row}`] = m ? (m.name||'') : '';
      edits[`E${row}`] = m ? (m.session||'') : '';
      edits[`F${row}`] = m ? (m.transUp||'') : '';
      edits[`G${row}`] = m ? (m.transDown||'') : '';
      // H/I: 기타 일정(본대 아닌 합류/이탈) — "시점 차편" 형식
      if (m) {
        const euKey = Object.keys(m.extraUp || {}).find(k => m.extraUp[k]);
        const edKey = Object.keys(m.extraDown || {}).find(k => m.extraDown[k]);
        edits[`H${row}`] = euKey ? `${euKey} ${m.extraUp[euKey]}` : '';
        edits[`I${row}`] = edKey ? `${edKey} ${m.extraDown[edKey]}` : '';
      } else {
        edits[`H${row}`] = ''; edits[`I${row}`] = '';
      }
      edits[`J${row}`] = m ? (m.privateUp||'') : '';
      edits[`K${row}`] = m ? (m.privateDown||'') : '';
      edits[`L${row}`] = m ? (m.leaderName||'') : '';
      edits[`M${row}`] = m ? (m.leaderRel||'') : '';
      edits[`N${row}`] = m ? (m.note||'') : '';
    }
    await patchSheetFile(z, edits);
  }

  // 5) 전도대상자 — 3행부터
  {
    const edits = {};
    for (let i = 0; i < 40; i++) {
      const e = DB.evangelism[i];
      const row = 3 + i;
      edits[`A${row}`] = i + 1;
      edits[`B${row}`] = e ? (e.zone||'') : '';
      edits[`C${row}`] = e ? (e.dept||'') : '';
      edits[`D${row}`] = e ? (e.name||'') : '';
      edits[`E${row}`] = e ? (e.relation||'') : '';
      edits[`F${row}`] = e ? (e.leader||'') : '';
      edits[`G${row}`] = e ? (e.lodging||'') : '';
      edits[`I${row}`] = e ? (e.note||'') : '';
    }
    await patchSheetFile('전도대상자', edits);
  }

  // 6) 회비지원 — 3행부터, E열은 VLOOKUP 공식이라 건드리지 않음
  {
    const edits = {};
    for (let i = 0; i < 80; i++) {
      const fs = DB.feeSupport[i];
      const row = 3 + i;
      edits[`A${row}`] = i + 1;
      edits[`B${row}`] = fs ? (fs.zone||'') : '';
      edits[`C${row}`] = fs ? (fs.dept||'') : '';  // C가 채워지면 E열 VLOOKUP이 자동 계산
      edits[`D${row}`] = fs ? (fs.name||'') : '';
      edits[`F${row}`] = fs ? (fs.note||'') : '';
    }
    // 사용자가 설정한 회비 단가를 J/K 룩업 테이블에 반영
    const lookupDepts = ['은장회','봉사회','어머니회','청년회','대학부','중고등부','초등부','유치부','미취학'];
    lookupDepts.forEach((dept, i) => {
      const row = 3 + i;
      if (DB.fees && DB.fees[dept] !== undefined) edits[`K${row}`] = DB.fees[dept];
    });
    await patchSheetFile('회비지원', edits);
  }

  // 7) 생성된 ZIP을 Blob으로 저장
  const out = await zip.generateAsync({ type: 'arraybuffer', compression: 'DEFLATE' });
  const fname = `${title.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`;
  const blob = new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const file = new File([blob], fname, { type: blob.type });

  if (typeof window.showSaveFilePicker === 'function') {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{ description: 'Excel 파일', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }],
      });
      const w = await handle.createWritable();
      await w.write(file); await w.close();
      toast('엑셀 파일이 저장됐어요');
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('엑셀로 저장됐어요');
}

function bindViewHandlers() {
  $$('[data-action="goto-transport"]').forEach(b => b.onclick = () => setTab('transport'));
  $$('[data-action="goto-roster"]').forEach(b => b.onclick = () => setTab('roster'));
  $$('[data-action="goto-evangelism"]').forEach(b => b.onclick = renderEvangelismSheet);
  $$('[data-action="goto-lodging"]').forEach(b => b.onclick = renderLodgingSheet);
  $$('[data-action="goto-fee-sheet"]').forEach(b => b.onclick = renderFeeSupportSheet);
  $$('#zoneScroll .zone-pill').forEach(p => p.onclick = () => { rosterFilter.zone = p.dataset.zone; render(); });
  
  const search = $('#rosterSearch');
  if (search) {
    search.oninput = () => {
      rosterFilter.q = search.value;
      const ml = $('#memberList');
      if (ml) {
        ml.innerHTML = buildMemberListHTML();
        $$('#memberList .member-item').forEach(item => item.onclick = () => { const m = DB.members.find(x => x.id === item.dataset.id); if (m) openMemberSheet(m, false); });
      }
    };
  }
  $$('.member-item[data-id]').forEach(item => item.onclick = () => { const m = DB.members.find(x => x.id === item.dataset.id); if (m) openMemberSheet(m, false); });
  const addBtn = $('#btnAddMember');
  if (addBtn) addBtn.onclick = () => {
    const startZone = (rosterFilter.zone === ALL_ZONES) ? ZONES[0] : rosterFilter.zone;
    openMemberSheet(emptyMember(startZone), true);
  };
  $$('#ttTabs .tt-pill').forEach(b => b.onclick = () => { transportTab.type = b.dataset.t; render(); });
  $$('[data-action="base-settings"]').forEach(b => b.onclick = openBaseSettingsSheet);
  $$('[data-action="edit-meta"]').forEach(b => b.onclick = (e) => { e.stopPropagation(); openMetaEditSheet(); });
  $$('[data-action="import"]').forEach(b => b.onclick = () => $('#fileInput').click());
  $$('[data-action="export"]').forEach(b => b.onclick = exportToExcel);
  
  const exitBtn = $('#btnExit');
  if (exitBtn) {
    exitBtn.onclick = () => {
      confirmModal('앱 종료', '앱을 종료하시겠습니까? (저장된 데이터는 그대로 유지됩니다)', () => {
        // PWA standalone에서는 window.close() 가 허용됨. 일반 브라우저 탭에서는 보안상 막힘
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
        try {
          window.close();
        } catch(e) { /* noop */ }
        // close() 가 실패하는 일반 브라우저 환경에서는 안내 — 한 박자 뒤 토스트
        setTimeout(() => {
          if (!document.hidden) {
            if (isStandalone) {
              toast('앱이 종료되지 않으면 홈 버튼을 눌러 빠져나가세요.');
            } else {
              toast('브라우저 탭을 닫거나 다른 페이지로 이동해 주세요.');
            }
          }
        }, 250);
      }, '종료');
    };
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('sw.js', { scope: './' });
      console.log('SW registered, scope:', reg.scope);
      // 새 버전이 발견되면 다음 진입 시 사용. 사용자에게 알리지는 않음 (Stale-While-Revalidate)
      reg.addEventListener('updatefound', () => console.log('SW update found'));
      // 강제 갱신 체크 (앱이 깨어날 때마다)
      if (reg.update) reg.update().catch(()=>{});
    } catch (err) {
      console.error('SW register failed:', err);
    }
  });
  // 페이지 가시성이 돌아오면(앱 다시 열림) SW 업데이트 체크
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      navigator.serviceWorker.getRegistration().then(r => r && r.update && r.update().catch(()=>{}));
    }
  });
}
