        })()}
      </div>
    </div>

    <div class="section-title">추가 관리 항목</div>
    <div class="row-2" style="background:var(--bg-2); padding:10px; border-radius:10px; margin-bottom:12px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;margin:0;"><input type="checkbox" id="mEvCheck" ${existingEv ? 'checked':''} /> 전도대상자 명단</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;margin:0;"><input type="checkbox" id="mFsCheck" ${existingFs ? 'checked':''} /> 회비지원 명단</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;margin:0;"><input type="checkbox" id="mBaptism" ${m.baptism ? 'checked':''} /> 이번 수양회 침례</label>
    </div>

    <div class="section-title">인도자 / 숙소 / 비고</div>
    <div class="row-2">
      <div class="field"><label id="mLeaderLabel">인도자</label><input id="mLeaderName" value="${esc(m.leaderName)}"/></div>
      <div class="field"><label>관계</label><input id="mLeaderRel" value="${esc(m.leaderRel)}"/></div>
    </div>
    <div class="field"><label>연락처</label><input id="mContact" type="tel" inputmode="tel" value="${esc(m.contact||'')}" placeholder="예: 010-1234-5678"/></div>
    <div class="field" id="mLodgingField">
      <label>숙소 <span style="font-weight:400;color:var(--ink-mute);font-size:11px;">(본 차수 참여자만)</span></label>
      <div style="display:flex; gap:5px;">
        <select id="mLodging" style="flex:1; min-width:0;">${lodgingOptionsHtml((m.lodging||'').trim())}</select>
        <button type="button" id="mLodgingAdd" style="padding:6px 10px; font-size:12px; border:1px dashed var(--gold-soft); border-radius:8px; background:transparent; color:var(--gold-soft); cursor:pointer; white-space:nowrap;">+ 추가</button>
        <button type="button" id="mLodgingDel" style="padding:6px 10px; font-size:12px; border:1px dashed var(--rose); border-radius:8px; background:transparent; color:var(--rose); cursor:pointer; white-space:nowrap;">삭제</button>
      </div>
    </div>
    <div class="field">
      <label>회비 개별 지정 <span style="font-weight:400;color:var(--ink-mute);font-size:11px;">(비우면 부서 단가 자동 적용)</span></label>
      <input id="mFeeOverride" type="number" inputmode="numeric" value="${(m.feeOverride!==null && m.feeOverride!==undefined && m.feeOverride!=='') ? esc(String(m.feeOverride)) : ''}" placeholder="부서 단가: ${won(DB.fees[m.dept]||0)}원"/>
      <input id="mFeeReason" value="${esc(m.feeReason||'')}" placeholder="사유 (선택) — 예: 시각장애" style="margin-top:6px;"/>
    </div>
    <div class="field"><label>비고</label><textarea id="mNote" rows="2">${esc(m.note)}</textarea></div>
    ${!isNew ? `<button class="btn btn-danger btn-block" id="mDelete" style="margin-top:8px">삭제</button>` : ''}
  `;
  openSheet(isNew ? '인원 추가' : '인원 편집', html, () => {
    // 차수별 상하행 수집 (체크된 차수만)
    const sessionValues = [];
    const sessionTrans = {};
    document.querySelectorAll('#mSessionList .sess-block').forEach(block => {
      const nm = block.dataset.name;
      const checked = block.querySelector('.sess-check').checked;
      if (!checked) return;
      sessionValues.push(nm);
      const upDateEl = block.querySelector('input[name="update-'+nm+'"]:checked');
      const downDateEl = block.querySelector('input[name="downdate-'+nm+'"]:checked');
      const upKindEl = block.querySelector('input[name="upkind-'+nm+'"]:checked');
      const downKindEl = block.querySelector('input[name="downkind-'+nm+'"]:checked');
      const upVehEl = block.querySelector('.up-veh');
      const downVehEl = block.querySelector('.down-veh');
      sessionTrans[nm] = {
        upDate: upDateEl ? upDateEl.value : '',
        upKind: upKindEl ? upKindEl.value : '',
        upVehicle: upVehEl ? (upVehEl.value || '') : '',
        downDate: downDateEl ? downDateEl.value : '',
        downKind: downKindEl ? downKindEl.value : '',
        downVehicle: downVehEl ? (downVehEl.value || '') : '',
      };
    });
    const sessionStr = sessionValues.join(', ');
    // 숙소는 본 차수 참여자에게만 해당 — 본 차수가 설정돼 있고 이번 저장에 본 차수가 없으면(미정 포함) 숙소를 비운다
    const __church = churchSessionName();
    const lodgingVal = (__church && !sessionValues.includes(__church)) ? '' : (($('#mLodging') && $('#mLodging').value) || '').trim();

    const updated = {
      ...m, zone: resolveZoneValue(), dept: $('#mDept').value, name: $('#mName').value.trim(), session: sessionStr,
      transUp: '', transDown: '',
      extraUp: {}, extraDown: {}, sessionTrans: sessionTrans,
      leaderName: $('#mLeaderName').value.trim(), leaderRel: $('#mLeaderRel').value.trim(),
      contact: ($('#mContact') ? $('#mContact').value.trim() : (m.contact||'')),
      lodging: lodgingVal,
      salvation: m.salvation || false,
      baptism: $('#mBaptism') ? $('#mBaptism').checked : (m.baptism || false),
      // 탑승 확인 체크 보존 — 저장이 인원 객체를 통째로 교체하므로 명시적으로 실어 나른다
      boardChecks: m.boardChecks || {},
      boardUp: !!m.boardUp, boardDown: !!m.boardDown,
      note: $('#mNote').value.trim(),
      feeOverride: (function(){ const el=$('#mFeeOverride'); if(!el) return (m.feeOverride!==undefined?m.feeOverride:null); const v=el.value.trim(); return v==='' ? null : (isNaN(v) ? null : Number(v)); })(),
      feeReason: ($('#mFeeReason') ? $('#mFeeReason').value.trim() : (m.feeReason||'')),
      regType: (document.querySelector('input[name="mRegType"]:checked')||{}).value || '',
      status: (document.querySelector('input[name="mStatus"]:checked')||{}).value || '',
    };
    // 현장 접수가 아니면 registered 플래그는 의미 없음 — 정리 (registered는 현장 접수 전용)
    if (updated.regType !== 'onsite') delete updated.registered;

    // 필수 입력 검증 — 차수는 필수, 상하행 시점·차편은 선택(본교회 차수 아닌 사람 허용)
    if (!updated.zone) { toast('구역을 선택해 주세요', true); return false; }
    if (!updated.dept) { toast('회(부서)를 선택해 주세요', true); return false; }
    if (!updated.name) { toast('성명을 입력해 주세요', true); return false; }
    if (!updated.regType) { toast('접수 구분을 선택해 주세요', true); return false; }
    // 차수는 원칙적으로 필수 — 단, 불참·환불(모든 일정에 오지 않음)은 차수 없이 저장 가능.
    // 옛 방식 불참자 정리(본 차수만 해제) 시에도 이 경로로 저장된다.
    if (!sessionStr && updated.status !== 'noshow' && updated.status !== 'refund') { toast('차수를 1개 이상 선택해 주세요 (불참·환불은 차수 없이 저장 가능)', true); return false; }

    // 대표 상하행 재계산은 전역 recalcMemberRepTrans 사용 (updated의 sessionTrans 기준)
    function applyRepTrans() { recalcMemberRepTrans(updated); }

    // 중복 경고
    const dup = DB.members.find(x => x.id !== m.id
      && (x.zone||'').trim() === updated.zone.trim()
      && (x.name||'').trim() === updated.name.trim()
      && updated.name.trim() !== '');

    function commitSave() {
      applyRepTrans();
      // 상태 변화 감지 (불참·환불 처리/해제를 이력에 명확히 남김)
      const prevStatus = isNew ? '' : (m.status || '');
      const newStatus = updated.status || '';
      // 대상 표기: 이름(구역·회) — 누구인지 분명하게
      const who = updated.name + '(' + updated.zone + '·' + updated.dept + ')';
      // 추가 시엔 차수까지 덧붙여 어떤 등록인지 구체화
      const sessTxt = (updated.session || '').split(',').map(x => x.trim()).filter(Boolean).join('·');
      let action, detail;
      if (isNew) {
        action = '인원 추가';
        detail = who + (sessTxt ? ' · ' + sessTxt : '');
      } else if (prevStatus !== newStatus) {
        // 상태가 바뀐 경우 — 무엇으로 바뀌었는지 명시
        if (newStatus === 'noshow') action = '불참 처리';
        else if (newStatus === 'refund') action = '환불 처리';
        else if (prevStatus === 'noshow') action = '불참 해제';
        else if (prevStatus === 'refund') action = '환불 해제';
        else action = '인원 수정';
        detail = who;
      } else {
        // 상태 변화가 없을 때 — 회비 / 회비지원 / 차편 변화를 구체적으로 명시
        const prevFee = (m.feeOverride!==null && m.feeOverride!==undefined && m.feeOverride!=='') ? Number(m.feeOverride) : null;
        const newFee = (updated.feeOverride!==null && updated.feeOverride!==undefined && updated.feeOverride!=='') ? Number(updated.feeOverride) : null;
        // 회비지원 명단 체크 변화 (편집 전 existingFs 유무 vs 현재 체크 상태)
        const fsWas = !!existingFs;
        const fsNow = !!($('#mFsCheck') && $('#mFsCheck').checked);
        // 차편 변화 감지: 각 차수의 상행·하행 차편(kind+vehicle)을 편집 전/후 비교
        //  vLabel: 차편을 사람이 읽을 라벨로 (없으면 '미지정')
        const vLabel = (kind, veh) => {
          if (!veh && !kind) return '미지정';
          if (kind === 'bus') return veh || '본대 버스';
          return veh || (kind === 'private' ? '개인차' : (kind === 'etc' ? '기타' : '미지정'));
        };
        const beforeST = (m.sessionTrans) || {};
        const afterST = (updated.sessionTrans) || {};
        const allSess = Array.from(new Set([].concat(Object.keys(beforeST), Object.keys(afterST))));
        const changes = [];
        allSess.forEach(function (sn) {
          const a = beforeST[sn] || {}, b = afterST[sn] || {};
          // 상행 비교
          if ((a.upVehicle||'') !== (b.upVehicle||'') || (a.upKind||'') !== (b.upKind||'')) {
            changes.push(sn + ' 상행 ' + vLabel(b.upKind, b.upVehicle));
          }
          // 하행 비교
          if ((a.downVehicle||'') !== (b.downVehicle||'') || (a.downKind||'') !== (b.downKind||'')) {
            changes.push(sn + ' 하행 ' + vLabel(b.downKind, b.downVehicle));
          }
        });
        if (prevFee !== newFee) {
          if (newFee === null) { action = '회비 지정 해제'; detail = who + ' · 부서 단가로'; }
          else { action = '회비 개별 지정'; detail = who + ' · ' + won(newFee) + '원' + (updated.feeReason ? ' (' + updated.feeReason + ')' : ''); }
        } else if (changes.length) {
          // 차편이 바뀐 경우 — 무엇으로 바뀌었는지 구체적으로 (여러 개면 나열, 너무 길면 요약)
          action = '차편 변경';
          const joined = changes.join(', ');
          detail = who + ' · ' + (changes.length <= 2 ? joined : (changes.slice(0,2).join(', ') + ' 외 ' + (changes.length-2) + '건'));
        } else if (fsWas !== fsNow) {
          if (fsNow) { action = '회비지원 등록'; detail = who + ' · ' + won(memberFee(updated)) + '원'; }
          else { action = '회비지원 제외'; detail = who; }
        } else {
          // 그 외 인적 정보 필드 변경을 무엇→무엇으로 구체적으로 수집
          const norm = v => (v === null || v === undefined) ? '' : String(v).trim();
          const relLabelOf = code => ({ 'self':'본인','spouse':'배우자','child':'자녀','parent':'부모','sibling':'형제자매','friend':'친구','other':'기타' })[code] || code;
          const regLabelOf = code => ({ 'pre1':'사전1차','pre2':'사전2차','onsite':'현장','other':'기타' })[code] || code || '미지정';
          const disp = (v, empty) => norm(v) === '' ? (empty || '(비움)') : norm(v);
          // [필드키, 라벨, 이전값, 새값, 값을 사람이 읽을 변환]
          const fieldDefs = [
            ['name', '이름', m.name, updated.name, null],
            ['zone', '구역', m.zone, updated.zone, null],
            ['dept', '회', m.dept, updated.dept, null],
            ['session', '차수', (m.session||'').split(',').map(s=>s.trim()).filter(Boolean).sort().join('·'), (updated.session||'').split(',').map(s=>s.trim()).filter(Boolean).sort().join('·'), null],
            ['regType', '접수구분', m.regType, updated.regType, regLabelOf],
            ['contact', '연락처', m.contact, updated.contact, null],
            ['lodging', '숙소', m.lodging, updated.lodging, null],
            ['leaderName', '인도자', m.leaderName, updated.leaderName, null],
            ['leaderRel', '관계', m.leaderRel, updated.leaderRel, relLabelOf],
            ['note', '비고', m.note, updated.note, null],
          ];
          const fieldChanges = [];
          fieldDefs.forEach(function (fd) {
            const key = fd[0], label = fd[1], conv = fd[4];
            const bv = norm(fd[2]), av = norm(fd[3]);
            if (bv !== av) {
              const bl = conv ? conv(fd[2]) : disp(fd[2]);
              const al = conv ? conv(fd[3]) : disp(fd[3]);
              // 이름/구역/회는 값이 바뀌면 '라벨: 이전→새', 나머지도 동일 형식
              fieldChanges.push(label + ' ' + bl + '→' + al);
            }
          });
          // 구원/침례(불리언)도 감지 — 인원 편집에서 바뀔 수 있으면
          if ((!!m.salvation) !== (!!updated.salvation)) fieldChanges.push(updated.salvation ? '구원 체크' : '구원 해제');
          if ((!!m.baptism) !== (!!updated.baptism)) fieldChanges.push(updated.baptism ? '침례 체크' : '침례 해제');
          const __chDiff = churchAbsenceDiff(m.session, updated.session);
          if (__chDiff) fieldChanges.push(__chDiff);

          if (fieldChanges.length) {
            action = '인원 수정';
            const joined = fieldChanges.join(', ');
            detail = who + ' · ' + (fieldChanges.length <= 3 ? joined : (fieldChanges.slice(0,3).join(', ') + ' 외 ' + (fieldChanges.length-3) + '건'));
          } else {
            action = '인원 수정';
            detail = who;
          }
        }
      }
      if (isNew) DB.members.push(updated);
      else { const idx = DB.members.findIndex(x => x.id === m.id); if (idx >= 0) DB.members[idx] = updated; }
      logHistory(action, detail);
      finishSave();
    }

    if (dup) {
      confirmModal('중복 확인',
        updated.zone + '의 \'' + updated.name + '\' 님은 이미 등록되어 있습니다. 그래도 저장할까요?',
        function () { commitSave(); }, '저장');
      return false;
    }
    commitSave();
    return false;

    function finishSave() {
    if ($('#mEvCheck') && $('#mEvCheck').checked) {
      if (!existingEv) {
        DB.evangelism.push({...emptyEvangelism(), memberId: updated.id, name: updated.name, zone: updated.zone, dept: updated.dept, relation: updated.leaderRel, leader: updated.leaderName, lodging: updated.lodging, salvation: updated.salvation, baptism: updated.baptism, note: updated.note});
      } else { 
        existingEv.name = updated.name; existingEv.zone = updated.zone; existingEv.dept = updated.dept; 
        existingEv.relation = updated.leaderRel; existingEv.leader = updated.leaderName; existingEv.lodging = updated.lodging; 
        // 구원은 전도대상자 명단 표에서 직접 체크하므로 인원 저장 시 덮어쓰지 않음.
        // 침례는 편집창의 '이번 수양회 침례'와 양방향 동기화 (표에서 체크해도 인원에 반영됨 — setEvangelismCheck)
        existingEv.baptism = updated.baptism;
        existingEv.note = updated.note;
      }
    } else if (existingEv) { DB.evangelism = DB.evangelism.filter(e => e.id !== existingEv.id); }

    if ($('#mFsCheck') && $('#mFsCheck').checked) {
      // 회비 지원 금액은 개별 회비 지정(있으면 그 값, 없으면 부서 단가)에 연동.
      //  새로 추가 시 그 값으로 시작. 이미 있으면, 개별 지정 금액이 바뀐 경우에만 지원 금액도 맞춤
      //  (지원 명단에서 수동으로 다르게 고쳐둔 값은 개별 지정을 안 바꾸면 그대로 유지됨)
      const linkedFee = memberFee(updated);
      if (!existingFs) {
        DB.feeSupport.push({...emptyFeeSupport(), memberId: updated.id, name: updated.name, zone: updated.zone, dept: updated.dept, amount: linkedFee, note: updated.note});
      } else {
        existingFs.name = updated.name; existingFs.zone = updated.zone; existingFs.dept = updated.dept; existingFs.note = updated.note;
        // 개별 회비 지정이 이번에 바뀌었으면 지원 금액도 그 값으로 동기화
        const prevOv = (m.feeOverride!==null && m.feeOverride!==undefined && m.feeOverride!=='') ? Number(m.feeOverride) : null;
        const newOv = (updated.feeOverride!==null && updated.feeOverride!==undefined && updated.feeOverride!=='') ? Number(updated.feeOverride) : null;
        if (prevOv !== newOv) existingFs.amount = linkedFee;
      }
    } else if (existingFs) { DB.feeSupport = DB.feeSupport.filter(f => f.id !== existingFs.id); }

    // 숙소 등 연동: 이 인원과 연결된 전도대상자/회비지원이 남아 있으면 숙소·구역·부서·이름을 항상 동기화
    // (숙소를 비우면 전도대상자 명단의 숙소도 함께 비워지도록)
    DB.evangelism.forEach(e => {
      if (e.memberId === updated.id || (!e.memberId && e.name === updated.name && e.zone === updated.zone && e.name !== '')) {
        if (!e.memberId) e.memberId = updated.id;
        e.lodging = updated.lodging; e.zone = updated.zone; e.dept = updated.dept; e.name = updated.name;
      }
    });
    DB.feeSupport.forEach(f => {
      if (f.memberId === updated.id || (!f.memberId && f.name === updated.name && f.zone === updated.zone && f.name !== '')) {
        if (!f.memberId) f.memberId = updated.id;
        f.zone = updated.zone; f.dept = updated.dept; f.name = updated.name;
      }
    });

    saveDB();
    if (rosterFilter.zone !== ALL_ZONES) rosterFilter.zone = updated.zone;
    render(); toast(isNew ? '추가됐어요' : '수정됐어요');

      });
      // 날짜: 한 번 누르면 선택, 같은 것 다시 누르면 해제 (토글)
      function refreshDatePills(dir) {

      function refreshKindPills(dir) {
        block.querySelectorAll(`input[name="${dir}kind-${nm}"]`).forEach(r => {
          const pill = r.closest('.mini-pill');
          if (r.checked) { pill.style.background='rgba(108,140,210,.22)'; pill.style.borderColor='#6c8cd2'; }

              radio.dataset.wasChecked = '';

            refreshDatePills(dir);
          });
        });
        // 차편종류: 토글 + 구체 차편 select 갱신 (해제 시 select 비움)
        block.querySelectorAll(`input[name="${dir}kind-${nm}"]`).forEach(radio => {
          radio.dataset.wasChecked = radio.checked ? '1' : '';
          radio.addEventListener('click', () => {
            const vehBox = block.querySelector(`.${dir}-vehbox`);

              const addBtn2 = (radio.value === 'private') ? `<div style="display:flex; gap:5px; margin-top:4px;"><button type="button" class="add-driver-btn" data-dir="${dir}" style="flex:1; padding:5px; font-size:11px; border:1px dashed var(--gold-soft); border-radius:6px; background:transparent; color:var(--gold-soft); cursor:pointer;">+ 차주 추가</button><button type="button" class="del-driver-btn" data-dir="${dir}" style="flex:1; padding:5px; font-size:11px; border:1px dashed var(--rose); border-radius:6px; background:transparent; color:var(--rose); cursor:pointer;">차주 삭제</button></div>` : '';
              vehBox.innerHTML = `<select class="${dir}-veh" style="width:100%; margin-top:5px;">${vehHtmlFor(radio.value, prev)}</select>` + addBtn2;
              bindAddDriverBtns(block);
              // 버스(본대) 선택 시: 본 차수면 상행=첫날, 하행=끝날 자동 선택
              if (radio.value === 'bus' && nm === churchSessionName()) {
                const def = sessionDefByName(nm) || {};
                const autoDate = (dir === 'up') ? def.upDate : def.downDate;
                if (autoDate) {
                  const dr = block.querySelector(`input[name="${dir}date-${nm}"][value="${autoDate}"]`);
                  if (dr) {

        bindAddDriverBtns(block);
      });
    });

    updateLodgingVisibility();

  }, 30);

  if (!isNew) {
    setTimeout(() => { $('#mDelete').onclick = () => { confirmModal('삭제', `${m.name}을(를) 삭제합니다.`, () => { 
      // 삭제될 데이터 스냅샷 (되돌리기용)
      const snapMember = JSON.parse(JSON.stringify(m));
      const snapEv = DB.evangelism.filter(x => x.memberId === m.id || (!x.memberId && x.name === m.name && x.zone === m.zone)).map(x => JSON.parse(JSON.stringify(x)));
      const snapFee = DB.feeSupport.filter(x => x.memberId === m.id || (!x.memberId && x.name === m.name && x.zone === m.zone)).map(x => JSON.parse(JSON.stringify(x)));
      DB.members = DB.members.filter(x => x.id !== m.id); 
      DB.evangelism = DB.evangelism.filter(x => x.memberId !== m.id && !(!x.memberId && x.name === m.name && x.zone === m.zone));
      DB.feeSupport = DB.feeSupport.filter(x => x.memberId !== m.id && !(!x.memberId && x.name === m.name && x.zone === m.zone));
      logHistory('인원 삭제', m.name + '(' + m.zone + '·' + m.dept + ')');
      saveDB(); closeSheet(); render();
      toastUndo(`${m.name}을(를) 삭제했어요`, () => {
        DB.members.push(snapMember);
        DB.evangelism.push(...snapEv);
        DB.feeSupport.push(...snapFee);
        logHistory('삭제 복구', m.name + '(' + m.zone + '·' + m.dept + ')');
        saveDB(); render();
        toast(`${m.name}을(를) 복구했어요`);
      });
    }); }; }, 50);
  }
}

function driverList(driver, direction) {
  return boardableMembers().filter(m => {
    if (direction === 'up') {
      if (m.extraUp && Object.values(m.extraUp).includes(driver)) return true;
    } else {
      if (m.extraDown && Object.values(m.extraDown).includes(driver)) return true;
    }
    return false;
  });
}

// 개인차 명단 정렬: 차주 본인(이름이 차주명과 동일)을 1번으로, 나머지는 구역순
function sortDriverList(list, driver) {
  return sortMembersDriverFirst(list, driver);
}

function allPrivateDrivers() {
  const set = new Set(PRIVATE_CAR_LIST);
  const known = new Set([...BUSES, ...CHURCH_CARS, ...OTHER_TRANSPORTS, ...PRIVATE_CARS, '']);
  boardableMembers().forEach(m => {
    if (m.extraUp) Object.values(m.extraUp).forEach(v => { if (v && !known.has(v)) set.add(v); });
    if (m.extraDown) Object.values(m.extraDown).forEach(v => { if (v && !known.has(v)) set.add(v); });
  });
  return Array.from(set).filter(s => s).sort((a,b)=>a.localeCompare(b,'ko'));
}

// ===== 차편별 추가 탑승자 (본 교회 차수 미등록이나 본대 버스·교회차·기타 차편 이용) =====
// DB.settings.busExtras = { 키: [인원, ...] }. 정식 멤버가 아니므로 모든 집계에서 제외되며,
// 차편 탭 그 차편 인원수와 인쇄에만 반영된다.
//  키: 본대 호차는 차편명 그대로('1호차'), 교회차·기타는 차수별 명단이 나뉘므로 '차편명@@차수'('교회차1@@1차').
//  대중교통(명단 관리 대상 아님)과 타교회(타교회 측이 명단 관리)는 이 기능에서 제외.
function supportsExtras(type) {
  if (!type || type === '대중교통' || type === '개인차' || type === '타교회') return false;
  return BUSES.includes(type) || CHURCH_CARS.includes(type) || OTHER_TRANSPORTS.includes(type);
}
// 옛 전역 탑승 확인(boardUp/boardDown) → 본 차수 기록으로 1회 이관.
// 예전 공유 플래그 시절의 체크가 새 차수·차편 확인란에 '유령 체크'로 비치지 않게 한다.
// (이관 후 옛 필드는 비워지고, 기록이 없는 차수의 확인란은 항상 해제로 시작)
function migrateLegacyBoardChecks(d) {
  const ch = (d && d.meta && (d.meta.churchSession || d.meta.session)) || '';
  if (!ch || !d.members) return;
  d.members.forEach(m => {
    if (m.boardUp || m.boardDown) {
      m.boardChecks = m.boardChecks || {};
      if (!m.boardChecks[ch]) m.boardChecks[ch] = { up: !!m.boardUp, down: !!m.boardDown };
      m.boardUp = false; m.boardDown = false;
    }
  });
}
// 예전 버스 미등록 키(호차 이름만) → '호차@@본차수'로 1회 이관. 차수별 독립 저장의 하위호환.
// 빈 배열 툼스톤을 남겨 동기화 병합에서 옛 키가 되살아나도 화면에는 영향이 없다.
function migrateBusExtrasToSessions(d) {
  const be = d && d.settings && d.settings.busExtras;
  const ch = (d && d.meta && (d.meta.churchSession || d.meta.session)) || '';
  if (!be || !ch) return;
  Object.keys(be).forEach(k => {
    if (k.indexOf('@@') < 0 && Array.isArray(be[k]) && be[k].length) {
      const nk = k + '@@' + ch;
      if (!Array.isArray(be[nk]) || !be[nk].length) { be[nk] = be[k]; be[k] = []; }
    }
  });
}
function busExtraKey(type, session) {
  return session ? (type + '@@' + session) : type;
}
// 저장 키를 사람이 읽기 좋은 형태로 ('교회차1@@1차' → '교회차1 · 1차')
function busExtraDisp(key) {
  return String(key || '').replace('@@', ' · ');
}
function busExtrasOf(busName) {
  const be = (DB.settings && DB.settings.busExtras) || {};
  const arr = Array.isArray(be[busName]) ? be[busName] : [];
  // 하위호환: 옛 문자열 데이터를 객체로 정규화
  return arr.map(it => (typeof it === 'string')
    ? { church:'', name:it, dept:'', up:true, down:true, boardUp:false, boardDown:false }
    : { church:it.church||'', name:it.name||'', dept:it.dept||'', up:it.up!==false, down:it.down!==false, boardUp:!!it.boardUp, boardDown:!!it.boardDown });
}
// 추가 탑승자 1명 추가 (상/하행 탑승 여부 포함)
function addBusExtra(busName, obj) {
  const name = (obj && obj.name || '').trim();
  if (!name) return;
  DB.settings = DB.settings || {};
  DB.settings.busExtras = DB.settings.busExtras || {};
  if (!Array.isArray(DB.settings.busExtras[busName])) DB.settings.busExtras[busName] = [];
  DB.settings.busExtras[busName].push({
    church: (obj.church||'').trim(), name: name, dept: (obj.dept||'').trim(),
    up: obj.up!==false, down: obj.down!==false, boardUp:false, boardDown:false
  });
  logHistory('추가탑승자 등록', busExtraDisp(busName) + ' · ' + name);
  saveDB();
}
function removeBusExtra(busName, idx) {
  const arr = (DB.settings && DB.settings.busExtras && DB.settings.busExtras[busName]) || [];
  if (idx >= 0 && idx < arr.length) { const nm = (typeof arr[idx]==='string'?arr[idx]:(arr[idx].name||'')); arr.splice(idx, 1); logHistory('추가탑승자 삭제', busExtraDisp(busName) + ' · ' + nm); saveDB(); }
}
// 방향별 삭제: 그 방향(상행/하행) 탑승만 해제. 상·하행 둘 다 해제되면 사람 자체를 제거.
function removeBusExtraDir(busName, idx, dir) {
  const arr = (DB.settings && DB.settings.busExtras && DB.settings.busExtras[busName]) || [];
  if (idx < 0 || idx >= arr.length) return;
  let it = arr[idx];
  if (typeof it === 'string') it = arr[idx] = { church:'', name:it, dept:'', up:true, down:true, boardUp:false, boardDown:false };
  const nm = it.name || '';
  if (dir === 'up') { it.up = false; it.boardUp = false; }
  else { it.down = false; it.boardDown = false; }
  // 둘 다 안 타면 제거
  if (!it.up && !it.down) arr.splice(idx, 1);
  logHistory('추가탑승자 변경', busExtraDisp(busName) + ' · ' + nm + ' ' + (dir==='up'?'상행':'하행') + ' 해제');
  saveDB();
}
// 추가 탑승자 필드 변경 (탑승 확인 체크 등)
function setBusExtraField(busName, idx, field, value) {
  const arr = (DB.settings && DB.settings.busExtras && DB.settings.busExtras[busName]) || [];
  if (idx >= 0 && idx < arr.length) {
    if (typeof arr[idx] === 'string') arr[idx] = { church:'', name:arr[idx], dept:'', up:true, down:true, boardUp:false, boardDown:false };
    arr[idx][field] = value;
    // 탑승 확인 체크는 이력에 남기지 않음 (자주 반복되는 사소한 작업)
    saveDB();
  }
}
// 호차의 상행/하행 추가 탑승 인원수
function busExtraCount(busName, dir) {
  return busExtrasOf(busName).filter(e => dir==='up' ? e.up : e.down).length;
}
// 차편 추가 탑승자 입력 + 목록 UI (표 형태: 번호·교회명·성명·부서·상하행·탑승확인)

/* ---------- 숙소 탭 ---------- */
// 차편 탭과 같은 칩 구조: 상단에 [전체][각 숙소][미배정] 칩, 아래에 선택한 항목의 화면.
function renderLodging() {
  ensureLodgingDefs();

  const names = lodgingNamesAll();
  const unList = lodgingUnassigned();
  let sel = lodgingTab.name;
  if (sel !== '__all__' && sel !== '__un__' && !names.includes(sel)) { lodgingTab.name = '__all__'; sel = '__all__'; }
  const church = churchSessionName();

  let html = `
    <div class="transport-tabs" id="lgTabs" style="margin-top:10px;">
      <button class="tt-pill ${sel === '__all__' ? 'active' : ''}" data-l="__all__">전체</button>
      ${names.map(n => {
        const c = (lodgings[n] || []).length + lodgingExtrasOf(n).length, cap = lodgingCapOf(n);
        return `<button class="tt-pill ${n === sel ? 'active' : ''}" data-l="${esc(n)}"${(cap && c > cap) ? ' style="color:var(--rose);"' : ''}>${esc(n)} ${c}${cap ? '/' + cap : ''}</button>`;
      }).join('')}
      <button class="tt-pill ${sel === '__un__' ? 'active' : ''}" data-l="__un__"${unList.length ? ' style="color:var(--rose);"' : ''}>미배정 ${unList.length}</button>
    </div>
  `;

  if (sel === '__all__') {
    html += `<div class="card">
      <div class="card-head"><div class="card-title">숙소 전체</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
          <button class="card-action" onclick="openLodgingManage()">숙소 관리</button>
          <button class="card-action" onclick="renderLodgingSheet()">전체보기</button>
          <button class="card-action" onclick="photoRun('execPrintLodging')">사진</button>
          <button class="card-action" onclick="execPrintLodging()">인쇄</button>
        </div>
      </div>
      ${church ? `<div style="font-size:11.5px; color:var(--ink-mute); margin-bottom:8px;">숙소는 본 차수(${esc(church)}) 참여자 기준입니다. 칸을 누르면 그 숙소로 이동합니다.</div>` : ''}
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(88px, 1fr));gap:8px">${lodgingTilesHtml('chip')}</div>
    </div>`;
    return html;
  }

  if (sel === '__un__') {
    html += `<div class="card">
      <div class="card-head"><div class="card-title">숙소 미배정 <span style="font-weight:400;font-size:12px;color:var(--ink-mute)">${unList.length}명</span></div></div>
      <div class="notice" style="margin-bottom:8px;">본 차수 참여자 중 숙소가 아직 없는 인원입니다. 이름을 누르면 숙소를 정하고 비고도 적을 수 있어요.</div>
      ${lodgingRosterHtml(unList.slice().sort(memberSortCmp))}
    </div>`;
    return html;
  }

  const list = (lodgings[sel] || []).slice().sort(memberSortCmp);
  const exs = lodgingExtrasOf(sel);
  const total = list.length + exs.length;
  const cap = lodgingCapOf(sel);
  const selJs = esc(sel).replace(/'/g, "\\'");
  html += `<div class="card">
    <div class="card-head"><div class="card-title">${esc(sel)} <span style="font-weight:400;font-size:12px;color:${cap && total > cap ? 'var(--rose)' : 'var(--ink-mute)'}">${total}${cap ? '/' + cap : ''}명</span></div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
        <button class="card-action" onclick="openLodgingAssign('${selJs}')">+ 인원 추가</button>
        <button class="card-action" onclick="openSingleLodging('${selJs}')">전체보기</button>
        <button class="card-action" onclick="photoRun('execPrintLodgingOne','${selJs}')">사진</button>
        <button class="card-action" onclick="execPrintLodgingOne('${selJs}')">인쇄</button>
      </div>
    </div>
    ${cap && total > cap ? `<div style="padding:8px 12px; border:1px dashed var(--rose); border-radius:9px; color:var(--rose); font-size:12px; margin-bottom:8px;">⚠ 정원(${cap}명)을 ${total - cap}명 초과했어요.</div>` : ''}
    <div class="notice" style="margin-bottom:8px;">이름을 누르면 그 사람의 숙소와 비고를 바꿀 수 있어요. <b>미등록</b> 인원은 누르면 수정하거나 뺄 수 있어요.</div>
    ${lodgingRosterHtml(list, sel)}
  </div>`;
  return html;
}

function renderTransport() {
  // 호차가 늘어나도 상단 칩은 '본대 버스' 하나 — 그 안에서 [전체(호차 요약)] ↔ [호차 상세]로 오간다.
  const TYPES = ['__mainbus__', ...CHURCH_CARS, '개인차', ...OTHER_TRANSPORTS];
  const SPECIAL = ['__busassign__', '__unassigned__'];
  let type = transportTab.type;
  if (BUSES.includes(type)) { transportTab.session = type; transportTab.type = '__mainbus__'; type = '__mainbus__'; }  // 옛 개별 호차 칩 상태 호환
  if (!TYPES.includes(type) && !SPECIAL.includes(type)) { transportTab.type = SPECIAL[0]; type = SPECIAL[0]; }
  const isBA = type === '__busassign__';
  const isUA = type === '__unassigned__';

  let html = `
    <div class="transport-tabs" id="ttTabs" style="margin-top:10px;">
      <button class="tt-pill ${isBA?'active':''}" data-t="__busassign__">본대 배정</button>
      ${TYPES.map(t => `<button class="tt-pill ${t===type?'active':''}" data-t="${esc(t)}">${t === '__mainbus__' ? '본대 버스' : esc(t)}</button>`).join('')}
      <button class="tt-pill ${isUA?'active':''}" data-t="__unassigned__">미배정</button>
    </div>
  `;

  // 본대 배정 / 미배정: 차편 탭 안에 인라인으로 표시 (다른 차편과 동일한 느낌)
  if (isBA) {
    html += `<div class="card">
      <div class="card-head"><div class="card-title">본대 배정</div></div>
      <div id="baInline">${busAssignBodyHtml(true)}</div>
    </div>`;
    return html;
  }
  if (isUA) {
    // 차수 서브칩: 전체(차수별 요약) ↔ 차수 상세. 뒤로가기·칩 이동은 setTransportChip 공용 규칙.
    let uaSes = transportTab.session || '';
    if (uaSes && !getSessionDefs().some(d => d.name === uaSes)) { transportTab.session = ''; uaSes = ''; }
    const uaChips = `<div class="transport-tabs" id="trSesTabs" style="margin:2px 0 10px;">
      <button class="tt-pill ${!uaSes ? 'active' : ''}" data-s="">전체</button>
      ${getSessionDefs().map(d => `<button class="tt-pill ${d.name === uaSes ? 'active' : ''}" data-s="${esc(d.name)}">${esc(d.name)}</button>`).join('')}
    </div>`;
    let uaBody = '';
    if (!uaSes) {
      const rows = getSessionDefs().map(d => d.name)
        .map(sn => ({ sn, u: unassignedItems(sn, 'up').length, dn: unassignedItems(sn, 'down').length }))
        .filter(x => x.u || x.dn);
      if (!rows.length) {
        uaBody = `<div style="text-align:center; padding:20px; color:var(--ink-mute); font-size:13px;">모든 인원이 배차되었습니다.</div>`;
      } else {
        uaBody = `<div class="notice" style="margin-bottom:8px;">차수를 누르면 그 차수의 미배정 명단이 열립니다.</div>`;
        rows.forEach(x => {
          const sj = esc(x.sn).replace(/'/g, "\\'");
          uaBody += `<div class="clickable" style="display:flex; align-items:center; gap:8px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; margin:6px 0; background:var(--bg-1);" onclick="setTransportChip('${sj}')">
            <span style="font-weight:800; color:var(--gold);">${esc(x.sn)}</span>
            <span style="font-size:12px; color:var(--ink-soft);">상행 ${x.u} / 하행 ${x.dn}</span>
            <span style="margin-left:auto; color:var(--ink-mute);">›</span>
          </div>`;
        });
      }
    } else {
      uaBody = unassignedBodyHtml(true, uaSes);
    }
    html += `<div class="card">
      <div class="card-head"><div class="card-title">미배정자 배차${uaSes ? ' · ' + esc(uaSes) : ''}</div></div>
      ${uaChips}
      <div id="uaInline">${tbdNoticeHtml()}${uaBody}</div>
    </div>`;
    return html;
  }

  const isMainBus = type === '__mainbus__';
  // transportTab.session은 '서브 선택' 칸: 본대 버스에선 호차명, 그 외엔 차수명. ''=전체(요약).
  let trSes = transportTab.session || '';
  if (isMainBus) { if (trSes && !BUSES.includes(trSes)) { transportTab.session = ''; trSes = ''; } }
  else if (trSes && !getSessionDefs().some(d => d.name === trSes)) { transportTab.session = ''; trSes = ''; }
  const __tj = (!isMainBus && trSes) ? esc(trSes).replace(/'/g, "\\'") : '';
  const headTitle = (isMainBus ? '본대 버스' : esc(type)) + ' 탑승 명단' + (trSes ? ' · ' + esc(trSes) : '');
  // 도구: 호차/차수 상세에선 그 범위로 동작(본대 버스는 무인자 — 내부에서 호차 매핑). 본대 버스 '전체'는 각 호차에서 사용.
  const headTools = (isMainBus && !trSes) ? '' :
    `<div style="display:flex;gap:6px;"><button class="card-action" onclick="openTransportFull(${__tj ? `'${__tj}'` : ''})">전체보기</button><button class="card-action" onclick="photoRun('execPrintTransport'${__tj ? `,'${__tj}'` : ''})">사진</button><button class="card-action" onclick="execPrintTransport(${__tj ? `'${__tj}'` : ''})">인쇄</button></div>`;
  html += `
    <div class="card">
      <div class="card-head"><div class="card-title">${headTitle}</div>${headTools}</div>
      <div class="transport-tabs" id="trSesTabs" style="margin:2px 0 10px;">
        <button class="tt-pill ${!trSes ? 'active' : ''}" data-s="">전체</button>
        ${(isMainBus ? BUSES.map(n => ({ name: n })) : getSessionDefs()).map(d => `<button class="tt-pill ${d.name === trSes ? 'active' : ''}" data-s="${esc(d.name)}">${esc(d.name)}</button>`).join('')}
      </div>
  `;

  if (isMainBus) {
    const churchN = churchSessionName();
    if (!trSes) {
      // 전체(요약): 호차별 한 줄 — 상/하 인원 · 미등록 · 출발 시각. 누르면 호차 상세.
      if (!BUSES.length) {
        html += `<div class="empty-state">등록된 호차가 없습니다.<br/><span style="font-size:12px">더보기 → 기초 데이터 설정에서 호차를 추가하세요.</span></div>`;
      } else {
        html += `<div class="notice" style="margin-bottom:8px;">호차를 누르면 명단과 출발 시각 입력이 열립니다. 본 교회 차수(${esc(churchN)}) 기준.</div>`;
        BUSES.forEach(bus => {
          const u = boardableMembers().filter(m => m.transUp === bus).length;
          const d = boardableMembers().filter(m => m.transDown === bus).length;
          const exN = (((DB.settings || {}).busExtras || {})[busExtraKey(bus, churchN)] || []).length;
          const info = getTransInfo(bus, null, churchN);
          const times = [info.upTime ? '상 ' + info.upTime : '', info.downTime ? '하 ' + info.downTime : ''].filter(Boolean).join(' · ');
          const bj = esc(bus).replace(/'/g, "\\'");
          html += `<div class="clickable" style="display:flex; align-items:center; gap:8px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; margin:6px 0; background:var(--bg-1);" onclick="setTransportChip('${bj}')">
            <span style="font-weight:800; color:var(--gold);">${esc(bus)}</span>
            <span style="font-size:12px; color:var(--ink-soft);">상행 ${u} / 하행 ${d}${exN ? ' · 미등록 ' + exN : ''}${times ? ' · ' + times : ''}</span>
            <span style="margin-left:auto; color:var(--ink-mute);">›</span>
          </div>`;
        });
      }
    } else {
      // 호차 상세: 기존 화면 그대로 (본 교회 차수 탑승자)
      const bus = trSes;
      const uList = boardableMembers().filter(m => m.transUp === bus).sort(memberSortCmp);
      const dList = boardableMembers().filter(m => m.transDown === bus).sort(memberSortCmp);
      html += transInfoEditor(bus, null, churchN);  // 본대 버스 = 본 차수 키
      if (churchN) html += `<div style="font-size:12px; color:var(--ink-mute); margin-bottom:6px;">본 교회 차수(${esc(churchN)}) 탑승자</div>`;
      html += buildSplitTable(null, uList, dList, false, null, bus);
      html += busExtraEditor(busExtraKey(bus, churchN), bus, churchN);
    }
  } else if (type === '개인차') {
    // 전체(요약: 차수 집계 + 차주 바로가기) ↔ 차수 상세(차주별 접힘 카드) 2단 구조
    const defs = getSessionDefs();
    const drvOf = (sname) => (PRIVATE_CAR_LIST || []).filter(drv => {
      const g = transSessionGroups('개인차', drv).find(x => x.session === sname);
      return g && (g.uList.length || g.dList.length);
    }).sort((a, b) => a.localeCompare(b, 'ko'));
    if (!trSes) {
      let any = false, sumRows = '';
      const drvIndex = {};
      defs.forEach(def => {
        const sname = def.name;
        const drivers = drvOf(sname);
        if (!drivers.length) return;
        any = true;
        let u = 0, d = 0;
        drivers.forEach(drv => {
          const g = transSessionGroups('개인차', drv).find(x => x.session === sname);
          u += g.uList.length; d += g.dList.length;
          (drvIndex[drv] = drvIndex[drv] || []).push(sname);
        });
        const sj = esc(sname).replace(/'/g, "\\'");
        sumRows += `<div class="clickable" style="display:flex; align-items:center; gap:8px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; margin:6px 0; background:var(--bg-1);" onclick="setTransportChip('${sj}')">
          <span style="font-weight:800; color:var(--gold);">${esc(sname)}</span>
          <span style="font-size:12px; color:var(--ink-soft);">차주 ${drivers.length}명 · 상행 ${u} / 하행 ${d}</span>
          <span style="margin-left:auto; color:var(--ink-mute);">›</span>
        </div>`;
      });
      if (!any) {
        html += `<div class="empty-state">개인차로 가는 사람이 없습니다.<br/><span style="font-size:12px">더보기 → 기초 데이터 설정 → '개인차 목록'에서 차주를 등록하고, 인원 추가에서 개인차를 선택하세요.</span></div>`;
      } else {
        html += `<div class="notice" style="margin-bottom:8px;">차수를 누르면 그 차수의 차주별 명단이 열립니다.</div>` + sumRows;
        const names = Object.keys(drvIndex).sort((a, b) => a.localeCompare(b, 'ko'));
        html += `<div style="font-size:12px; font-weight:700; color:var(--ink-soft); margin:14px 0 6px;">차주 바로가기</div>
          <div style="display:flex; flex-wrap:wrap; gap:6px;">${names.map(n => {
            const nj = esc(n).replace(/'/g, "\\'");
            const fj = esc(drvIndex[n][0]).replace(/'/g, "\\'");
            return `<button class="tt-pill" onclick="gotoTransDriver('${nj}','${fj}')">🚗 ${esc(n)} <span style="color:var(--ink-mute); font-size:11px;">${drvIndex[n].join('·')}</span></button>`;
          }).join('')}</div>`;
      }
    } else {
      const drivers = drvOf(trSes);
      if (!drivers.length) html += `<div class="empty-state">이 차수에 개인차로 가는 사람이 없습니다.</div>`;
      drivers.forEach(drv => {
        const g = transSessionGroups('개인차', drv).find(x => x.session === trSes);
        if (!g) return;
        const okey = trSes + '|' + drv;
        const open = __trOpenDrv.has(okey) || drivers.length === 1;  // 차주가 한 명이면 바로 펼침
        const kj = esc(okey).replace(/'/g, "\\'");
        html += `<div style="border:1px solid var(--line); border-radius:10px; margin:8px 0; overflow:hidden;">
          <div class="clickable" style="display:flex; align-items:center; gap:8px; padding:11px 12px; background:var(--bg-1);" onclick="toggleTransDriver('${kj}')">
            <span style="font-weight:700; color:var(--gold-soft);">🚗 ${esc(drv)}</span>
            <span style="font-size:12px; color:var(--ink-soft);">상행 ${g.uList.length} · 하행 ${g.dList.length}</span>
            <span style="margin-left:auto; font-size:12px; color:var(--ink-mute);">${open ? '▲' : '▼'}</span>
          </div>
          ${open ? `<div style="padding:10px 12px 12px;">${transInfoEditor('', drv, trSes)}${buildSplitTable(null, g.uList, g.dList, false, drv, '개인차', g)}</div>` : ''}
        </div>`;
      });
    }
  } else {
    // 교회차 / 타교회 / 대중교통: 차수별 블록 (헤더에 그 차수 날짜 표시)
    //  교회차·기타(대중교통 제외)는 각 차수 블록 아래 '미등록 인원 추가' 폼 제공.
    //  등록자가 없어도 추가 탑승자가 있는 차수는 블록을 만들어 명단이 보이게 한다.
    const canExtra = supportsExtras(type);
    const groups = sessionGroupsWithExtras(type);
    if (trSes) {
      // 차수 상세: 그 차수만 (등록자가 없어도 미등록 추가 폼은 제공)
      const g = groups.find(x => x.session === trSes);
      if (g) {
        html += transInfoEditor(type, null, trSes);
        html += buildSplitTable(null, g.uList, g.dList, false, null, type, g);
      } else {
        html += `<div class="empty-state">이 차수에 등록자가 없습니다.</div>`;
      }
      if (canExtra) html += busExtraEditor(busExtraKey(type, trSes), type, trSes);
    } else if (groups.length === 0) {
      html += `<div class="empty-state">해당 차편 등록자가 없습니다.${canExtra && getSessionDefs().length ? '<br/><span style="font-size:12px">위 칩에서 차수를 고르면 미등록 인원을 추가할 수 있습니다.</span>' : ''}</div>`;
    } else {
      // 전체(요약): 차수별 한 줄 — 누르면 그 차수 상세
      html += `<div class="notice" style="margin-bottom:8px;">차수를 누르면 그 차수의 명단과 시각 입력이 열립니다.</div>`;
      groups.forEach(g => {
        const info = getTransInfo(type, null, g.session);
        const times = [info.upTime ? '상 ' + info.upTime : '', info.downTime ? '하 ' + info.downTime : ''].filter(Boolean).join(' · ');
        const sj = esc(g.session).replace(/'/g, "\\'");
        html += `<div class="clickable" style="display:flex; align-items:center; gap:8px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; margin:6px 0; background:var(--bg-1);" onclick="setTransportChip('${sj}')">
          <span style="font-weight:800; color:var(--gold);">${esc(g.session)}</span>
          <span style="font-size:12px; color:var(--ink-soft);">상행 ${g.uList.length} / 하행 ${g.dList.length}${times ? ' · ' + times : ''}</span>
          <span style="margin-left:auto; color:var(--ink-mute);">›</span>
        </div>`;
      });
    }
  }

  html += `</div>`;
  return html;
}

function renderFeeSupportSheet(isReopen) {
  const fsTotal = feeSupportCounted().reduce((s, fs) => s + (fs.amount||0), 0);
  const html = `
    <div style="background:linear-gradient(135deg, rgba(255,200,87,.15), rgba(255,200,87,.05));border:1px solid rgba(255,200,87,.3);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:var(--ink-mute)">지원금액 합계</div>
        <div style="font-size:22px;font-weight:800;color:var(--gold);letter-spacing:-.02em;margin-top:2px">${won(fsTotal)}<span style="font-size:13px;color:var(--ink-mute);font-weight:500;margin-left:3px">원</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--ink-mute)">인원</div>
        <div style="font-size:18px;font-weight:700">${feeSupportCounted().length}<span style="font-size:12px;color:var(--ink-mute);margin-left:2px">명</span></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <button class="btn btn-secondary" onclick="photoRun('execPrintFeeSupport')" style="flex:1">사진</button>
      <button class="btn btn-secondary" onclick="execPrintFeeSupport()" style="flex:1">인쇄</button>
    </div>
    <div style="overflow-x:auto;">

          }
        });
      };
    });

}

/* ---------- 입력 점검 ---------- */
function openInputCheckSheet(isReopen) {
  const defs = getSessionDefs();
  const church = churchSessionName();
  // 차편·날짜 점검 대상 — 불참·환불자는 차편이 필요 없으므로 제외
  const regs = boardableMembers();
  const defOf = {}; defs.forEach(d => { defOf[d.name] = d; });

  // 1) 차수 날짜 미설정 (설정 차원 경고)
  const noDateDefs = defs.filter(d => !d.upDate || !d.downDate).map(d => d.name);

  // 2) 본 교회 차수 참여인데 차편(상/하행) 미선택
  const noTrans = [];
  if (church) regs.forEach(m => {
    if (!memberSessions(m).includes(church)) return;
    const st = (m.sessionTrans && m.sessionTrans[church]) || {};
    const miss = [];
    if (!st.upVehicle) miss.push('상행');
    if (!st.downVehicle) miss.push('하행');
    if (miss.length) noTrans.push({ m: m, what: miss.join('·') + ' 차편 없음' });
  });

  // 3) 차수는 체크했는데 날짜 미선택 (차수 날짜가 설정된 차수만 검사)
  const noDate = [];
  regs.forEach(m => {
    memberSessions(m).forEach(sn => {
      const def = defOf[sn];
      if (!def) return;
      const st = (m.sessionTrans && m.sessionTrans[sn]) || {};
      const miss = [];
      if (def.upDate && !st.upDate) miss.push('상행');
      if (def.downDate && !st.downDate) miss.push('하행');
      if (miss.length) noDate.push({ m: m, what: sn + ' ' + miss.join('·') + ' 날짜 없음' });
    });
  });

  // 미입력 목록 정렬: 구역 → 회(부서) → 가나다 (다른 명단과 동일 기준)
  // (접수 구분은 인원 추가 시 필수 입력이라 점검 대상에서 제외)
  const byMember = (a, b) => memberSortCmp(a.m, b.m);
  noTrans.sort(byMember);
  noDate.sort(byMember);
  // 4) 차수 미정 인원 — 차수가 정해져야 차편·날짜 입력이 가능하므로 여기서 모아 보여준다
  const tbdList = regs.filter(m => memberSessions(m).includes(SESSION_TBD)).map(m => ({ m: m, what: '차수 미정' }));
  tbdList.sort(byMember);

  function nameBtn(it) {
    return '<button class="chk-name" data-mid="' + esc(it.m.id) + '" style="display:flex; justify-content:space-between; align-items:center; width:100%; text-align:left; padding:9px 12px; border:1px solid var(--line-soft); border-radius:9px; background:var(--bg-1); color:var(--ink); margin-bottom:6px;">' +
      '<span style="font-weight:700;">' + esc(it.m.zone) + ' · ' + esc(it.m.name) + '</span>' +
      '<span style="font-size:12px; color:var(--rose);">' + esc(it.what) + '</span></button>';
  }
  function section(title, items, emptyMsg) {
    const head = '<div style="font-weight:800; color:var(--gold-soft); margin:14px 0 7px;">' + title + ' <span style="color:' + (items.length ? 'var(--rose)' : 'var(--green)') + '">' + items.length + '명</span></div>';
    if (!items.length) return head + '<div style="font-size:12px; color:var(--ink-mute); margin-bottom:4px;">' + emptyMsg + '</div>';
    return head + items.map(nameBtn).join('');
  }

  let html = '<div class="notice">행사 전에 빠진 입력을 확인하세요. 이름을 누르면 바로 수정 화면이 열립니다.</div>';
  if (noDateDefs.length) {
    html += '<div style="padding:9px 12px; border:1px solid var(--rose); border-radius:9px; color:var(--rose); font-size:13px; margin-bottom:4px;">⚠ 날짜가 설정되지 않은 차수: <b>' + esc(noDateDefs.join(', ')) + '</b><br/><span style="font-size:12px;">더보기 → 행사 정보 수정에서 차수 날짜를 먼저 설정해 주세요.</span></div>';
  }
  if (church) html += section('본 교회 차수(' + esc(church) + ') 차편 미선택', noTrans, '모두 차편이 선택되어 있어요.');
  else html += '<div style="font-size:12px; color:var(--ink-mute); margin:10px 0;">본 교회 차수가 설정되지 않아 차편 점검을 건너뛰었어요.</div>';
  html += section('차수 날짜 미선택', noDate, '모두 날짜가 선택되어 있어요.');
  html += section('차수 미정', tbdList, '차수 미정 인원이 없어요.');
  const total = noTrans.length + noDate.length + tbdList.length;
  if (!total && !noDateDefs.length) html += '<div style="text-align:center; padding:14px; color:var(--green); font-weight:800;">✓ 점검 완료 — 빠진 입력이 없습니다.</div>';

  openSheet('입력 점검', html, null, { hideSave: true, replaceTop: !!isReopen, reopener: () => openInputCheckSheet(true) });
  setTimeout(function () {
    document.querySelectorAll('#sheetBody .chk-name').forEach(function (b) {
      b.onclick = function () {
        // 편집창을 위에 쌓아서, 저장이든 취소든 닫히면 입력 점검이 자동으로 다시 열림(reopener)
        openMemberById(b.dataset.mid);
      };
    });
  }, 50);
}

/* ---------- 변경 이력 ---------- */
// 데이터가 바뀐 최근 기록(최대 50건)을 보여줌. 각 기기가 아니라 데이터에 저장되어 클라우드로 함께 동기화됨.
function openHistorySheet() {
  const hist = Array.isArray(DB.history) ? DB.history : [];
  // 작업 종류별 색: 추가/등록=금색, 삭제/불참=붉은색, 복구=청록, 그 외=기본
  function actionColor(a) {
    if (/복구|해제/.test(a)) return 'var(--accent-teal)';
    if (/삭제|불참|환불|취소/.test(a)) return 'var(--rose)';
    if (/추가|등록/.test(a)) return 'var(--gold)';
    return 'var(--ink-soft)';
  }
  const canClear = !DB.roomCode || DB.isHost;
  // 세로 스크롤: sheet-body 자체의 overflow(검증된 기본 스크롤)에 맡긴다.
  //  이중 flex + height:100% 구조는 iOS Safari에서 높이 전파가 어긋나 스크롤이 깨지므로 쓰지 않는다.
  // 가로 스크롤: 세로 모드(좁은 화면)에서 긴 내용이 말줄임(…)으로 잘리던 문제의 해결.
  //  각 행의 말줄임(ellipsis)을 없애고, 목록 전체를 overflow-x:auto 래퍼에 넣어
  //  옆으로 밀어서(가로 스크롤) 잘린 부분까지 전부 볼 수 있게 한다.
  let html = '';
  html += '<div class="notice" style="margin-bottom:10px;">데이터가 바뀐 기록을 최근 ' + HISTORY_MAX + '건까지 보여줍니다. <b>내용이 화면보다 길면 목록을 옆으로 밀어서</b> 끝까지 볼 수 있어요. 이 기록은 데이터에 함께 저장되어, 동기화하면 다른 기기에서도 같은 이력을 볼 수 있습니다. (단, 동기화는 마지막에 올린 자료가 우선이라, 겹쳐 쓴 작업은 이력에 남지 않을 수 있습니다.)</div>';
  if (!hist.length) {
    html += '<div class="empty-state">아직 기록된 변경이 없습니다.<br/><span style="font-size:12px">인원을 추가하거나 차편·회비를 바꾸면 여기에 쌓입니다.</span></div>';
  } else {
    // 목록 — 가로 스크롤 래퍼 안에 배치. 세로 스크롤은 여전히 sheet-body가 통째로 담당.
    //  바깥 래퍼: overflow-x:auto → 좁은 화면에서 옆으로 밀어 볼 수 있음
    //  안쪽 래퍼: width:max-content(가장 긴 행 폭만큼 확장) + min-width:100%(짧아도 화면 폭을 채워 밑줄이 끝까지 그어짐)
    html += '<div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">';
    html += '<div style="width:max-content; min-width:100%;">';
    html += hist.map(function (h) {
      const col = actionColor(h.a);
      return '<div style="display:flex; align-items:baseline; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line-soft);">'
        + '<div style="flex:0 0 78px; font-size:11.5px; color:var(--ink-mute); white-space:nowrap;">' + esc(fmtHistoryTime(h.t)) + '</div>'
        + '<div style="flex:0 0 auto; font-size:12.5px; font-weight:700; color:' + col + '; white-space:nowrap;">' + esc(h.a) + '</div>'
        + '<div style="flex:0 0 auto; font-size:12.5px; color:var(--ink-soft); white-space:nowrap; padding-right:12px;">' + esc(h.o) + '</div>'
        + '</div>';
    }).join('');
    html += '</div></div>';
    // 지우기 버튼 — 가로 스크롤 래퍼 "밖"(목록 다음)에 배치. 화면 폭에 고정되어 옆으로 밀려나지 않음 (방장만)
    if (canClear) {
      html += '<div style="padding-top:14px;"><button class="btn btn-secondary" style="width:100%; padding:10px;" onclick="clearHistory()">이력 지우기</button></div>';
    }
  }
  openSheet('변경 이력', html, null, { hideSave: true });
}
function clearHistory() {
  // 이력 지우기는 방장만 (동기화 미사용 시엔 본인이 방장이므로 허용)
  if (DB && DB.roomCode && !DB.isHost) {
    toast('변경 이력은 방장만 지울 수 있어요.', true);
    return;
  }
  confirmModal('이력 지우기', '변경 이력을 모두 지웁니다. (등록된 인원·회비 등 실제 데이터는 그대로 유지됩니다.)', function () {
    DB.history = [];
    saveDB();
    closeSheet();
    toast('이력을 지웠어요');
  }, '지우기');
}

/* ---------- 자동 백업 복원 ---------- */
function openAutoBackupSheet() {
  const list = loadAutoBackups();
  if (!list.length) {
    openSheet('자동 백업 복원', '<div class="empty-state">아직 자동 백업이 없습니다.<br/><span style="font-size:12px">실시간 동기화에 연결될 때마다, 연결 직전의 데이터가 자동으로 저장됩니다.</span></div>', null, { hideSave: true });
    return;
  }
  const rows = list.slice().reverse().map(function (b, ri) {
    const idx = list.length - 1 - ri;
    const dt = new Date(b.ts);
    const when = dt.getFullYear() + '.' + (dt.getMonth() + 1) + '.' + dt.getDate() + ' ' + String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0');
    const d = b.data || {};
    const cnt = '명단 ' + ((d.members || []).length) + ' · 전도 ' + ((d.evangelism || []).length) + ' · 회비 ' + ((d.feeSupport || []).length);
    return '<div style="border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px; margin-bottom:8px;">' +
      '<div style="font-weight:700;">' + esc((d.meta && d.meta.title) || b.title || '행사') + '</div>' +
      '<div style="font-size:12px; color:var(--ink-mute); margin:2px 0 8px;">' + esc(when) + (b.reason ? ' · ' + esc(b.reason) : '') + ' · ' + cnt + '</div>' +
      '<button class="btn btn-secondary" style="width:100%; padding:9px;" onclick="restoreAutoBackup(' + idx + ')">새 행사로 복원</button></div>';
  }).join('');
  openSheet('자동 백업 복원',
    '<div class="notice">실시간 동기화에 연결되기 직전의 데이터가 자동 저장됩니다. 복원하면 기존 행사는 그대로 두고 <b>새 행사로 추가</b>됩니다.</div>' + rows,
    null, { hideSave: true });
}

function restoreAutoBackup(idx) {
  const list = loadAutoBackups();
  const b = list[idx];
  if (!b || !b.data) { toast('백업을 찾을 수 없어요', true); return; }
  const ev = JSON.parse(JSON.stringify(b.data));
  ev.id = 'ev' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  delete ev.roomCode; delete ev.viewCode; ev.viewOnly = false; ev.isHost = true;
  ev.meta = ev.meta || {};
  ev.meta.title = ((ev.meta.title || b.title || '행사') + ' (백업 복원)');
  VAULT.events.push(ev);
  saveVault();
  closeSheet(true);
  switchEvent(ev.id);
  toast('백업을 새 행사로 복원했어요');
}

function openFeeRateSheet() {
  if (guardSettings()) return;
  // 각 행: 회(부서) 이름(편집 가능) + 단가(편집 가능) + 삭제
  function rowHTML(name, fee) {
    return `<div class="field deptfee-row" style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
      <input type="text" class="df-name" value="${esc(name)}" placeholder="회(부서)명" style="flex:1.4; min-width:0;"/>
      <input type="number" class="df-fee" value="${fee||0}" placeholder="단가" style="flex:1; min-width:0;"/>
      <button type="button" class="df-del" title="삭제" style="flex-shrink:0; width:34px; height:34px; border:none; border-radius:8px; background:rgba(255,90,90,.15); color:#ff7a7a; font-size:18px; cursor:pointer;">×</button>
    </div>`;
  }
  const rows = DEPTS.map(d => rowHTML(d, DB.fees[d])).join('');
  const html = `
    <div class="notice">회(부서)와 회비 단가를 수정·추가할 수 있습니다.</div>
    <div id="dfList">${rows}</div>
    <button type="button" id="dfAdd" class="btn btn-secondary" style="width:100%; margin-top:6px;">＋ 회(부서) 추가</button>
  `;
  openSheet('회(부서)별 회비 단가 설정', html, () => {
    // 저장: 행들을 순서대로 읽어 새 DEPTS / fees 구성
    const rowsEl = $$('#dfList .deptfee-row');
    const newDepts = [];
    const newFees = {};
    const renameMap = {};  // 옛이름 → 새이름 (멤버 dept 갱신용)
    const oldNames = DEPTS.slice();
    rowsEl.forEach((row, i) => {
      const nm = row.querySelector('.df-name').value.trim();
      const fee = parseInt(row.querySelector('.df-fee').value, 10) || 0;
      if (!nm) return;  // 빈 이름은 건너뜀(삭제 효과)
      if (newDepts.includes(nm)) return;  // 중복 이름 방지
      newDepts.push(nm);
      newFees[nm] = fee;
      // 같은 위치의 옛 이름이 다르면 rename으로 간주
      const oldNm = oldNames[i];
      if (oldNm && oldNm !== nm) renameMap[oldNm] = nm;
    });
    if (newDepts.length === 0) { toast('회(부서)를 최소 1개 입력해 주세요', true); return; }
    // 멤버/전도/회비/기도의 dept를 rename 반영
    const applyRename = (obj) => { if (obj && obj.dept && renameMap[obj.dept]) obj.dept = renameMap[obj.dept]; };
    DB.members.forEach(applyRename);
    DB.evangelism.forEach(applyRename);
    DB.feeSupport.forEach(applyRename);
    DB.prayList.forEach(applyRename);
    // 전역 + 저장
    DEPTS = newDepts;
    DB.fees = newFees;
    DB.settings = DB.settings || {};
    DB.settings.deptList = newDepts.slice();
    logHistory('회·부서 설정 변경', DEPTS.length + '개');
    saveDB(); render(); toast('회(부서) 설정이 저장됐어요');
  });

  // 추가 버튼 / 삭제 버튼 바인딩
  setTimeout(() => {
    const addBtn = document.getElementById('dfAdd');
    const list = document.getElementById('dfList');
    function bindDel(scope) {
      (scope || list).querySelectorAll('.df-del').forEach(b => {
        b.onclick = () => { b.closest('.deptfee-row').remove(); };
      });
    }
    bindDel();
    if (addBtn) addBtn.onclick = () => {
      const div = document.createElement('div');
      div.innerHTML = `<div class="field deptfee-row" style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
        <input type="text" class="df-name" value="" placeholder="회(부서)명" style="flex:1.4; min-width:0;"/>
        <input type="number" class="df-fee" value="0" placeholder="단가" style="flex:1; min-width:0;"/>
        <button type="button" class="df-del" style="flex-shrink:0; width:34px; height:34px; border:none; border-radius:8px; background:rgba(255,90,90,.15); color:#ff7a7a; font-size:18px; cursor:pointer;">×</button>
      </div>`;
      const row = div.firstElementChild;
      list.appendChild(row);
      bindDel(row.parentElement);
      row.querySelector('.df-name').focus();
    };
  }, 60);
}

/* ===== 접수 현황 ===== */
function intakeGroups() {
  const g = { pre1: [], pre2: [], onsite: [], other: [], noshow: [], refund: [] };
  (DB.members || []).forEach(function (m) {
    if (isInfantDept(m.dept)) return;  // 영유아는 접수 현황 집계에서 제외
    // 현장접수자는 불참이어도 '현장 접수' 명단에 남긴다 (자료 보존 + 등록/불참 관리)
    if (m.regType === 'onsite') { g.onsite.push(m); return; }
    // 그 외: 참석 상태(불참·환불)가 우선 — 접수 경로와 무관하게 별도 집계
    if (m.status === 'refund') { g.refund.push(m); return; }
    if (m.status === 'noshow') { g.noshow.push(m); return; }
    const t = m.regType || 'pre1';
    (g[t] || g.pre1).push(m);
  });
  const byZone = memberSortCmp;
  Object.keys(g).forEach(function (k) { g[k].sort(byZone); });
  return g;
}

function intakeTable(list, withRegister, groupKey) {
  if (!list.length) return '<div style="text-align:center;padding:16px;font-size:12px;color:var(--ink-mute)">해당 없음</div>';
  const isOnsite = groupKey === 'onsite';
  // 현장 접수 명단은 등록+불참 두 버튼(넓게), 그 외 등록 대상은 등록 버튼만
  const actCol = isOnsite ? '104px' : (withRegister ? '52px' : '');
  const cols = (withRegister || isOnsite) ? ('28px 58px 1fr 92px 44px ' + actCol) : '28px 58px 1fr 100px 48px';
  // 헤드의 등록·불참 라벨을 아래 버튼과 같은 flex·고정폭으로 배치해 세로 열을 맞춘다
  const actHead = isOnsite
    ? '<div style="display:flex;gap:6px;justify-content:center"><span style="width:44px;text-align:center">등록</span><span style="width:44px;text-align:center">불참</span></div>'
    : (withRegister ? '<div style="text-align:center">등록</div>' : '');
  let head = '<div class="roster-row head" style="grid-template-columns:' + cols + '"><div class="no">번호</div><div>구역</div><div>성명</div><div>회(부서)</div><div>차수</div>' + actHead + '</div>';
  let rows = list.map(function (m, i) {
    let act = '';
    if (isOnsite) {
      const isNo = m.status === 'noshow';
      const isRegd = m.registered === true;
      // 등록 버튼(등록됨이면 ✓ 강조, 불참이면 비활성) + 불참 토글 — 각 버튼 44px 고정폭으로 헤드와 정렬
      act = '<div style="display:flex;gap:6px;justify-content:center">'
        + '<button class="intake-act" style="width:44px;' + (isRegd ? 'color:var(--gold);border-color:var(--gold);font-weight:800' : '') + (isNo ? 'opacity:0.4' : '') + '" ' + (isNo ? 'disabled' : '') + ' onclick="intakeRegister(\'' + esc(m.id) + '\')">' + (isRegd ? '등록✓' : '등록') + '</button>'
        + '<button class="intake-act" style="width:44px;' + (isNo ? 'color:var(--rose);border-color:var(--rose);font-weight:800' : '') + '" onclick="intakeToggleNoShow(\'' + esc(m.id) + '\')">' + (isNo ? '불참✓' : '불참') + '</button>'
        + '</div>';
    } else if (withRegister) {
      act = '<div style="text-align:center"><button class="intake-act" onclick="intakeRegister(\'' + esc(m.id) + '\')">등록</button></div>';
    }
    const rowStyle = (isOnsite && m.status === 'noshow') ? 'text-decoration:underline;text-decoration-color:var(--rose);text-underline-offset:3px;' : '';
    return '<div class="roster-row" style="grid-template-columns:' + cols + ';' + rowStyle + '"><div class="no">' + (i + 1) + '</div><div>' + esc(m.zone) + '</div><div class="nm" style="cursor:pointer;color:var(--gold-soft)" onclick="openMemberById(\'' + esc(m.id) + '\', {fn:\'openIntakeGroup\', arg:\'' + esc(groupKey || '') + '\'})">' + esc(m.name) + '</div><div>' + esc(m.dept) + '</div><div>' + sessionPairsHtml(m) + '</div>' + act + '</div>';
  }).join('');
  const minW = isOnsite ? '426' : (withRegister ? '386' : '334');
  return '<div style="overflow-x:auto"><div class="roster-table" style="margin-bottom:0;min-width:' + minW + 'px">' + head + rows + '</div></div>';
}

function intakeRegister(id) {
  const m = (DB.members || []).find(function (x) { return x.id === id; });
  if (!m) return;
  const already = m.registered === true;
  if (already) {
    // 이미 등록됨 → 등록 취소(집계에서 다시 빼기)
    confirmModal('등록 취소', esc(m.name) + '의 정식 등록을 취소합니다. (집계에서 제외, 현장 접수 명단에는 그대로 유지)', function () {
      m.registered = false;
      logHistory('현장접수 등록취소', m.name + '(' + m.zone + '·' + m.dept + ')');
      saveDB(); render(); toast('등록을 취소했어요');
      setTimeout(function(){ openIntakeGroup('onsite', true); }, 120);
    }, '등록 취소');
  } else {
    confirmModal('정식 등록', esc(m.name) + '을(를) 정식 등록 인원에 포함합니다. (집계에 반영, 현장 접수 명단에는 그대로 유지)', function () {
      m.registered = true;
      if (m.status === 'noshow') m.status = '';  // 등록하면 불참 표시는 해제(왔으므로)
      logHistory('현장접수 등록', m.name + '(' + m.zone + '·' + m.dept + ')');
      saveDB(); render(); toast('등록됐어요 (집계 반영)');
      setTimeout(function(){ openIntakeGroup('onsite', true); }, 120);
    }, '등록');
  }
}
// 현장 접수자 불참 토글 — 불참이면 모든 명단에서 빠지고, 접수현황 현장접수 명단에만 남음
function intakeToggleNoShow(id) {
  const m = (DB.members || []).find(function (x) { return x.id === id; });
  if (!m) return;
  if (m.status === 'noshow') {
    m.status = '';
  } else {
    m.status = 'noshow';
    m.registered = false;  // 불참이면 등록도 자동 해제(집계에서 제외)
  }
  logHistory(m.status === 'noshow' ? '현장접수 불참' : '불참 해제', m.name + '(' + m.zone + '·' + m.dept + ')');
  saveDB();
  render();
  toast(m.status === 'noshow' ? '불참 처리했어요 (명단·집계에서 제외)' : '불참을 해제했어요');
  setTimeout(function(){ openIntakeGroup('onsite', true); }, 100);
}

function roomRef(code) { return fb.db.collection('rooms').doc(code); }
function subRef(code, sub) { return roomRef(code).collection(sub); }
function viewRef(code) { return fb.db.collection('viewcodes').doc(code); }

function genRoomCode() {
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 8; i++) s += A[Math.floor(Math.random() * A.length)];
  return s.slice(0, 4) + '-' + s.slice(4);
}

/* 안정적 직렬화 (키 정렬) — 변경 비교용 */
function stableStr(o) {
  if (o === null || typeof o !== 'object') return JSON.stringify(o);
  if (Array.isArray(o)) return '[' + o.map(stableStr).join(',') + ']';
  return '{' + Object.keys(o).sort().map(function (k) { return JSON.stringify(k) + ':' + stableStr(o[k]); }).join(',') + '}';
}

/* 행사 공통(공유) 데이터 — 방 문서에 저장할 형태. updatedAt은 비교 대상에서 제외 */
function roomMetaOf(ev) {
  // history를 meta에 포함시켜 클라우드로 함께 동기화 (모든 기기가 같은 변경 이력을 보게 함)
  return { meta: ev.meta || {}, settings: ev.settings || {}, fees: ev.fees || {}, history: ev.history || [] };
}

function snapOf(ev) {
  const m = {}, e = {}, f = {}, p = {};
  (ev.members || []).forEach(function (x) { if (x && x.id != null) m[String(x.id)] = stableStr(x); });
  (ev.evangelism || []).forEach(function (x) { if (x && x.id != null) e[String(x.id)] = stableStr(x); });
  (ev.feeSupport || []).forEach(function (x) { if (x && x.id != null) f[String(x.id)] = stableStr(x); });
  (ev.prayList || []).forEach(function (x) { if (x && x.id != null) p[String(x.id)] = stableStr(x); });
  return { meta: stableStr(roomMetaOf(ev)), members: m, evangelism: e, feeSupport: f, prayList: p };
}

/* ---------- 침례자 통합 집계 (전도대상자 + 일반 등록 인원) ---------- */
// 침례 여부는 전도대상자 표의 체크(e.baptism)와 인원 편집의 '이번 수양회 침례'(m.baptism)가
// 양방향 동기화된다. 여기서는 두 목록을 합쳐 한 사람으로 집계한다(연결된 경우 중복 제거).
// 불참·환불자는 제외 — 침례는 수양회 현장에서 받으므로 참석 기준으로 본다.
function baptismList() {
  const evByMid = {};
  (DB.evangelism || []).forEach(e => { if (e.memberId) evByMid[e.memberId] = e; });
  const out = []; const seen = new Set();
  boardableMembers().forEach(m => {
    const e = evByMid[m.id];
    if (m.baptism || (e && e.baptism)) {
      out.push({ zone: m.zone, name: m.name, dept: m.dept, ev: !!e, mid: m.id });
      seen.add(m.id);
    }
  });
  evangelismVisible().forEach(e => {
    if (!e.baptism) return;
    if (e.memberId && seen.has(e.memberId)) return;
    out.push({ zone: e.zone, name: e.name, dept: e.dept, ev: true, mid: e.memberId || '' });
  });
  out.sort((a, b) => (a.zone || '').localeCompare(b.zone || '', 'ko') || (a.name || '').localeCompare(b.name || '', 'ko'));
  return out;
}

/* ---------- 자동 백업 (동기화 덮어쓰기 대비) ---------- */
const AUTO_BACKUP_KEY = 'retreat-autobackup-v1';
function loadAutoBackups() {
  try { const raw = localStorage.getItem(AUTO_BACKUP_KEY); const arr = raw ? JSON.parse(raw) : []; return Array.isArray(arr) ? arr : []; }
  catch (e) { return []; }
}
function saveAutoBackup(reason) {
  try {
    if (!DB) return;
    const hasData = (DB.members || []).length || (DB.evangelism || []).length || (DB.feeSupport || []).length;
    if (!hasData) return; // 빈 행사는 백업하지 않음
    const data = JSON.parse(JSON.stringify(DB));
    const dataStr = JSON.stringify(data);
    let list = loadAutoBackups();
    const last = list.length ? list[list.length - 1] : null;
    if (last && last.eventId === DB.id && JSON.stringify(last.data) === dataStr) return; // 내용이 같으면 생략
    list.push({ ts: Date.now(), eventId: DB.id, title: (DB.meta && DB.meta.title) || '행사', reason: reason || '', data: data });
    while (list.length > 5) list.shift();
    let out = JSON.stringify(list);
    while (out.length > 1500000 && list.length > 1) { list.shift(); out = JSON.stringify(list); }
    localStorage.setItem(AUTO_BACKUP_KEY, out);
  } catch (e) { console.warn('자동 백업 저장 실패', e); }
}

function syncAttachActive() {
  syncDetach();
  if (!fb.ready || !DB || !DB.roomCode) { setSyncStatus('off'); return; }
  saveAutoBackup('동기화 연결 직전');
  const code = DB.roomCode;
  sync.code = code;
  sync.mirror = snapOf(DB);
  // 재연결 시: 첫 스냅샷에서 서버 데이터로 완전히 덮어쓰기 위한 플래그
  sync.firstSnap = { meta: true, members: true, evangelism: true, feeSupport: true, prayList: true };
  setSyncStatus('connecting');
  sync.unsub.push(roomRef(code).onSnapshot(function (d) { onRoomMeta(d); }, function (err) { onSyncErr(err); }));
  ['members', 'evangelism', 'feeSupport', 'prayList'].forEach(function (sub) {
    sync.unsub.push(subRef(code, sub).onSnapshot(function (qs) { onSubSnap(sub, qs); }, function (err) { onSyncErr(err); }));
  });
}

function onSyncErr(err) {
  console.error('sync listener error', err);
  setSyncStatus('error');
}

/* ---------- 받기: 원격 → 로컬 ---------- */
function onRoomMeta(doc) {
  if (!doc.exists) return;
  if (!DB || DB.roomCode !== sync.code) return;
  const data = doc.data() || {};
  sync.applyingRemote = true;
  // ── 숙소 설정 보호 v2 ──
  // 정의(이름·정원)와 미등록 인원의 저장 시각(rev)을 '따로' 비교한다. 각 그룹은 더 최신인
  // 쪽을 지키고, 더 최신 원격을 받아들일 때도 정원 보존 병합(mergeLodgingDefs)을 거쳐
  // '정원 없는 옛 목록'이 최신 도장을 달고 와도 내 정원이 0으로 뭉개지지 않게 한다.
  const __ls = DB.settings || {};
  const __rs = data.settings || {};
  const __locDefRev = __ls.lodgingsRev || 0;
  const __remDefRev = __rs.lodgingsRev || 0;
  const __locExRev = __ls.lodgingExtrasRev || __ls.lodgingsRev || 0;   // 구버전(합산 rev) 호환
  const __remExRev = __rs.lodgingExtrasRev || __rs.lodgingsRev || 0;
  const __keepDefs = __locDefRev > __remDefRev;
  const __keepExtras = __locExRev > __remExRev;
  const __locDefs = (__ls.lodgings || []).slice();
  const __locExtras = JSON.parse(JSON.stringify(__ls.lodgingExtras || {}));
  const firstMeta = sync.firstSnap && sync.firstSnap.meta;
  if (firstMeta) {
    // 재연결 첫 스냅샷: 서버 값으로 완전히 교체 (roomCode는 보존)
    sync.firstSnap.meta = false;
    const keepRoom = DB.roomCode;
    if (data.meta) DB.meta = Object.assign({}, data.meta);
    if (data.settings) DB.settings = Object.assign({}, data.settings);
    if (data.fees) DB.fees = Object.assign({}, data.fees);
    if (Array.isArray(data.history)) DB.history = mergeHistories(DB.history, data.history);  // 서버 이력과 병합(내 최근 기록 보존)
    DB.roomCode = keepRoom;
  } else {
    if (data.meta) DB.meta = Object.assign({}, DB.meta, data.meta);
    if (data.settings) DB.settings = Object.assign({}, DB.settings, data.settings);
    if (data.fees) DB.fees = Object.assign({}, DB.fees, data.fees);
    if (Array.isArray(data.history)) DB.history = mergeHistories(DB.history, data.history);  // 기기 간 이력 병합 — 옛 기기가 덮어써도 안 지워짐
  }
  hydrateEvent(DB);
  if (sync.mirror) sync.mirror.meta = stableStr(roomMetaOf(DB));
  // 숙소 설정 보호 적용 (양 분기 공통)
  if (!DB.settings) DB.settings = {};
  if (__keepDefs || !Array.isArray(DB.settings.lodgings)) {
    DB.settings.lodgings = __locDefs; DB.settings.lodgingsRev = __locDefRev;
  } else {
    DB.settings.lodgings = mergeLodgingDefs(__locDefs, DB.settings.lodgings);  // 정원 보존 병합
  }
  if (__keepExtras || !DB.settings.lodgingExtras) {
    DB.settings.lodgingExtras = __locExtras; DB.settings.lodgingExtrasRev = __locExRev;
  } else {
    DB.settings.lodgingExtras = mergeLodgingExtras(__locExtras, DB.settings.lodgingExtras);
  }
  sync.applyingRemote = false;
  saveVault();
  if (__keepDefs || __keepExtras) { try { syncPushIfLinked(); } catch (e) {} }  // 서버의 옛 숙소 설정을 최신으로 되밈
  setSyncStatus(navigator.onLine ? 'live' : 'offline');
  safeRender();
}

function onSubSnap(sub, qs) {
  if (!DB || DB.roomCode !== sync.code) return;
  if (!DB[sub]) DB[sub] = [];
  if (!sync.mirror) sync.mirror = snapOf(DB);

  // 재연결 후 첫 스냅샷: 서버의 전체 목록으로 로컬을 완전히 덮어쓰기 (로컬 전용 항목 폐기)
  if (sync.firstSnap && sync.firstSnap[sub]) {
    sync.firstSnap[sub] = false;
    const serverList = [];
    if (!sync.mirror[sub]) sync.mirror[sub] = {};
    else Object.keys(sync.mirror[sub]).forEach(function(k){ delete sync.mirror[sub][k]; });
    qs.docs.forEach(function (doc) {
      const data = doc.data() || {};
      data.id = data.id || doc.id;
      serverList.push(data);
      sync.mirror[sub][doc.id] = stableStr(data);
    });
    DB[sub] = serverList;  // 완전 교체
    sync.applyingRemote = true;
    saveVault();
    sync.applyingRemote = false;
    setSyncStatus(navigator.onLine ? 'live' : 'offline');
    safeRender();
    return;
  }

  const byId = {};
  DB[sub].forEach(function (x) { byId[String(x.id)] = x; });
  let changed = false;
  qs.docChanges().forEach(function (ch) {
    const id = ch.doc.id;
    const data = ch.doc.data() || {};
    data.id = data.id || id;
    if (ch.type === 'removed') {
      if (byId[id]) {
        DB[sub] = DB[sub].filter(function (x) { return String(x.id) !== String(id); });
        delete byId[id];
        if (sync.mirror[sub]) delete sync.mirror[sub][id];
        changed = true;
      }
    } else {
      const existing = byId[id];
      if (existing) {
        Object.keys(existing).forEach(function (k) { delete existing[k]; });
        Object.assign(existing, data);
      } else {
        DB[sub].push(data);
        byId[id] = data;
      }
      if (!sync.mirror[sub]) sync.mirror[sub] = {};
      sync.mirror[sub][id] = stableStr(data);
      changed = true;
    }
  });
  setSyncStatus(navigator.onLine ? 'live' : 'offline');
  if (changed) {
    sync.applyingRemote = true;
    saveVault();
    sync.applyingRemote = false;
    safeRender();
  }
}

/* ---------- 보내기: 로컬 → 원격 (변경분만) ---------- */
function syncPushIfLinked() {
  if (!fb.ready || !DB || !DB.roomCode) return;
  if (DB.viewOnly) return;
  if (sync.applyingRemote) return;
  if (sync.code !== DB.roomCode) return;
  clearTimeout(sync.pushTimer);
  const code = DB.roomCode;
  sync.pushTimer = setTimeout(function () { pushDiff(code, DB); }, 400);
}

async function pushDiff(code, ev) {
  if (!fb.ready) return;
  if (ev && ev.viewOnly) return;
  if (!sync.mirror) sync.mirror = { meta: '', members: {}, evangelism: {}, feeSupport: {} };
  const writes = [];
  const metaStr = stableStr(roomMetaOf(ev));
  if (metaStr !== sync.mirror.meta) {
    const md = roomMetaOf(ev); md.updatedAt = Date.now();
    writes.push({ ref: roomRef(code), data: md, merge: true });
    sync.mirror.meta = metaStr;
  }
  ['members', 'evangelism', 'feeSupport', 'prayList'].forEach(function (sub) {
    const cur = {};
    (ev[sub] || []).forEach(function (x) { if (x && x.id != null) cur[String(x.id)] = x; });
    const mir = sync.mirror[sub] || (sync.mirror[sub] = {});
    Object.keys(cur).forEach(function (id) {
      const s = stableStr(cur[id]);
      if (mir[id] !== s) { writes.push({ ref: subRef(code, sub).doc(id), data: cur[id] }); mir[id] = s; }
    });
    Object.keys(mir).forEach(function (id) {
      if (!(id in cur)) { writes.push({ ref: subRef(code, sub).doc(id), del: true }); delete mir[id]; }
    });
  });
  if (!writes.length) return;
  setSyncStatus('syncing');
  try {
    for (let i = 0; i < writes.length; i += 400) {
      const batch = fb.db.batch();
      writes.slice(i, i + 400).forEach(function (w) {
        if (w.del) batch.delete(w.ref);
        else if (w.merge) batch.set(w.ref, w.data, { merge: true });
        else batch.set(w.ref, w.data);
      });
      await batch.commit();
    }
    setSyncStatus(navigator.onLine ? 'live' : 'offline');
  } catch (e) {
    console.error('pushDiff commit 실패', e);
    setSyncStatus('error');
  }
}

async function pushFullEvent(code, ev) {
  if (ev && ev.viewOnly) return;
  const md = roomMetaOf(ev); md.updatedAt = Date.now();
  await roomRef(code).set(md, { merge: true });
  await pushRecords(code, 'members', ev.members || []);
  await pushRecords(code, 'evangelism', ev.evangelism || []);
  await pushRecords(code, 'feeSupport', ev.feeSupport || []);
  await pushRecords(code, 'prayList', ev.prayList || []);
}

async function pushRecords(code, sub, arr) {
  let batch = fb.db.batch(), n = 0;
  for (let i = 0; i < arr.length; i++) {
    const r = arr[i];
    if (!r || r.id == null) continue;
    batch.set(subRef(code, sub).doc(String(r.id)), r);
    if (++n >= 400) { await batch.commit(); batch = fb.db.batch(); n = 0; }
  }
  if (n > 0) await batch.commit();
}

/* ---------- 사용자 동작 ---------- */
async function syncStart() {
  if (!ensureReady()) return;
  if (DB.roomCode) { syncShowCode(); return; }
  setSyncStatus('connecting');
  toast('동기화 방을 만드는 중…');
  try {
    const code = genRoomCode();
    await pushFullEvent(code, DB);
    DB.roomCode = code;
    DB.isHost = true;
    try {
      const vcode = genRoomCode();
      await viewRef(vcode).set({ room: code, createdAt: Date.now() });
      DB.viewCode = vcode;
    } catch (e) { console.warn('보기 전용 코드 생성 실패 (코드 화면에서 다시 만들 수 있어요)', e); }
    saveVault();
    syncAttachActive();
    render();
    syncShowCode();
    toast('실시간 동기화가 시작됐어요');
  } catch (e) {
    console.error(e); setSyncStatus('error');
    toast('동기화 시작 실패: 네트워크나 보안 규칙을 확인해 주세요', true);

}

async function syncJoin() {
  if (!ensureReady()) return;
  let code = (prompt('참여할 행사 코드를 입력하세요 (예: K3M9-QX72):') || '').trim().toUpperCase();
  if (!code) return;
  const existing = (VAULT.events || []).find(function (e) { return e.roomCode === code || e.viewCode === code; });
  if (existing) { switchEvent(existing.id); toast('이미 참여 중인 행사예요. 전환했어요.'); return; }
  toast('행사에 연결하는 중…');
  try {
    let snap = await roomRef(code).get();
    let viewOnly = false, viewCodeUsed = '';
    if (!snap.exists) {
      // 편집 코드가 아니면 보기 전용 코드인지 확인
      const vs = await viewRef(code).get();
      const vroom = vs.exists ? String((vs.data() || {}).room || '') : '';
      if (vroom) {
        viewOnly = true; viewCodeUsed = code; code = vroom;
        snap = await roomRef(code).get();
      }
    }
    if (!snap.exists) { toast('그 코드의 행사를 찾을 수 없어요. 코드를 확인해 주세요.', true); return; }
    const d = snap.data() || {};
    const title = (d.meta && d.meta.title) || '공유 행사';
    const ev = freshEvent(title);
    ev.roomCode = code;
    ev.viewOnly = viewOnly;
    ev.isHost = false;
    if (viewCodeUsed) ev.viewCode = viewCodeUsed;
    if (d.settings) ev.settings = Object.assign(ev.settings, d.settings);
    if (d.fees) ev.fees = Object.assign(ev.fees, d.fees);
    if (d.meta) ev.meta = Object.assign(ev.meta, d.meta);
    ev.members = []; ev.evangelism = []; ev.feeSupport = []; ev.prayList = [];
    VAULT.events.push(ev);
    VAULT.activeId = ev.id;
    DB = ev;
    hydrateEvent(DB);
    saveVault();
    syncAttachActive();
    render();
    toast(viewOnly ? '보기 전용으로 연결됐어요. 명단을 받아오는 중…' : '연결됐어요. 명단을 받아오는 중…');
  } catch (e) {
    console.error(e); setSyncStatus('error');
    toast('연결 실패: 코드/네트워크/보안 규칙을 확인해 주세요', true);
  }
}

    '<div class="notice">편집 코드를 알려주면 함께 입력·수정할 수 있고, 보기 코드를 알려주면 열람만 할 수 있어요.</div>' +
    '<div class="field"><label>편집 코드 (입력·수정 가능)</label>' +
    '<input id="syncCodeInput" value="' + esc(code) + '" readonly style="font-family:monospace;font-size:22px;letter-spacing:2px;text-align:center"/></div>' +
    '<button class="btn btn-primary btn-block" id="syncCopyBtn">편집 코드 복사</button>' +
    viewBlock + hostBlock;
  openSheet('행사 공유 코드', html, null, { hideSave: true });
  setTimeout(function () {
    const btn = $('#syncCopyBtn');
    if (btn) btn.onclick = async function () {
      try { await navigator.clipboard.writeText(code); toast('편집 코드가 복사됐어요'); }
      catch (e) { const i = $('#syncCodeInput'); i.select(); document.execCommand('copy'); toast('편집 코드가 복사됐어요'); }
    };
    const vb = $('#syncCopyViewBtn');
    if (vb) vb.onclick = async function () {
      try { await navigator.clipboard.writeText(vcode); toast('보기 코드가 복사됐어요'); }
      catch (e) { const i = $('#syncViewInput'); i.select(); document.execCommand('copy'); toast('보기 코드가 복사됐어요'); }
    };

    if (mb) mb.onclick = async function () {
      if (!ensureReady()) return;
      mb.disabled = true; mb.textContent = '만드는 중…';
      try {
        const nv = genRoomCode();
        await viewRef(nv).set({ room: DB.roomCode, createdAt: Date.now() });
        DB.viewCode = nv; saveVault();
        closeSheet(true); syncShowCode(); toast('보기 전용 코드를 만들었어요');
      } catch (e) {
        console.error(e); mb.disabled = false; mb.textContent = '보기 전용 코드 만들기';
        toast('보기 코드 생성 실패: 네트워크/보안 규칙을 확인해 주세요', true);

}

function syncStop() {
  if (!DB.roomCode) { toast('동기화 중이 아니에요'); return; }
  confirmModal('동기화 중단', '이 기기에서 이 행사의 실시간 동기화를 끊습니다. 클라우드의 데이터와 이 기기의 현재 데이터는 모두 그대로 유지됩니다. 계속할까요?', function () {
    syncDetach();
    delete DB.roomCode;
    saveVault();
    setSyncStatus('off');
    updateSyncChip();
    render();
    toast('동기화를 중단했어요');
  }, '중단');
}

/* ---------- 상태 표시 ---------- */
function syncStatusLabel() {
  switch (sync.status) {
    case 'live': return [isViewOnly() ? '👁 보기 전용 (실시간)' : '● 연결됨 (실시간)', 'var(--green)'];
    case 'syncing': return ['↻ 동기화 중…', 'var(--gold)'];
    case 'offline': return ['● 오프라인 (연결되면 자동 반영)', 'var(--ink-mute)'];
    case 'connecting': return ['↻ 연결 중…', 'var(--gold)'];
    case 'error': return ['● 동기화 오류 (설정/네트워크 확인)', 'var(--rose)'];
    default: return ['○ 동기화 꺼짐', 'var(--ink-mute)'];
  }
}

function updateSyncChip() {
  let chip = document.getElementById('syncChip');
  if (!chip) return;
  if (!DB || !DB.roomCode) { chip.style.display = 'none'; chip.textContent = ''; return; }
  const lc = syncStatusLabel();
  chip.style.display = '';
  // 짧은 상태 라벨 (교회명 아래 줄에 표시)
  let label;
  switch (sync.status) {
    case 'live': label = '● 실시간 연결됨'; break;
    case 'syncing': label = '↻ 동기화 중'; break;
    case 'offline': label = '● 오프라인'; break;
    case 'connecting': label = '↻ 연결 중'; break;
    case 'error': label = '● 동기화 오류'; break;
    default: label = '○ 동기화 꺼짐'; break;
  }
  chip.textContent = label;
  chip.style.color = lc[1];
  chip.onclick = function () { setTab('more'); };
}

function refreshSyncUI() {
  updateSyncChip();
  const t = document.getElementById('syncStatusText');
  if (t) { const lc = syncStatusLabel(); t.textContent = lc[0]; t.style.color = lc[1]; }
  const codeEl = document.getElementById('syncCardCode');
  if (codeEl) codeEl.textContent = (DB && DB.roomCode) ? (DB.viewOnly ? (DB.viewCode || '—') : DB.roomCode) : '—';
}

function setSyncStatus(st) {
  sync.status = st;
  refreshSyncUI();
}

/* ---------- 렌더 보호 (편집 중 화면 재생성 방지) ---------- */
function isSheetOpen() { const s = document.getElementById('sheet'); return !!(s && s.classList.contains('show')); }
function isEditingFocused() { const a = document.activeElement; return !!(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)); }
function safeRender() {
  if (isSheetOpen() || isEditingFocused()) { sync.renderPending = true; return; }
  render();
}

function shareDataFile() {
  const dataStr = JSON.stringify(DB);
  const blob = new Blob([dataStr], {type: 'application/json'});
  // 파일명: "Retreat App_수양회데이터_YYYY-MM-DD.json"
  const fname = `Retreat App_수양회데이터_${new Date().toISOString().slice(0,10)}.json`;
  const file = new File([blob], fname, {type: 'application/json'});

  if (navigator.share && navigator.canShare && navigator.canShare({files: [file]})) {
    navigator.share({ files: [file], title: '수양회 데이터 백업', text: '수양회 등록 데이터 백업 파일입니다.' })
    .catch(e => { console.log(e); downloadFile(file); });
  } else { downloadFile(file); }
}

    DB.settings.zones = ZONES;
