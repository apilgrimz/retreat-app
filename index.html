    </div>
    <div class="member-list" id="memberList">${buildMemberListHTML()}</div>
    ${isViewOnly() ? '' : `<button class="fab" id="btnAddMember" aria-label="인원 추가"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>`}
  `;
}

function memberItemHTML(m, no) {
  const chips = [];
  if (m.session) chips.push(`<span class="chip">${esc(m.session)}</span>`);
  if (m.transUp) chips.push(`<span class="chip gold">↑${esc(m.transUp)}</span>`);
  if (m.transDown) chips.push(`<span class="chip indigo">↓${esc(m.transDown)}</span>`);
  for (const [k, v] of Object.entries(m.extraUp || {})) if(v) chips.push(`<span class="chip green">${k}</span>`);
  for (const [k, v] of Object.entries(m.extraDown || {})) if(v) chips.push(`<span class="chip green">${k}</span>`);
  
  return `
    <div class="member-item" data-id="${esc(m.id)}">
      <div class="no">${no}</div>
      <div class="info">
        <div class="name">${esc(m.name||'이름 미입력')}<span style="color:var(--ink-mute);font-weight:500;font-size:12px;margin-left:8px">${esc(m.dept||'')}</span></div>
        <div class="meta">${chips.join('')}</div>
      </div>
    </div>
  `;
}

// 부서가 미취학/영유아면 인도자 라벨을 '보호자'로 전환
function isGuardianDept(dept) {
  const d = (dept || '');
  return d.indexOf('미취학') >= 0 || d.indexOf('영유아') >= 0 || d.indexOf('유아') >= 0;
}
function updateLeaderLabel(dept) {
  const lb = document.getElementById('mLeaderLabel');
  if (lb) lb.textContent = isGuardianDept(dept) ? '보호자' : '인도자';
}

// 인원 추가 화면의 개인차 "+ 차주 추가" 버튼 바인딩 (설정 잠금과 무관 — 참여자도 가능)
// 현재 열린 인원 폼의 모든 개인차 select(.up-veh/.down-veh 중 개인차 종류인 것)를 새 목록으로 갱신
// selectName이 주어지면 그 차주를 선택 상태로 둠
function refreshAllPrivateSelects(selectName) {
  const opts = ['', ...vehiclesByKind('private')];
  document.querySelectorAll('#mSessionList .sess-block').forEach(block => {
    ['up','down'].forEach(dir => {
      const sel = block.querySelector('.' + dir + '-veh');
      if (!sel) return;
      // 이 select가 개인차 종류일 때만 (해당 방향 kind 라디오가 private이고 체크됨)
      const nm = block.dataset.name;
      const kindChecked = block.querySelector('input[name="' + dir + 'kind-' + nm + '"][value="private"]:checked');
      if (!kindChecked) return;
      const cur = sel.value;
      const keep = (selectName !== undefined && sel === document.activeElement) ? selectName : cur;
      const finalVal = (selectName !== undefined && PRIVATE_CAR_LIST.includes(selectName) && cur === '') ? selectName : keep;
      sel.innerHTML = opts.map(o => `<option value="${esc(o)}" ${o===finalVal?'selected':''}>${esc(o||'─ 선택 ─')}</option>`).join('');
      // 삭제 등으로 현재 값이 사라졌으면 빈칸으로
      if (!PRIVATE_CAR_LIST.includes(sel.value) && sel.value !== '') sel.value = '';
    });
  });
}

function bindAddDriverBtns(scope) {
  (scope || document).querySelectorAll('.add-driver-btn').forEach(btn => {
    if (btn._bound) return; btn._bound = true;
    btn.onclick = function () {
      const dir = btn.dataset.dir;
      const block = btn.closest('.sess-block');
      promptModal('개인차 차주 추가', '차주(개인차 제공자)의 이름을 입력하세요.', '', function (name) {
        const nm = (name || '').trim();
        if (!nm) return;
        if (!Array.isArray(PRIVATE_CAR_LIST)) PRIVATE_CAR_LIST = [];
        if (PRIVATE_CAR_LIST.includes(nm)) { toast('이미 있는 차주예요. 목록에서 선택하세요.'); }
        else {
          PRIVATE_CAR_LIST.push(nm);
          DB.settings = DB.settings || {};
          DB.settings.privateCarList = PRIVATE_CAR_LIST.slice();
          if (typeof updateTransportOptions === 'function') updateTransportOptions();
          saveDB();
          toast('차주를 추가했어요: ' + nm);
        }
        // 누른 칸에 새 차주 선택 + 상·하행 모든 개인차 select 동시 갱신
        const sel = block ? block.querySelector('.' + dir + '-veh') : null;
        if (sel) sel.value = nm;
        refreshAllPrivateSelects();
        if (sel) sel.value = nm;
      });
    };
  });
  // 차주 삭제 버튼
  (scope || document).querySelectorAll('.del-driver-btn').forEach(btn => {
    if (btn._bound) return; btn._bound = true;
    btn.onclick = function () {
      if (!Array.isArray(PRIVATE_CAR_LIST) || !PRIVATE_CAR_LIST.length) { toast('등록된 차주가 없어요.'); return; }
      openDriverDeleteSheet();
    };
  });
}

// 차주 삭제 시트: 목록에서 골라 삭제 (사용 중이면 확인)
function openDriverDeleteSheet() {
  const rows = PRIVATE_CAR_LIST.map(function (nm) {
    const users = registeredMembers().filter(function (m) {
      return Object.values(m.sessionTrans || {}).some(function (st) { return st && (st.upVehicle === nm || st.downVehicle === nm); });
    });
    const cnt = users.length;
    return '<div style="display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border:1px solid var(--line-soft); border-radius:9px; margin-bottom:6px;">' +
      '<div><b>' + esc(nm) + '</b>' + (cnt ? ' <span style="font-size:11px; color:var(--rose);">· ' + cnt + '명 사용 중</span>' : ' <span style="font-size:11px; color:var(--ink-mute);">· 사용 안 함</span>') + '</div>' +
      '<button class="btn btn-danger" style="padding:5px 12px; font-size:12px;" data-del-driver="' + esc(nm) + '">삭제</button></div>';
  }).join('');
  openSheet('개인차 차주 삭제', '<div class="notice">삭제할 차주의 삭제 버튼을 누르세요. 사용 중인 차주를 지우면 해당 인원의 개인차 선택이 비워집니다.</div>' + rows, null, { hideSave: true });
  setTimeout(function () {
    document.querySelectorAll('#sheetBody [data-del-driver]').forEach(function (b) {
      b.onclick = function () {
        const nm = b.dataset.delDriver;
        const users = registeredMembers().filter(function (m) {
          return Object.values(m.sessionTrans || {}).some(function (st) { return st && (st.upVehicle === nm || st.downVehicle === nm); });
        });
        const doDelete = function () {
          PRIVATE_CAR_LIST = PRIVATE_CAR_LIST.filter(function (x) { return x !== nm; });
          DB.settings = DB.settings || {};
          DB.settings.privateCarList = PRIVATE_CAR_LIST.slice();
          // 사용 중이던 멤버의 해당 차편 비우기
          DB.members.forEach(function (m) {
            Object.keys(m.sessionTrans || {}).forEach(function (k) {
              const st = m.sessionTrans[k];
              if (st && st.upVehicle === nm) { st.upVehicle = ''; st.upKind = ''; }
              if (st && st.downVehicle === nm) { st.downVehicle = ''; st.downKind = ''; }
            });
            if (typeof recalcMemberRepTrans === 'function') recalcMemberRepTrans(m);
          });
          if (typeof updateTransportOptions === 'function') updateTransportOptions();
          saveDB();
          closeSheet(true);
          refreshAllPrivateSelects();  // 인원 폼의 select도 갱신
          toast('차주를 삭제했어요: ' + nm);
        };
        if (users.length) {
          confirmModal('차주 삭제', users.length + '명이 "' + nm + '" 차주를 쓰고 있어요. 삭제하면 그 인원의 개인차 선택이 비워집니다. 계속할까요?', doDelete, '삭제');
        } else {
          doDelete();
        }
      };
    });
  }, 50);
}

// 숙소만 간단히 편집 (홈 숙소 카드의 화면 성명 클릭용). 저장 후 홈 갱신.
function openLodgingQuickEdit(memberId) {

  const html = `
    <div style="font-size:13px;color:var(--ink-mute);margin-bottom:10px;">${esc(m.zone)} · ${esc(m.dept)} · <b style="color:var(--ink)">${esc(m.name)}</b></div>
    <div class="field"><label>숙소</label><input id="qLodging" value="${esc(m.lodging||'')}" placeholder="예: A동 101호" autofocus/></div>
    <div style="font-size:12px;color:var(--ink-mute);margin-top:4px;">숙소만 빠르게 바꿉니다. 다른 정보는 명단에서 성명을 눌러 수정하세요.</div>

// 전도대상자/회비지원/숙소 전체보기에서 성명 클릭 → 해당 인원의 편집창
function openMemberFromRef(memberId, name, zone, backFn) {
  let m = null;
  if (memberId) m = (DB.members || []).find(function(x){ return x.id === memberId; });
  if (!m) m = (DB.members || []).find(function(x){ return x.name === name && x.zone === zone && name; });
  if (!m) m = (DB.members || []).find(function(x){ return x.name === name && name; });
  if (!m) { toast('연결된 등록 인원을 찾지 못했어요. (명단에서 추가했는지 확인해 주세요)', true); return; }
  const afterSave = (backFn && typeof window[backFn] === 'function') ? function(){ window[backFn](); } : null;
  openMemberSheet(m, false, afterSave);
}

// id로 멤버를 찾아 인원 편집 시트 열기 (각 명단 표의 성명 클릭용)
// back: 편집창 저장/취소 후 다시 열 명단창 정보 {fn:'openZoneSheet', arg:'11구역'} 등
function openMemberById(id, back) {
  const m = (DB.members || []).find(function (x) { return x.id === id; });
  if (!m) return;
  let afterSave = null;
  if (back && back.fn && typeof window[back.fn] === 'function') {
    afterSave = function () { window[back.fn](back.arg); };
  }
  openMemberSheet(m, false, afterSave);
}

function openMemberSheet(m, isNew=false, afterSave=null) {
  if (guardViewOnly()) return;
  const existingEv = DB.evangelism.find(e => e.memberId === m.id || (e.name === m.name && e.name !== '' && e.zone === m.zone));
  const existingFs = DB.feeSupport.find(f => f.memberId === m.id || (f.name === m.name && f.name !== '' && f.zone === m.zone));
  
  // 합류/이탈 시점 라디오: 본대 + EXTRA_UPS 항목들
  // 현재 선택된 시점 파악 — extraUp에 값이 있으면 그 키, 아니면 '본대'
  const activeUpKey = (() => {
    const k = Object.keys(m.extraUp || {}).find(k => m.extraUp[k]);
    if (k) return k;
    // 신규: 미선택(직접 고르도록). 기존: 본대로 표시
    return isNew ? '' : (m.transUp ? '본대' : '');
  })();
  const activeDownKey = (() => {
    const k = Object.keys(m.extraDown || {}).find(k => m.extraDown[k]);
    if (k) return k;
    return isNew ? '' : (m.transDown ? '본대' : '');
  })();
  // 현재 시점의 차편 값
  const activeUpVehicle = activeUpKey === '본대' ? (m.transUp||'') : (m.extraUp[activeUpKey]||'');
  const activeDownVehicle = activeDownKey === '본대' ? (m.transDown||'') : (m.extraDown[activeDownKey]||'');

  // 본대 선택 시 호차 목록, 그 외 시점 선택 시 (교회차+개인차+타교회+대중교통) 목록
  function vehicleOptionsFor(timeKey) {
    if (timeKey === '본대') return ['', ...BUSES];
    return ['', ...CHURCH_CARS, ...OTHER_TRANSPORTS, ...PRIVATE_CAR_LIST];
  }
  function vehicleSelectHtml(timeKey, active) {
    return vehicleOptionsFor(timeKey).map(o =>
      `<option value="${esc(o)}" ${active===o?'selected':''}>${esc(o||'─')}</option>`
    ).join('');
  }

  // 라디오 옵션 만들기 — 본대 + 기타 시점
  const upTimeOptions = ['본대', ...EXTRA_UPS];
  const downTimeOptions = ['본대', ...EXTRA_DOWNS];
  function radioPills(name, options, active) {
    return options.map(opt => `
      <label class="time-pill ${opt===active?'active':''}">
        <input type="radio" name="${name}" value="${esc(opt)}" ${opt===active?'checked':''}/>
        <span>${esc(opt)}</span>
      </label>
    `).join('');
  }

  const html = `
    <div class="row-2">
      <div class="field"><label>구역</label><select id="mZone" onchange="onZoneChange(this.value)"><option value="" ${!m.zone&&!isOtherChurchZone(m.zone)?'selected':''}>선택</option>${ZONES.map(z => `<option value="${esc(z)}" ${(m.zone===z || (z===OTHER_CHURCH_ZONE && isOtherChurchZone(m.zone)))?'selected':''}>${esc(z)}</option>`).join('')}</select></div>
      <div class="field" id="mZoneEtcField" style="display:${isOtherChurchZone(m.zone)?'block':'none'}"><label>교회 이름</label><input id="mZoneEtc" value="${esc((isOtherChurchZone(m.zone) && m.zone!==OTHER_CHURCH_ZONE)?m.zone:'')}" placeholder="예: 서울00교회"/></div>
      <div class="field"><label>부서(회)</label><select id="mDept" onchange="updateLeaderLabel(this.value)"><option value="">선택</option>${DEPTS.map(d => `<option value="${esc(d)}" ${m.dept===d?'selected':''}>${esc(d)}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>성명</label><input id="mName" value="${esc(m.name)}" placeholder="홍길동" autocomplete="off"/></div>
    <div class="field">
      <label>접수 구분</label>
      <div class="time-pill-row" id="mRegTypeRow">
        ${[['pre1','사전 1단계'],['pre2','사전 2단계'],['onsite','현장 접수']].map(([v,lb]) => {
          const sel = (m.regType||'')===v;
          return `<label class="time-pill ${sel?'active':''}"><input type="radio" name="mRegType" value="${v}" ${sel?'checked':''}/><span>${lb}</span></label>`;
        }).join('')}
      </div>
      <div class="helper">현장 접수는 접수 현황에만 표시되며, 접수 현황에서 '등록'을 누르면 정식 등록됩니다.</div>
    </div>
    <div class="field">
      <label>차수 · 상행/하행 <span style="font-weight:400;color:var(--ink-mute);font-size:11px">(참여할 차수를 체크하세요. 복수 가능)</span></label>
      <div id="mSessionList">
        ${getSessionDefs().map(def => {
          const sname = def.name;
          const checked = memberSessions(m).includes(sname);
          const st = (m.sessionTrans && m.sessionTrans[sname]) || {};
          const dateLabel = (def.upDate||def.downDate) ? (fmtDateKo(def.upDate)+' ~ '+fmtDateKo(def.downDate)) : '날짜 미설정';
          const dates = sessionDateRange(def);
          const upKind = st.upKind || kindOfVehicle(st.upVehicle) || '';
          const downKind = st.downKind || kindOfVehicle(st.downVehicle) || '';
          // 버스(본대)는 본 교회 차수에서만 선택 가능. 다른 차수는 개인차·기타만.
          const isChurchSess = (sname === churchSessionName());
          const kindLabels = isChurchSess ? [['bus','버스'],['private','개인차'],['etc','기타']] : [['private','개인차'],['etc','기타']];
          // 날짜 라디오 묶음
          function dateRadios(dir, sel) {
            if (!dates.length) return '<div style="font-size:11px;color:var(--ink-mute);">차수 날짜 미설정</div>';
            return '<div style="display:flex; flex-wrap:wrap; gap:4px;">' + dates.map(d =>
              `<label class="mini-pill ${sel===d?'on':''}" style="font-size:11px; padding:3px 7px; border-radius:6px; border:1px solid var(--line-soft); cursor:pointer; ${sel===d?'background:rgba(212,175,90,.18); border-color:var(--gold-soft);':''}"><input type="radio" name="${dir}date-${esc(sname)}" value="${d}" ${sel===d?'checked':''} style="display:none;"/>${fmtDateKo(d)}</label>`
            ).join('') + '</div>';
          }
          // 차편종류 라디오
          function kindRadios(dir, sel) {
            return '<div style="display:flex; gap:4px; margin-top:5px;">' + kindLabels.map(([v,lb]) =>
              `<label class="mini-pill ${sel===v?'on':''}" style="font-size:11px; padding:3px 9px; border-radius:6px; border:1px solid var(--line-soft); cursor:pointer; ${sel===v?'background:rgba(108,140,210,.22); border-color:#6c8cd2;':''}"><input type="radio" name="${dir}kind-${esc(sname)}" value="${v}" ${sel===v?'checked':''} style="display:none;"/>${lb}</label>`
            ).join('') + '</div>';
          }
          // 구체 차편 select
          function vehSelect(dir, kind, cur) {
            const opts = ['', ...vehiclesByKind(kind)];
            const sel = `<select class="${dir}-veh" style="width:100%; margin-top:5px;">${opts.map(o=>`<option value="${esc(o)}" ${cur===o?'selected':''}>${esc(o||'─ 선택 ─')}</option>`).join('')}</select>`;
            const addBtn = (kind === 'private') ? `<div style="display:flex; gap:5px; margin-top:4px;"><button type="button" class="add-driver-btn" data-dir="${dir}" style="flex:1; padding:5px; font-size:11px; border:1px dashed var(--gold-soft); border-radius:6px; background:transparent; color:var(--gold-soft); cursor:pointer;">+ 차주 추가</button><button type="button" class="del-driver-btn" data-dir="${dir}" style="flex:1; padding:5px; font-size:11px; border:1px dashed var(--rose); border-radius:6px; background:transparent; color:var(--rose); cursor:pointer;">차주 삭제</button></div>` : '';
            return sel + addBtn;
          }
          return `
          <div class="sess-block" data-name="${esc(sname)}" style="border:1px solid var(--line-soft); border-radius:10px; margin-bottom:8px; overflow:hidden;">
            <label class="sess-head" style="display:flex; align-items:center; gap:8px; padding:10px; cursor:pointer; background:${checked?'rgba(212,175,90,.10)':'transparent'};">
              <input type="checkbox" class="sess-check" value="${esc(sname)}" ${checked?'checked':''}/>
              <span style="font-weight:700;">${esc(sname)}</span>
              <span style="font-size:12px; color:var(--ink-soft); margin-left:auto;">${dateLabel}</span>
            </label>
            <div class="sess-body" style="padding:${checked?'10px':'0'}; max-height:${checked?'600px':'0'}; overflow:hidden; transition:all .2s; border-top:${checked?'1px solid var(--line-soft)':'none'};">
              <div style="display:flex; gap:12px;">
                <div style="flex:1; min-width:0;">
                  <div style="font-size:12px; font-weight:700; color:var(--gold-soft); margin-bottom:5px;">상행 (참석)</div>
                  ${dateRadios('up', st.upDate||'')}
                  <div class="up-kindbox">${kindRadios('up', upKind)}</div>
                  <div class="up-vehbox">${upKind ? vehSelect('up', upKind, st.upVehicle||'') : ''}</div>
                </div>
                <div style="flex:1; min-width:0;">
                  <div style="font-size:12px; font-weight:700; color:var(--gold-soft); margin-bottom:5px;">하행 (귀가)</div>
                  ${dateRadios('down', st.downDate||'')}
                  <div class="down-kindbox">${kindRadios('down', downKind)}</div>
                  <div class="down-vehbox">${downKind ? vehSelect('down', downKind, st.downVehicle||'') : ''}</div>
                </div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="section-title">추가 관리 항목</div>
    <div class="row-2" style="background:var(--bg-2); padding:10px; border-radius:10px; margin-bottom:12px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;margin:0;"><input type="checkbox" id="mEvCheck" ${existingEv ? 'checked':''} /> 전도대상자 명단</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;margin:0;"><input type="checkbox" id="mFsCheck" ${existingFs ? 'checked':''} /> 회비지원 명단</label>
    </div>

    <div class="section-title">인도자 / 숙소 / 비고</div>
    <div class="row-2">
      <div class="field"><label id="mLeaderLabel">인도자</label><input id="mLeaderName" value="${esc(m.leaderName)}"/></div>
      <div class="field"><label>관계</label><input id="mLeaderRel" value="${esc(m.leaderRel)}"/></div>
    </div>
    <div class="field"><label>숙소</label><input id="mLodging" value="${esc(m.lodging||'')}" placeholder="예: A동 101호"/></div>
    <div class="field"><label>비고</label><textarea id="mNote" rows="2">${esc(m.note)}</textarea></div>
    ${!isNew ? `<button class="btn btn-danger btn-block" id="mDelete" style="margin-top:8px">삭제</button>` : ''}
  `;
  openSheet(isNew ? '인원 추가' : '인원 편집', html, () => {
    // 차수별 상하행 수집 (체크된 차수만)
    const sessionValues = [];
    const sessionTrans = {};
    document.querySelectorAll('#mSessionList .sess-block').forEach(block => {
      const nm = block.dataset.name;
      const checked = block.querySelector('.sess-check').checked;
      if (!checked) return;
      sessionValues.push(nm);
      const upDateEl = block.querySelector('input[name="update-'+nm+'"]:checked');
      const downDateEl = block.querySelector('input[name="downdate-'+nm+'"]:checked');
      const upKindEl = block.querySelector('input[name="upkind-'+nm+'"]:checked');
      const downKindEl = block.querySelector('input[name="downkind-'+nm+'"]:checked');
      const upVehEl = block.querySelector('.up-veh');
      const downVehEl = block.querySelector('.down-veh');
      sessionTrans[nm] = {
        upDate: upDateEl ? upDateEl.value : '',
        upKind: upKindEl ? upKindEl.value : '',
        upVehicle: upVehEl ? (upVehEl.value || '') : '',
        downDate: downDateEl ? downDateEl.value : '',
        downKind: downKindEl ? downKindEl.value : '',
        downVehicle: downVehEl ? (downVehEl.value || '') : '',
      };
    });
    const sessionStr = sessionValues.join(', ');

    const updated = {
      ...m, zone: resolveZoneValue(), dept: $('#mDept').value, name: $('#mName').value.trim(), session: sessionStr,
      transUp: '', transDown: '',
      extraUp: {}, extraDown: {}, sessionTrans: sessionTrans,
      leaderName: $('#mLeaderName').value.trim(), leaderRel: $('#mLeaderRel').value.trim(),
      lodging: $('#mLodging').value.trim(),
      salvation: m.salvation || false,
      baptism: m.baptism || false,
      note: $('#mNote').value.trim(),
      regType: (document.querySelector('input[name="mRegType"]:checked')||{}).value || '',
    };

    // 필수 입력 검증 — 차수는 필수, 상하행 시점·차편은 선택(본교회 차수 아닌 사람 허용)
    if (!updated.zone) { toast('구역을 선택해 주세요', true); return false; }
    if (!updated.dept) { toast('회(부서)를 선택해 주세요', true); return false; }
    if (!updated.name) { toast('성명을 입력해 주세요', true); return false; }
    if (!updated.regType) { toast('접수 구분을 선택해 주세요', true); return false; }
    if (!sessionStr) { toast('차수를 1개 이상 선택해 주세요', true); return false; }

    // 대표 상하행 재계산은 전역 recalcMemberRepTrans 사용 (updated의 sessionTrans 기준)
    function applyRepTrans() { recalcMemberRepTrans(updated); }

    // 중복 경고
    const dup = DB.members.find(x => x.id !== m.id
      && (x.zone||'').trim() === updated.zone.trim()
      && (x.name||'').trim() === updated.name.trim()
      && updated.name.trim() !== '');

    function commitSave() {
      applyRepTrans();
      if (isNew) DB.members.push(updated);
      else { const idx = DB.members.findIndex(x => x.id === m.id); if (idx >= 0) DB.members[idx] = updated; }
      finishSave();
    }

    if (dup) {
      confirmModal('중복 확인',
        updated.zone + '의 \'' + updated.name + '\' 님은 이미 등록되어 있습니다. 그래도 저장할까요?',
        function () { commitSave(); }, '저장');
      return false;
    }
    commitSave();
    return false;

    function finishSave() {
    if ($('#mEvCheck') && $('#mEvCheck').checked) {
      if (!existingEv) {
        DB.evangelism.push({...emptyEvangelism(), memberId: updated.id, name: updated.name, zone: updated.zone, dept: updated.dept, relation: updated.leaderRel, leader: updated.leaderName, lodging: updated.lodging, salvation: updated.salvation, baptism: updated.baptism, note: updated.note});
      } else { 
        existingEv.name = updated.name; existingEv.zone = updated.zone; existingEv.dept = updated.dept; 
        existingEv.relation = updated.leaderRel; existingEv.leader = updated.leaderName; existingEv.lodging = updated.lodging; 
        // 구원/침례는 전도대상자 명단 표에서 직접 체크하므로 인원 저장 시 덮어쓰지 않음
        existingEv.note = updated.note;
      }
    } else if (existingEv) { DB.evangelism = DB.evangelism.filter(e => e.id !== existingEv.id); }

    if ($('#mFsCheck') && $('#mFsCheck').checked) {
      if (!existingFs) DB.feeSupport.push({...emptyFeeSupport(), memberId: updated.id, name: updated.name, zone: updated.zone, dept: updated.dept, amount: DB.fees[updated.dept]||0, note: updated.note});
      else { existingFs.name = updated.name; existingFs.zone = updated.zone; existingFs.dept = updated.dept; existingFs.note = updated.note; }
    } else if (existingFs) { DB.feeSupport = DB.feeSupport.filter(f => f.id !== existingFs.id); }

    saveDB();
    if (rosterFilter.zone !== ALL_ZONES) rosterFilter.zone = updated.zone;
    render(); toast(isNew ? '추가됐어요' : '수정됐어요');
    // 편집창을 닫으면(스택에서 제거) 아래 명단창으로 복귀하며 자동 갱신된다.
    closeSheet();
    }
  });

  setTimeout(() => {
    updateLeaderLabel(($('#mDept')||{}).value);
    // 접수 구분: 라디오지만 "이미 선택된 걸 다시 누르면 해제" 토글
    document.querySelectorAll('#mRegTypeRow input[name="mRegType"]').forEach(r => { r._was = r.checked; });
    document.querySelectorAll('#mRegTypeRow input[name="mRegType"]').forEach(radio => {
      radio.onclick = () => {
        if (radio._was) radio.checked = false;  // 이미 선택돼 있던 것 → 해제
        document.querySelectorAll('#mRegTypeRow input[name="mRegType"]').forEach(r => {
          r.closest('.time-pill').classList.toggle('active', r.checked);
          r._was = r.checked;
        });
      };
    });

    function vehHtmlFor(kind, cur){
      const opts = ['', ...vehiclesByKind(kind)];
      return opts.map(o=>`<option value="${o.replace(/"/g,'&quot;')}" ${cur===o?'selected':''}>${(o||'─ 선택 ─').replace(/</g,'&lt;')}</option>`).join('');
    }
    document.querySelectorAll('#mSessionList .sess-block').forEach(block => {
      const nm = block.dataset.name;
      const chk = block.querySelector('.sess-check');
      const body = block.querySelector('.sess-body');
      const head = block.querySelector('.sess-head');
      chk.addEventListener('change', () => {
        if (chk.checked) {
          body.style.maxHeight = '600px'; body.style.padding = '10px'; body.style.borderTop = '1px solid var(--line-soft)';
          head.style.background = 'rgba(212,175,90,.10)';
        } else {
          body.style.maxHeight = '0'; body.style.padding = '0'; body.style.borderTop = 'none';
          head.style.background = 'transparent';
        }
      });
      // 날짜: 한 번 누르면 선택, 같은 것 다시 누르면 해제 (토글)
      function refreshDatePills(dir) {
        block.querySelectorAll(`input[name="${dir}date-${nm}"]`).forEach(r => {
          const pill = r.closest('.mini-pill');
          if (r.checked) { pill.style.background='rgba(212,175,90,.18)'; pill.style.borderColor='var(--gold-soft)'; }
          else { pill.style.background=''; pill.style.borderColor='var(--line-soft)'; }
        });
      }
      function refreshKindPills(dir) {
        block.querySelectorAll(`input[name="${dir}kind-${nm}"]`).forEach(r => {
          const pill = r.closest('.mini-pill');
          if (r.checked) { pill.style.background='rgba(108,140,210,.22)'; pill.style.borderColor='#6c8cd2'; }
          else { pill.style.background=''; pill.style.borderColor='var(--line-soft)'; }
        });
      }
      ['up','down'].forEach(dir => {
        block.querySelectorAll(`input[name="${dir}date-${nm}"]`).forEach(radio => {
          radio.dataset.wasChecked = radio.checked ? '1' : '';
          radio.addEventListener('click', () => {
            if (radio.dataset.wasChecked === '1') {
              // 이미 선택돼 있던 걸 다시 클릭 → 해제
              radio.checked = false;
              radio.dataset.wasChecked = '';
            } else {
              // 새로 선택 → 이 그룹에서 이것만 checked 표시 추적
              block.querySelectorAll(`input[name="${dir}date-${nm}"]`).forEach(r => { r.dataset.wasChecked = ''; });
              radio.dataset.wasChecked = '1';
            }
            refreshDatePills(dir);
          });
        });
        // 차편종류: 토글 + 구체 차편 select 갱신 (해제 시 select 비움)
        block.querySelectorAll(`input[name="${dir}kind-${nm}"]`).forEach(radio => {
          radio.dataset.wasChecked = radio.checked ? '1' : '';
          radio.addEventListener('click', () => {
            const vehBox = block.querySelector(`.${dir}-vehbox`);
            const prevSel = vehBox.querySelector('select');
            const prev = prevSel ? prevSel.value : '';
            if (radio.dataset.wasChecked === '1') {
              radio.checked = false;
              radio.dataset.wasChecked = '';
              vehBox.innerHTML = '';  // 차편 종류 해제 → 구체 차편도 비움
            } else {
              block.querySelectorAll(`input[name="${dir}kind-${nm}"]`).forEach(r => { r.dataset.wasChecked = ''; });
              radio.dataset.wasChecked = '1';
              const addBtn2 = (radio.value === 'private') ? `<div style="display:flex; gap:5px; margin-top:4px;"><button type="button" class="add-driver-btn" data-dir="${dir}" style="flex:1; padding:5px; font-size:11px; border:1px dashed var(--gold-soft); border-radius:6px; background:transparent; color:var(--gold-soft); cursor:pointer;">+ 차주 추가</button><button type="button" class="del-driver-btn" data-dir="${dir}" style="flex:1; padding:5px; font-size:11px; border:1px dashed var(--rose); border-radius:6px; background:transparent; color:var(--rose); cursor:pointer;">차주 삭제</button></div>` : '';
              vehBox.innerHTML = `<select class="${dir}-veh" style="width:100%; margin-top:5px;">${vehHtmlFor(radio.value, prev)}</select>` + addBtn2;
              bindAddDriverBtns(block);
            }
            refreshKindPills(dir);
          });
        });
        bindAddDriverBtns(block);
      });
    });
  }, 30);

  if (!isNew) {
    setTimeout(() => { $('#mDelete').onclick = () => { confirmModal('삭제', `${m.name}을(를) 삭제합니다.`, () => { 
      DB.members = DB.members.filter(x => x.id !== m.id); 
      DB.evangelism = DB.evangelism.filter(x => x.memberId !== m.id && !(!x.memberId && x.name === m.name && x.zone === m.zone));
      DB.feeSupport = DB.feeSupport.filter(x => x.memberId !== m.id && !(!x.memberId && x.name === m.name && x.zone === m.zone));
      saveDB(); closeSheet(); render(); toast('삭제됐어요'); 
    }); }; }, 50);
  }
}

function driverList(driver, direction) {
  return registeredMembers().filter(m => {
    if (direction === 'up') {
      if (m.extraUp && Object.values(m.extraUp).includes(driver)) return true;
    } else {
      if (m.extraDown && Object.values(m.extraDown).includes(driver)) return true;
    }
    return false;
  });
}

// 개인차 명단 정렬: 차주 본인(이름이 차주명과 동일)을 1번으로, 나머지는 구역순
function sortDriverList(list, driver) {
  return sortMembersDriverFirst(list, driver);
}

function allPrivateDrivers() {
  const set = new Set(PRIVATE_CAR_LIST);
  const known = new Set([...BUSES, ...CHURCH_CARS, ...OTHER_TRANSPORTS, ...PRIVATE_CARS, '']);
  registeredMembers().forEach(m => {
    if (m.extraUp) Object.values(m.extraUp).forEach(v => { if (v && !known.has(v)) set.add(v); });
    if (m.extraDown) Object.values(m.extraDown).forEach(v => { if (v && !known.has(v)) set.add(v); });
  });
  return Array.from(set).filter(s => s).sort((a,b)=>a.localeCompare(b,'ko'));
}

function renderTransport() {
  const TYPES = [...BUSES, ...CHURCH_CARS, '개인차', ...OTHER_TRANSPORTS];
  let type = transportTab.type;
  if (!TYPES.includes(type)) { transportTab.type = TYPES[0]; type = TYPES[0]; }

  let html = `
    <div class="transport-tabs" id="ttTabs" style="margin-top:10px;">
      ${TYPES.map(t => `<button class="tt-pill ${t===type?'active':''}" data-t="${esc(t)}">${esc(t)}</button>`).join('')}
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">${esc(type)} 탑승 명단</div><div style="display:flex;gap:6px;"><button class="card-action" onclick="openTransportFull()">전체보기</button><button class="card-action" onclick="execPrintTransport()">인쇄</button></div></div>
  `;

  if (BUSES.includes(type)) {
    // 본대 버스: 본 교회 차수에 버스로 가는 사람만 (대표 상하행 = applyRepTrans가 본교회차수만 채움)
    const uList = registeredMembers().filter(m => m.transUp === type).sort(memberSortCmp);
    const dList = registeredMembers().filter(m => m.transDown === type).sort(memberSortCmp);
    html += transInfoEditor(type, null);
    const churchN = churchSessionName();
    if (churchN) html += `<div style="font-size:12px; color:var(--ink-mute); margin-bottom:6px;">본 교회 차수(${esc(churchN)}) 탑승자</div>`;
    html += buildSplitTable(null, uList, dList, false, null, type);
  } else if (type === '개인차') {
    const drv2 = privateDriversWithGroups();
    if (drv2.length === 0) {
      html += `<div class="empty-state">개인차로 가는 사람이 없습니다.<br/><span style="font-size:12px">더보기 → 기초 데이터 설정 → '개인차 목록'에서 차주를 등록하고, 인원 추가에서 개인차를 선택하세요.</span></div>`;
    } else {
      // 차주별 → 차수별 블록 (차수 순서대로)
      drv2.forEach(({driver, groups}) => {
        groups.forEach(g => {
          const label = `🚗 ${esc(driver)} · ${esc(g.session)}`;
          html += `<div style="font-weight:700; margin:10px 0 6px; color:var(--gold-soft);">${label}</div>`;
          html += transInfoEditor('', driver);
          html += buildSplitTable(null, g.uList, g.dList, false, driver, '개인차', g);
        });
      });
    }
  } else {
    // 교회차 / 타교회 / 대중교통: 차수별 블록 (헤더에 그 차수 날짜 표시)
    const groups = transSessionGroups(type, null);
    if (groups.length === 0) {
      html += `<div class="empty-state">해당 차편 등록자가 없습니다.</div>`;
    } else {
      groups.forEach(g => {
        html += `<div style="font-weight:700; margin:10px 0 6px; color:var(--gold-soft);">${esc(type)} · ${esc(g.session)}</div>`;
        html += transInfoEditor(type, null);
        html += buildSplitTable(null, g.uList, g.dList, false, null, type, g);
      });
    }
  }

  html += `</div>`;
  return html;
}

    if (ch) { DB.meta.upTime = fmtDateKo(ch.upDate); DB.meta.downTime = fmtDateKo(ch.downDate); }
    // 현재 편집 중인 행사를 활성 행사로 보장
    if (VAULT && DB && DB.id) VAULT.activeId = DB.id;
    saveDB(); render(); toast('행사 정보가 저장됐어요');
  });

  // 날짜 선택 버튼 → 달력 모달
  setTimeout(() => {
    $$('#sessionDateList .sess-date-row').forEach(row => {
      const btn = row.querySelector('.sd-pick');
      const pv = row.querySelector('.sd-preview');
      btn.onclick = () => {
        openDateRangePicker({
          year: getEventYear(),
          startDate: row.dataset.up || '',
          endDate: row.dataset.down || '',
          title: row.dataset.name + ' 기간 선택',
          onSave: (start, end) => {
            row.dataset.up = start || '';
            row.dataset.down = end || '';
            pv.innerHTML = (start || end) ? (fmtDateKo(start) + ' ~ ' + fmtDateKo(end)) : '<span style="color:var(--ink-mute)">기간 미설정</span>';
          }
        });
      };
    });
  }, 60);
}

/* ---------- 입력 점검 ---------- */
function openInputCheckSheet() {
  const defs = getSessionDefs();
  const church = churchSessionName();
  const regs = registeredMembers();
  const defOf = {}; defs.forEach(d => { defOf[d.name] = d; });

  // 1) 차수 날짜 미설정 (설정 차원 경고)
  const noDateDefs = defs.filter(d => !d.upDate || !d.downDate).map(d => d.name);

  // 2) 본 교회 차수 참여인데 차편(상/하행) 미선택
  const noTrans = [];
  if (church) regs.forEach(m => {
    if (!memberSessions(m).includes(church)) return;
    const st = (m.sessionTrans && m.sessionTrans[church]) || {};
    const miss = [];
    if (!st.upVehicle) miss.push('상행');
    if (!st.downVehicle) miss.push('하행');
    if (miss.length) noTrans.push({ m: m, what: miss.join('·') + ' 차편 없음' });
  });

  // 3) 차수는 체크했는데 날짜 미선택 (차수 날짜가 설정된 차수만 검사)
  const noDate = [];
  regs.forEach(m => {
    memberSessions(m).forEach(sn => {
      const def = defOf[sn];
      if (!def) return;
      const st = (m.sessionTrans && m.sessionTrans[sn]) || {};
      const miss = [];
      if (def.upDate && !st.upDate) miss.push('상행');
      if (def.downDate && !st.downDate) miss.push('하행');
      if (miss.length) noDate.push({ m: m, what: sn + ' ' + miss.join('·') + ' 날짜 없음' });
    });
  });

  // 미입력 목록 정렬: 구역 → 회(부서) → 가나다 (다른 명단과 동일 기준)
  // (접수 구분은 인원 추가 시 필수 입력이라 점검 대상에서 제외)
  const byMember = (a, b) => memberSortCmp(a.m, b.m);
  noTrans.sort(byMember);
  noDate.sort(byMember);

  function nameBtn(it) {
    return '<button class="chk-name" data-mid="' + esc(it.m.id) + '" style="display:flex; justify-content:space-between; align-items:center; width:100%; text-align:left; padding:9px 12px; border:1px solid var(--line-soft); border-radius:9px; background:var(--bg-1); color:var(--ink); margin-bottom:6px;">' +
      '<span style="font-weight:700;">' + esc(it.m.zone) + ' · ' + esc(it.m.name) + '</span>' +
      '<span style="font-size:12px; color:var(--rose);">' + esc(it.what) + '</span></button>';
  }
  function section(title, items, emptyMsg) {
    const head = '<div style="font-weight:800; color:var(--gold-soft); margin:14px 0 7px;">' + title + ' <span style="color:' + (items.length ? 'var(--rose)' : 'var(--green)') + '">' + items.length + '명</span></div>';
    if (!items.length) return head + '<div style="font-size:12px; color:var(--ink-mute); margin-bottom:4px;">' + emptyMsg + '</div>';
    return head + items.map(nameBtn).join('');
  }

  let html = '<div class="notice">행사 전에 빠진 입력을 확인하세요. 이름을 누르면 바로 수정 화면이 열립니다.</div>';
  if (noDateDefs.length) {
    html += '<div style="padding:9px 12px; border:1px solid var(--rose); border-radius:9px; color:var(--rose); font-size:13px; margin-bottom:4px;">⚠ 날짜가 설정되지 않은 차수: <b>' + esc(noDateDefs.join(', ')) + '</b><br/><span style="font-size:12px;">더보기 → 행사 정보 수정에서 차수 날짜를 먼저 설정해 주세요.</span></div>';
  }
  if (church) html += section('본 교회 차수(' + esc(church) + ') 차편 미선택', noTrans, '모두 차편이 선택되어 있어요.');
  else html += '<div style="font-size:12px; color:var(--ink-mute); margin:10px 0;">본 교회 차수가 설정되지 않아 차편 점검을 건너뛰었어요.</div>';
  html += section('차수 날짜 미선택', noDate, '모두 날짜가 선택되어 있어요.');
  const total = noTrans.length + noDate.length;
  if (!total && !noDateDefs.length) html += '<div style="text-align:center; padding:14px; color:var(--green); font-weight:800;">✓ 점검 완료 — 빠진 입력이 없습니다.</div>';

  openSheet('입력 점검', html, null, { hideSave: true });
  setTimeout(function () {
    document.querySelectorAll('#sheetBody .chk-name').forEach(function (b) {
      b.onclick = function () {
        const mm = DB.members.find(function (x) { return x.id === b.dataset.mid; });
        if (!mm) return;
        closeSheet(true);
        // 인원 수정 후 저장하면 입력 점검 화면으로 다시 돌아와 이어서 처리
        setTimeout(function () { openMemberSheet(mm, false, function () { openInputCheckSheet(); }); }, 120);
      };
    });
  }, 50);
}

/* ---------- 자동 백업 복원 ---------- */
function openAutoBackupSheet() {
  const list = loadAutoBackups();
  if (!list.length) {
    openSheet('자동 백업 복원', '<div class="empty-state">아직 자동 백업이 없습니다.<br/><span style="font-size:12px">실시간 동기화에 연결될 때마다, 연결 직전의 데이터가 자동으로 저장됩니다.</span></div>', null, { hideSave: true });
    return;
  }
  const rows = list.slice().reverse().map(function (b, ri) {
    const idx = list.length - 1 - ri;
    const dt = new Date(b.ts);
    const when = dt.getFullYear() + '.' + (dt.getMonth() + 1) + '.' + dt.getDate() + ' ' + String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0');
    const d = b.data || {};
    const cnt = '명단 ' + ((d.members || []).length) + ' · 전도 ' + ((d.evangelism || []).length) + ' · 회비 ' + ((d.feeSupport || []).length);
    return '<div style="border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px; margin-bottom:8px;">' +
      '<div style="font-weight:700;">' + esc((d.meta && d.meta.title) || b.title || '행사') + '</div>' +
      '<div style="font-size:12px; color:var(--ink-mute); margin:2px 0 8px;">' + esc(when) + (b.reason ? ' · ' + esc(b.reason) : '') + ' · ' + cnt + '</div>' +
      '<button class="btn btn-secondary" style="width:100%; padding:9px;" onclick="restoreAutoBackup(' + idx + ')">새 행사로 복원</button></div>';
  }).join('');
  openSheet('자동 백업 복원',
    '<div class="notice">실시간 동기화에 연결되기 직전의 데이터가 자동 저장됩니다. 복원하면 기존 행사는 그대로 두고 <b>새 행사로 추가</b>됩니다.</div>' + rows,
    null, { hideSave: true });
}

function restoreAutoBackup(idx) {
  const list = loadAutoBackups();
  const b = list[idx];
  if (!b || !b.data) { toast('백업을 찾을 수 없어요', true); return; }
  const ev = JSON.parse(JSON.stringify(b.data));
  ev.id = 'ev' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  delete ev.roomCode; delete ev.viewCode; ev.viewOnly = false; ev.isHost = true;
  ev.meta = ev.meta || {};
  ev.meta.title = ((ev.meta.title || b.title || '행사') + ' (백업 복원)');
  VAULT.events.push(ev);
  saveVault();
  closeSheet(true);
  switchEvent(ev.id);
  toast('백업을 새 행사로 복원했어요');
}

function openFeeRateSheet() {
  if (guardSettings()) return;
  // 각 행: 회(부서) 이름(편집 가능) + 단가(편집 가능) + 삭제
  function rowHTML(name, fee) {
    return `<div class="field deptfee-row" style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
      <input type="text" class="df-name" value="${esc(name)}" placeholder="회(부서)명" style="flex:1.4; min-width:0;"/>
      <input type="number" class="df-fee" value="${fee||0}" placeholder="단가" style="flex:1; min-width:0;"/>
      <button type="button" class="df-del" title="삭제" style="flex-shrink:0; width:34px; height:34px; border:none; border-radius:8px; background:rgba(255,90,90,.15); color:#ff7a7a; font-size:18px; cursor:pointer;">×</button>
    </div>`;
  }
  const rows = DEPTS.map(d => rowHTML(d, DB.fees[d])).join('');
  const html = `
    <div class="notice">회(부서)와 회비 단가를 수정·추가할 수 있습니다.</div>
    <div id="dfList">${rows}</div>
    <button type="button" id="dfAdd" class="btn btn-secondary" style="width:100%; margin-top:6px;">＋ 회(부서) 추가</button>
  `;
  openSheet('회(부서)별 회비 단가 설정', html, () => {
    // 저장: 행들을 순서대로 읽어 새 DEPTS / fees 구성
    const rowsEl = $$('#dfList .deptfee-row');
    const newDepts = [];
    const newFees = {};
    const renameMap = {};  // 옛이름 → 새이름 (멤버 dept 갱신용)
    const oldNames = DEPTS.slice();
    rowsEl.forEach((row, i) => {
      const nm = row.querySelector('.df-name').value.trim();
      const fee = parseInt(row.querySelector('.df-fee').value, 10) || 0;
      if (!nm) return;  // 빈 이름은 건너뜀(삭제 효과)
      if (newDepts.includes(nm)) return;  // 중복 이름 방지
      newDepts.push(nm);
      newFees[nm] = fee;
      // 같은 위치의 옛 이름이 다르면 rename으로 간주
      const oldNm = oldNames[i];
      if (oldNm && oldNm !== nm) renameMap[oldNm] = nm;
    });
    if (newDepts.length === 0) { toast('회(부서)를 최소 1개 입력해 주세요', true); return; }
    // 멤버/전도/회비/기도의 dept를 rename 반영
    const applyRename = (obj) => { if (obj && obj.dept && renameMap[obj.dept]) obj.dept = renameMap[obj.dept]; };
    DB.members.forEach(applyRename);
    DB.evangelism.forEach(applyRename);
    DB.feeSupport.forEach(applyRename);
    DB.prayList.forEach(applyRename);
    // 전역 + 저장
    DEPTS = newDepts;
    DB.fees = newFees;
    DB.settings = DB.settings || {};
    DB.settings.deptList = newDepts.slice();
    saveDB(); render(); toast('회(부서) 설정이 저장됐어요');
  });

  // 추가 버튼 / 삭제 버튼 바인딩
  setTimeout(() => {
    const addBtn = document.getElementById('dfAdd');
    const list = document.getElementById('dfList');
    function bindDel(scope) {
      (scope || list).querySelectorAll('.df-del').forEach(b => {
        b.onclick = () => { b.closest('.deptfee-row').remove(); };
      });
    }
    bindDel();
    if (addBtn) addBtn.onclick = () => {
      const div = document.createElement('div');
      div.innerHTML = `<div class="field deptfee-row" style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
        <input type="text" class="df-name" value="" placeholder="회(부서)명" style="flex:1.4; min-width:0;"/>
        <input type="number" class="df-fee" value="0" placeholder="단가" style="flex:1; min-width:0;"/>
        <button type="button" class="df-del" style="flex-shrink:0; width:34px; height:34px; border:none; border-radius:8px; background:rgba(255,90,90,.15); color:#ff7a7a; font-size:18px; cursor:pointer;">×</button>
      </div>`;
      const row = div.firstElementChild;
      list.appendChild(row);
      bindDel(row.parentElement);
      row.querySelector('.df-name').focus();
    };
  }, 60);
}

   - 보내기: saveVault() 시 변경분만 비교해서 push (diff-push, 400ms 디바운스)
   - 받기  : onSnapshot 리스너가 docChanges()로 추가/수정/삭제를 로컬에 병합 */

function fbInit() {

  try {

function roomRef(code) { return fb.db.collection('rooms').doc(code); }
function subRef(code, sub) { return roomRef(code).collection(sub); }
function viewRef(code) { return fb.db.collection('viewcodes').doc(code); }

function genRoomCode() {
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 8; i++) s += A[Math.floor(Math.random() * A.length)];
  return s.slice(0, 4) + '-' + s.slice(4);
}

/* 안정적 직렬화 (키 정렬) — 변경 비교용 */
function stableStr(o) {
  if (o === null || typeof o !== 'object') return JSON.stringify(o);
  if (Array.isArray(o)) return '[' + o.map(stableStr).join(',') + ']';
  return '{' + Object.keys(o).sort().map(function (k) { return JSON.stringify(k) + ':' + stableStr(o[k]); }).join(',') + '}';
}

/* 행사 공통(공유) 데이터 — 방 문서에 저장할 형태. updatedAt은 비교 대상에서 제외 */
function roomMetaOf(ev) {
  return { meta: ev.meta || {}, settings: ev.settings || {}, fees: ev.fees || {} };
}

function snapOf(ev) {
  const m = {}, e = {}, f = {}, p = {};
  (ev.members || []).forEach(function (x) { if (x && x.id != null) m[String(x.id)] = stableStr(x); });
  (ev.evangelism || []).forEach(function (x) { if (x && x.id != null) e[String(x.id)] = stableStr(x); });
  (ev.feeSupport || []).forEach(function (x) { if (x && x.id != null) f[String(x.id)] = stableStr(x); });
  (ev.prayList || []).forEach(function (x) { if (x && x.id != null) p[String(x.id)] = stableStr(x); });
  return { meta: stableStr(roomMetaOf(ev)), members: m, evangelism: e, feeSupport: f, prayList: p };
}

function syncDetach() {
  sync.unsub.forEach(function (u) { try { u(); } catch (e) {} });
  sync.unsub = []; sync.code = null; sync.mirror = null;
}

function isViewOnly() { return !!(DB && DB.viewOnly); }
// 전도대상자 명단 표에서 구원/침례 바로 토글
function setEvangelismCheck(evId, field, checked) {
  if (isViewOnly()) {
    toast('보기 전용으로 참여 중이라 수정할 수 없어요.', true);
    const e0 = DB.evangelism.find(x => x.id === evId);
    document.querySelectorAll('.ev-check[data-id="' + evId + '"][data-field="' + field + '"]').forEach(cb => { cb.checked = e0 ? !!e0[field] : false; });
    return;
  }
  const e = DB.evangelism.find(x => x.id === evId);
  if (!e) return;
  e[field] = !!checked;
  // 같은 인원이 member에도 있으면 동기화 (엑셀/명단 일관성)
  if (e.memberId) {
    const m = DB.members.find(x => x.id === e.memberId);
    if (m) m[field] = !!checked;
  }
  saveDB();
  // 양쪽 표의 같은 체크박스 동기화
  document.querySelectorAll('.ev-check[data-id="' + evId + '"][data-field="' + field + '"]').forEach(cb => { cb.checked = !!checked; });
}
function guardViewOnly() {
  if (isViewOnly()) { toast('보기 전용으로 참여 중이라 수정할 수 없어요.', true); return true; }
  return false;
}
// 설정(행사정보·기초데이터·회비단가) 수정 권한:
// 동기화 안 함(코드 없음)→허용, 방장(코드 발행 기기)→허용, 코드로 참여→잠금
function canEditSettings() {
  if (!DB) return false;
  if (isViewOnly()) return false;
  if (!DB.roomCode) return true;
  return !!DB.isHost;
}
function guardSettings() {
  if (isViewOnly()) { toast('보기 전용으로 참여 중이라 수정할 수 없어요.', true); return true; }
  if (!canEditSettings()) { toast('행사 설정은 코드를 발행한 기기에서만 바꿀 수 있어요. (개인차 차주는 인원 추가에서 추가할 수 있어요)', true); return true; }
  return false;
}

/* ---------- 자동 백업 (동기화 덮어쓰기 대비) ---------- */
const AUTO_BACKUP_KEY = 'retreat-autobackup-v1';
function loadAutoBackups() {
  try { const raw = localStorage.getItem(AUTO_BACKUP_KEY); const arr = raw ? JSON.parse(raw) : []; return Array.isArray(arr) ? arr : []; }
  catch (e) { return []; }
}
function saveAutoBackup(reason) {
  try {
    if (!DB) return;
    const hasData = (DB.members || []).length || (DB.evangelism || []).length || (DB.feeSupport || []).length;
    if (!hasData) return; // 빈 행사는 백업하지 않음
    const data = JSON.parse(JSON.stringify(DB));
    const dataStr = JSON.stringify(data);
    let list = loadAutoBackups();
    const last = list.length ? list[list.length - 1] : null;
    if (last && last.eventId === DB.id && JSON.stringify(last.data) === dataStr) return; // 내용이 같으면 생략
    list.push({ ts: Date.now(), eventId: DB.id, title: (DB.meta && DB.meta.title) || '행사', reason: reason || '', data: data });
    while (list.length > 5) list.shift();
    let out = JSON.stringify(list);
    while (out.length > 1500000 && list.length > 1) { list.shift(); out = JSON.stringify(list); }
    localStorage.setItem(AUTO_BACKUP_KEY, out);
  } catch (e) { console.warn('자동 백업 저장 실패', e); }
}

function syncAttachActive() {
  syncDetach();
  if (!fb.ready || !DB || !DB.roomCode) { setSyncStatus('off'); return; }
  saveAutoBackup('동기화 연결 직전');
  const code = DB.roomCode;
  sync.code = code;
  sync.mirror = snapOf(DB);
  // 재연결 시: 첫 스냅샷에서 서버 데이터로 완전히 덮어쓰기 위한 플래그
  sync.firstSnap = { meta: true, members: true, evangelism: true, feeSupport: true, prayList: true };
  setSyncStatus('connecting');
  sync.unsub.push(roomRef(code).onSnapshot(function (d) { onRoomMeta(d); }, function (err) { onSyncErr(err); }));
  ['members', 'evangelism', 'feeSupport', 'prayList'].forEach(function (sub) {
    sync.unsub.push(subRef(code, sub).onSnapshot(function (qs) { onSubSnap(sub, qs); }, function (err) { onSyncErr(err); }));
  });
}

function onSyncErr(err) {
  console.error('sync listener error', err);
  setSyncStatus('error');
}

/* ---------- 받기: 원격 → 로컬 ---------- */
function onRoomMeta(doc) {
  if (!doc.exists) return;
  if (!DB || DB.roomCode !== sync.code) return;
  const data = doc.data() || {};
  sync.applyingRemote = true;
  const firstMeta = sync.firstSnap && sync.firstSnap.meta;
  if (firstMeta) {
    // 재연결 첫 스냅샷: 서버 값으로 완전히 교체 (roomCode는 보존)
    sync.firstSnap.meta = false;
    const keepRoom = DB.roomCode;
    if (data.meta) DB.meta = Object.assign({}, data.meta);
    if (data.settings) DB.settings = Object.assign({}, data.settings);
    if (data.fees) DB.fees = Object.assign({}, data.fees);
    DB.roomCode = keepRoom;
  } else {
    if (data.meta) DB.meta = Object.assign({}, DB.meta, data.meta);
    if (data.settings) DB.settings = Object.assign({}, DB.settings, data.settings);
    if (data.fees) DB.fees = Object.assign({}, DB.fees, data.fees);
  }
  hydrateEvent(DB);
  if (sync.mirror) sync.mirror.meta = stableStr(roomMetaOf(DB));
  sync.applyingRemote = false;
  saveVault();
  setSyncStatus(navigator.onLine ? 'live' : 'offline');
  safeRender();
}

function onSubSnap(sub, qs) {
  if (!DB || DB.roomCode !== sync.code) return;
  if (!DB[sub]) DB[sub] = [];
  if (!sync.mirror) sync.mirror = snapOf(DB);

  // 재연결 후 첫 스냅샷: 서버의 전체 목록으로 로컬을 완전히 덮어쓰기 (로컬 전용 항목 폐기)
  if (sync.firstSnap && sync.firstSnap[sub]) {
    sync.firstSnap[sub] = false;
    const serverList = [];
    if (!sync.mirror[sub]) sync.mirror[sub] = {};
    else Object.keys(sync.mirror[sub]).forEach(function(k){ delete sync.mirror[sub][k]; });
    qs.docs.forEach(function (doc) {
      const data = doc.data() || {};
      data.id = data.id || doc.id;
      serverList.push(data);
      sync.mirror[sub][doc.id] = stableStr(data);
    });
    DB[sub] = serverList;  // 완전 교체
    sync.applyingRemote = true;
    saveVault();
    sync.applyingRemote = false;
    setSyncStatus(navigator.onLine ? 'live' : 'offline');
    safeRender();
    return;
  }

  const byId = {};
  DB[sub].forEach(function (x) { byId[String(x.id)] = x; });
  let changed = false;
  qs.docChanges().forEach(function (ch) {
    const id = ch.doc.id;
    const data = ch.doc.data() || {};
    data.id = data.id || id;
    if (ch.type === 'removed') {
      if (byId[id]) {
        DB[sub] = DB[sub].filter(function (x) { return String(x.id) !== String(id); });
        delete byId[id];
        if (sync.mirror[sub]) delete sync.mirror[sub][id];
        changed = true;
      }
    } else {
      const existing = byId[id];
      if (existing) {
        Object.keys(existing).forEach(function (k) { delete existing[k]; });
        Object.assign(existing, data);
      } else {
        DB[sub].push(data);
        byId[id] = data;
      }
      if (!sync.mirror[sub]) sync.mirror[sub] = {};
      sync.mirror[sub][id] = stableStr(data);
      changed = true;
    }
  });
  setSyncStatus(navigator.onLine ? 'live' : 'offline');
  if (changed) {
    sync.applyingRemote = true;
    saveVault();
    sync.applyingRemote = false;
    safeRender();
  }
}

/* ---------- 보내기: 로컬 → 원격 (변경분만) ---------- */
function syncPushIfLinked() {
  if (!fb.ready || !DB || !DB.roomCode) return;
  if (DB.viewOnly) return;
  if (sync.applyingRemote) return;
  if (sync.code !== DB.roomCode) return;
  clearTimeout(sync.pushTimer);
  const code = DB.roomCode;
  sync.pushTimer = setTimeout(function () { pushDiff(code, DB); }, 400);
}

async function pushDiff(code, ev) {
  if (!fb.ready) return;
  if (ev && ev.viewOnly) return;
  if (!sync.mirror) sync.mirror = { meta: '', members: {}, evangelism: {}, feeSupport: {} };
  const writes = [];
  const metaStr = stableStr(roomMetaOf(ev));
  if (metaStr !== sync.mirror.meta) {
    const md = roomMetaOf(ev); md.updatedAt = Date.now();
    writes.push({ ref: roomRef(code), data: md, merge: true });
    sync.mirror.meta = metaStr;
  }
  ['members', 'evangelism', 'feeSupport', 'prayList'].forEach(function (sub) {
    const cur = {};
    (ev[sub] || []).forEach(function (x) { if (x && x.id != null) cur[String(x.id)] = x; });
    const mir = sync.mirror[sub] || (sync.mirror[sub] = {});
    Object.keys(cur).forEach(function (id) {
      const s = stableStr(cur[id]);
      if (mir[id] !== s) { writes.push({ ref: subRef(code, sub).doc(id), data: cur[id] }); mir[id] = s; }
    });
    Object.keys(mir).forEach(function (id) {
      if (!(id in cur)) { writes.push({ ref: subRef(code, sub).doc(id), del: true }); delete mir[id]; }
    });
  });
  if (!writes.length) return;
  setSyncStatus('syncing');
  try {
    for (let i = 0; i < writes.length; i += 400) {
      const batch = fb.db.batch();
      writes.slice(i, i + 400).forEach(function (w) {
        if (w.del) batch.delete(w.ref);
        else if (w.merge) batch.set(w.ref, w.data, { merge: true });
        else batch.set(w.ref, w.data);
      });
      await batch.commit();
    }
    setSyncStatus(navigator.onLine ? 'live' : 'offline');
  } catch (e) {
    console.error('pushDiff commit 실패', e);
    setSyncStatus('error');
  }
}

async function pushFullEvent(code, ev) {
  if (ev && ev.viewOnly) return;
  const md = roomMetaOf(ev); md.updatedAt = Date.now();
  await roomRef(code).set(md, { merge: true });
  await pushRecords(code, 'members', ev.members || []);
  await pushRecords(code, 'evangelism', ev.evangelism || []);
  await pushRecords(code, 'feeSupport', ev.feeSupport || []);
  await pushRecords(code, 'prayList', ev.prayList || []);
}

async function pushRecords(code, sub, arr) {
  let batch = fb.db.batch(), n = 0;
  for (let i = 0; i < arr.length; i++) {
    const r = arr[i];
    if (!r || r.id == null) continue;
    batch.set(subRef(code, sub).doc(String(r.id)), r);
    if (++n >= 400) { await batch.commit(); batch = fb.db.batch(); n = 0; }
  }
  if (n > 0) await batch.commit();
}

/* ---------- 사용자 동작 ---------- */
async function syncStart() {
  if (!ensureReady()) return;
  if (DB.roomCode) { syncShowCode(); return; }
  setSyncStatus('connecting');
  toast('동기화 방을 만드는 중…');
  try {
    const code = genRoomCode();
    await pushFullEvent(code, DB);
    DB.roomCode = code;
    DB.isHost = true;
    try {
      const vcode = genRoomCode();
      await viewRef(vcode).set({ room: code, createdAt: Date.now() });
      DB.viewCode = vcode;
    } catch (e) { console.warn('보기 전용 코드 생성 실패 (코드 화면에서 다시 만들 수 있어요)', e); }
    saveVault();
    syncAttachActive();
    render();
    syncShowCode();
    toast('실시간 동기화가 시작됐어요');
  } catch (e) {
    console.error(e); setSyncStatus('error');
    toast('동기화 시작 실패: 네트워크나 보안 규칙을 확인해 주세요', true);
  }
}

async function syncJoin() {
  if (!ensureReady()) return;
  let code = (prompt('참여할 행사 코드를 입력하세요 (예: K3M9-QX72):') || '').trim().toUpperCase();
  if (!code) return;
  const existing = (VAULT.events || []).find(function (e) { return e.roomCode === code || e.viewCode === code; });
  if (existing) { switchEvent(existing.id); toast('이미 참여 중인 행사예요. 전환했어요.'); return; }
  toast('행사에 연결하는 중…');
  try {
    let snap = await roomRef(code).get();
    let viewOnly = false, viewCodeUsed = '';
    if (!snap.exists) {
      // 편집 코드가 아니면 보기 전용 코드인지 확인
      const vs = await viewRef(code).get();
      const vroom = vs.exists ? String((vs.data() || {}).room || '') : '';
      if (vroom) {
        viewOnly = true; viewCodeUsed = code; code = vroom;
        snap = await roomRef(code).get();
      }
    }
    if (!snap.exists) { toast('그 코드의 행사를 찾을 수 없어요. 코드를 확인해 주세요.', true); return; }
    const d = snap.data() || {};
    const title = (d.meta && d.meta.title) || '공유 행사';
    const ev = freshEvent(title);
    ev.roomCode = code;
    ev.viewOnly = viewOnly;
    ev.isHost = false;
    if (viewCodeUsed) ev.viewCode = viewCodeUsed;
    if (d.settings) ev.settings = Object.assign(ev.settings, d.settings);
    if (d.fees) ev.fees = Object.assign(ev.fees, d.fees);
    if (d.meta) ev.meta = Object.assign(ev.meta, d.meta);
    ev.members = []; ev.evangelism = []; ev.feeSupport = []; ev.prayList = [];
    VAULT.events.push(ev);
    VAULT.activeId = ev.id;
    DB = ev;
    hydrateEvent(DB);
    saveVault();
    syncAttachActive();
    render();
    toast(viewOnly ? '보기 전용으로 연결됐어요. 명단을 받아오는 중…' : '연결됐어요. 명단을 받아오는 중…');
  } catch (e) {
    console.error(e); setSyncStatus('error');
    toast('연결 실패: 코드/네트워크/보안 규칙을 확인해 주세요', true);
  }
}

    '<div class="field"><label>편집 코드 (입력·수정 가능)</label>' +

      catch (e) { const i = $('#syncViewInput'); i.select(); document.execCommand('copy'); toast('보기 코드가 복사됐어요'); }

function syncStop() {
  if (!DB.roomCode) { toast('동기화 중이 아니에요'); return; }
  confirmModal('동기화 중단', '이 기기에서 이 행사의 실시간 동기화를 끊습니다. 클라우드의 데이터와 이 기기의 현재 데이터는 모두 그대로 유지됩니다. 계속할까요?', function () {
    syncDetach();
    delete DB.roomCode;
    saveVault();
    setSyncStatus('off');
    updateSyncChip();
    render();
    toast('동기화를 중단했어요');
  }, '중단');
}

/* ---------- 상태 표시 ---------- */
function syncStatusLabel() {
  switch (sync.status) {
    case 'live': return [isViewOnly() ? '👁 보기 전용 (실시간)' : '● 연결됨 (실시간)', 'var(--green)'];
    case 'syncing': return ['↻ 동기화 중…', 'var(--gold)'];
    case 'offline': return ['● 오프라인 (연결되면 자동 반영)', 'var(--ink-mute)'];
    case 'connecting': return ['↻ 연결 중…', 'var(--gold)'];
    case 'error': return ['● 동기화 오류 (설정/네트워크 확인)', 'var(--rose)'];
    default: return ['○ 동기화 꺼짐', 'var(--ink-mute)'];
  }
}

function updateSyncChip() {
  let chip = document.getElementById('syncChip');
  if (!chip) return;
  if (!DB || !DB.roomCode) { chip.style.display = 'none'; chip.textContent = ''; return; }
  const lc = syncStatusLabel();
  chip.style.display = '';
  // 짧은 상태 라벨 (교회명 아래 줄에 표시)
  let label;
  switch (sync.status) {
    case 'live': label = '● 실시간 연결됨'; break;
    case 'syncing': label = '↻ 동기화 중'; break;
    case 'offline': label = '● 오프라인'; break;
    case 'connecting': label = '↻ 연결 중'; break;
    case 'error': label = '● 동기화 오류'; break;
    default: label = '○ 동기화 꺼짐'; break;
  }
  chip.textContent = label;
  chip.style.color = lc[1];
  chip.onclick = function () { setTab('more'); };
}

function refreshSyncUI() {
  updateSyncChip();
  const t = document.getElementById('syncStatusText');
  if (t) { const lc = syncStatusLabel(); t.textContent = lc[0]; t.style.color = lc[1]; }
  const codeEl = document.getElementById('syncCardCode');
  if (codeEl) codeEl.textContent = (DB && DB.roomCode) ? (DB.viewOnly ? (DB.viewCode || '—') : DB.roomCode) : '—';
}

function setSyncStatus(st) {
  sync.status = st;
  refreshSyncUI();
}

function isSheetOpen() { const s = document.getElementById('sheet'); return !!(s && s.classList.contains('show')); }
function isEditingFocused() { const a = document.activeElement; return !!(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName)); }
function safeRender() {
  if (isSheetOpen() || isEditingFocused()) { sync.renderPending = true; return; }
  render();
}

function shareDataFile() {
  const dataStr = JSON.stringify(DB);
  const blob = new Blob([dataStr], {type: 'application/json'});
  // 파일명: "Retreat App_수양회데이터_YYYY-MM-DD.json"
  const fname = `Retreat App_수양회데이터_${new Date().toISOString().slice(0,10)}.json`;
  const file = new File([blob], fname, {type: 'application/json'});

  if (navigator.share && navigator.canShare && navigator.canShare({files: [file]})) {
    navigator.share({ files: [file], title: '수양회 데이터 백업', text: '수양회 등록 데이터 백업 파일입니다.' })
    .catch(e => { console.log(e); downloadFile(file); });
  } else { downloadFile(file); }
}

function openBaseSettingsSheet() {
  if (guardSettings()) return;
  const html = `
    <div class="notice">목록은 콤마(,)로 구분하여 입력해주세요.</div>
    <div class="field"><label>구역 목록</label><textarea id="sZones" rows="2">${ZONES.join(', ')}</textarea><div class="helper">구역 수에 제한은 없어요. 단, 엑셀 내보내기에는 앞에서부터 20개 구역까지만 포함됩니다. 이름은 자유롭게(예: 1구역, 가나구역, 타교회) 쓸 수 있어요.</div></div>
    <div class="field"><label>차수 목록</label><textarea id="sSessions" rows="2">${SESSIONS.join(', ')}</textarea></div>
    <div class="field"><label>본대 버스 목록</label><textarea id="sBuses" rows="2">${BUSES.join(', ')}</textarea><div class="helper">개수 제한은 없어요. 엑셀 내보내기에는 앞에서부터 10대까지 포함됩니다. 1호차, 2호차… 형식을 권장합니다.</div></div>
    <div class="field"><label>교회차 목록</label><textarea id="sChurch" rows="2">${CHURCH_CARS.join(', ')}</textarea><div class="helper">개수 제한은 없어요. 엑셀 내보내기에는 앞에서부터 5대까지 포함됩니다. 교회차1, 교회차2… 형식을 권장합니다.</div></div>
    <div class="field"><label>기타 차편 목록</label><textarea id="sOther" rows="2" placeholder="예: 타교회, 대중교통, 자전거">${OTHER_TRANSPORTS.join(', ')}</textarea><div class="helper">본대 외 차편의 옵션. 필요한 항목을 자유롭게 추가/수정하세요.</div></div>
  `;
  openSheet('기초 데이터 설정', html, () => {
    ZONES = $('#sZones').value.split(',').map(s=>s.trim()).filter(Boolean);
    SESSIONS = $('#sSessions').value.split(',').map(s=>s.trim()).filter(Boolean);
    BUSES = $('#sBuses').value.split(',').map(s=>s.trim()).filter(Boolean);
    CHURCH_CARS = $('#sChurch').value.split(',').map(s=>s.trim()).filter(Boolean);
    OTHER_TRANSPORTS = $('#sOther').value.split(',').map(s=>s.trim()).filter(Boolean);

    updateTransportOptions();
    // 차수 목록 변경을 sessionDefs에 동기화 (기존 날짜는 보존, 새 차수는 빈 날짜로 추가, 빠진 차수는 제거)
    const prevDefs = (DB.settings && DB.settings.sessionDefs) || [];
    const newDefs = SESSIONS.map(name => {
      const found = prevDefs.find(d => d.name === name);
      return found ? found : { name, upDate: '', downDate: '' };
    });
    DB.settings.sessionDefs = newDefs;
    // 본 교회 차수가 더 이상 목록에 없으면 첫 차수로
    if (DB.meta && DB.meta.churchSession && !SESSIONS.includes(DB.meta.churchSession)) {
      DB.meta.churchSession = SESSIONS[0] || '';
      DB.meta.session = DB.meta.churchSession;
    }
    recalcAllMembers();  // 차수 목록/본교회차수 변경 → 전체 멤버 재계산
    // 나머지 설정 항목은 보존하면서 갱신 (sessionDefs/deptList/transportInfo/fees 등 유지)
    DB.settings.zones = ZONES;
    DB.settings.sessions = SESSIONS;
    DB.settings.buses = BUSES;
    DB.settings.churchCars = CHURCH_CARS;
    DB.settings.otherTransports = OTHER_TRANSPORTS;
    DB.settings.privateCarList = PRIVATE_CAR_LIST;
    DB.settings.extraUps = EXTRA_UPS;
    DB.settings.extraDowns = EXTRA_DOWNS;
    saveDB(); render(); toast('기초 설정이 반영되었습니다.');
  });
}

      <div class="field"><label>부서(회)</label><select id="eDept"><option value="">선택</option>${DEPTS.map(d => `<option value="${esc(d)}" ${e.dept===d?'selected':''}>${esc(d)}</option>`).join('')}</select></div>
    </div>
    <div class="row-2">
      <div class="field"><label>성명</label><input id="eName" value="${esc(e.name)}"/></div>
      <div class="field"><label>관계</label><input id="eRel" value="${esc(e.relation)}"/></div>
    </div>
    <div class="row-2">
      <div class="field"><label>인도자</label><input id="eLeader" value="${esc(e.leader)}"/></div>
      <div class="field"><label>숙소</label><input id="eLodging" value="${esc(e.lodging||'')}"/></div>
    </div>
    <div class="field"><label>비고</label><textarea id="eNote" rows="2">${esc(e.note)}</textarea></div>
    <div class="field"><label>상태 / 메모 <span style="font-weight:500;color:var(--ink-mute);font-size:11px">(인쇄 제외 · 기도제목·상황 등)</span></label><textarea id="eStatus" rows="3" placeholder="예: 직장 문제로 기도 요청. 다음 주 재방문 예정.">${esc(e.status||'')}</textarea></div>
    ${!isNew ? `<button class="btn btn-danger btn-block" id="eDelete" style="margin-top:8px">삭제</button>` : ''}
  `;
  openSheet(isNew ? '전도대상자 추가' : '전도대상자 편집', html, () => {
    const updated = {...e, zone: $('#eZone').value, dept: $('#eDept').value, name: $('#eName').value.trim(), relation: $('#eRel').value.trim(), leader: $('#eLeader').value.trim(), lodging: $('#eLodging').value.trim(), note: $('#eNote').value.trim(), status: $('#eStatus').value.trim()};
    if (isNew) DB.evangelism.push(updated); else { const idx = DB.evangelism.findIndex(x => x.id === e.id); if (idx >= 0) DB.evangelism[idx] = updated; }
    saveDB(); closeSheet(true); setTimeout(renderEvangelismSheet, 300); toast('저장됐어요'); return false;
  });
  if (!isNew) { setTimeout(() => { $('#eDelete').onclick = () => { DB.evangelism = DB.evangelism.filter(x => x.id !== e.id); saveDB(); closeSheet(true); setTimeout(renderEvangelismSheet, 300); }; }, 50); }
}

$('#jsonInput').onchange = (e) => {

  reader.onload = (ev) => {

      const imported = JSON.parse(ev.target.result);

        DB = Object.assign(freshDB(), imported);
        saveDB(); render(); toast('데이터 복원이 완료되었습니다.');

  };
